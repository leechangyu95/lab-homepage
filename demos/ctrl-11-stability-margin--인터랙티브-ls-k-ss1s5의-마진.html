  <h1 class="page-title">🎮 인터랙티브: $L(s) = K/[s(s+1)(s+5)]$의 마진</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/11-stability-margin.html">Week 11. 안정여유 &amp; 강인성</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: $L(s) = K/[s(s+1)(s+5)]$의 마진</h4>
    <p>K를 키우면 크기 곡선이 위로 평행 이동 → ωgc가 오른쪽으로 → PM 감소.
    K = 30이 W8에서 본 안정 경계 (PM = 0).</p>
    <canvas id="mg" width="640" height="400"></canvas>
    <div class="controls">
      <label>K <span class="val" id="mgKV">5</span><input type="range" id="mgK" min="0.5" max="60" step="0.5" value="5"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('mg'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('mgKV').textContent=(+$('mgK').value).toFixed(1);};
    $('mgK').oninput=upd;
    function loop(){
      const K=+$('mgK').value;
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      const wmin=-1, wmax=2, ox=60, mw=560;
      const xOf=lw=>ox+(lw-wmin)/(wmax-wmin)*mw;
      // L(jw) = K / [ jw * (jw+1) * (jw+5) ]
      const L=w=>{const denMag=w*Math.sqrt(1+w*w)*Math.sqrt(25+w*w);
        const denPh=Math.PI/2 + Math.atan(w) + Math.atan(w/5);
        return {mag:K/denMag, dB:20*Math.log10(K/denMag), ph:-180/Math.PI*denPh};};
      // magnitude
      const myT=20, myB=180, mTop=40, mBot=-60;
      const yMof=db=>myT + (mTop-db)/(mTop-mBot)*(myB-myT);
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,myT);x.lineTo(ox,myB);x.lineTo(ox+mw,myB);x.stroke();
      for(let dec=wmin;dec<=wmax;dec++){const xx=xOf(dec);
        x.strokeStyle='#eee';x.beginPath();x.moveTo(xx,myT);x.lineTo(xx,myB);x.stroke();
        x.fillStyle='#777';x.font='10px sans-serif';x.fillText('10^'+dec,xx-12,myB+12);}
      for(let db=mTop;db>=mBot;db-=20){const yy=yMof(db);
        x.strokeStyle='#eee';x.beginPath();x.moveTo(ox,yy);x.lineTo(ox+mw,yy);x.stroke();
        x.fillStyle='#777';x.fillText(db+'',ox-30,yy+3);}
      x.strokeStyle='#c62828';x.setLineDash([3,3]);x.beginPath();x.moveTo(ox,yMof(0));x.lineTo(ox+mw,yMof(0));x.stroke();x.setLineDash([]);
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      let wgc=null, wpc=null;
      let prevDB=null, prevPh=null;
      for(let i=0;i<=400;i++){const lw=wmin+i/400*(wmax-wmin), w=Math.pow(10,lw);
        const r=L(w);
        const xx=xOf(lw), yy=yMof(r.dB);
        if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);
        if(prevDB!==null && prevDB>0 && r.dB<=0 && wgc===null) wgc=w;
        if(prevPh!==null && prevPh>-180 && r.ph<=-180 && wpc===null) wpc=w;
        prevDB=r.dB; prevPh=r.ph;}
      x.stroke();
      // phase plot
      const pyT=220, pyB=380, pTop=0, pBot=-270;
      const yPof=p=>pyT + (pTop-p)/(pTop-pBot)*(pyB-pyT);
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,pyT);x.lineTo(ox,pyB);x.lineTo(ox+mw,pyB);x.stroke();
      for(let dec=wmin;dec<=wmax;dec++){const xx=xOf(dec);
        x.strokeStyle='#eee';x.beginPath();x.moveTo(xx,pyT);x.lineTo(xx,pyB);x.stroke();}
      for(let p=pTop;p>=pBot;p-=45){const yy=yPof(p);
        x.strokeStyle='#eee';x.beginPath();x.moveTo(ox,yy);x.lineTo(ox+mw,yy);x.stroke();
        x.fillStyle='#777';x.fillText(p+'°',ox-30,yy+3);}
      x.strokeStyle='#c62828';x.setLineDash([3,3]);x.beginPath();x.moveTo(ox,yPof(-180));x.lineTo(ox+mw,yPof(-180));x.stroke();x.setLineDash([]);
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      for(let i=0;i<=400;i++){const lw=wmin+i/400*(wmax-wmin), w=Math.pow(10,lw);
        const r=L(w); const xx=xOf(lw), yy=yPof(r.ph);
        if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}
      x.stroke();
      // mark margins
      let PM=null, GM=null;
      if(wgc){const r=L(wgc); PM=180+r.ph;
        const xx=xOf(Math.log10(wgc)), y1=yPof(r.ph), y2=yPof(-180);
        x.strokeStyle='#9c27b0';x.lineWidth=3;x.beginPath();x.moveTo(xx,y1);x.lineTo(xx,y2);x.stroke();}
      if(wpc){const r=L(wpc); GM=-r.dB;
        const xx=xOf(Math.log10(wpc)), y1=yMof(r.dB), y2=yMof(0);
        x.strokeStyle='#2e7d32';x.lineWidth=3;x.beginPath();x.moveTo(xx,y1);x.lineTo(xx,y2);x.stroke();}
      x.fillStyle='#444';x.font='13px sans-serif';
      x.fillText('이득여유 GM = '+(GM!==null?GM.toFixed(1)+' dB':'N/A')+'    '+
                 '위상여유 PM = '+(PM!==null?PM.toFixed(1)+'°':'N/A'),20,15);
      const safe = (PM!==null && PM>0 && GM!==null && GM>0);
      x.fillStyle=safe?'#2e7d32':'#c62828';
      x.fillText(safe?'안정 (둘 다 양수)':'경계/불안정',460,15);
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
