  <h1 class="page-title">🎮 인터랙티브: 사인파 예측</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/11-rnn-lstm.html">Week 11. RNN과 LSTM</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 사인파 예측</h4>
    <p>간단한 1셀 RNN이 사인파를 학습합니다. 진폭과 주파수를 조절해보세요(시뮬레이션).</p>
    <canvas id="sinCanvas" width="640" height="260"></canvas>
    <div class="controls">
      <label>주파수 <span class="val" id="frV">1</span><input type="range" id="fr" min="0.5" max="3" step="0.1" value="1"></label>
      <label>잡음 <span class="val" id="nzV">0.1</span><input type="range" id="nz" min="0" max="0.5" step="0.01" value="0.1"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('sinCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const f=+document.getElementById('fr').value,nz=+document.getElementById('nz').value;
      document.getElementById('frV').textContent=f.toFixed(1);
      document.getElementById('nzV').textContent=nz.toFixed(2);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;ctx.beginPath();
      for(let i=0;i<W;i++){const t=i/W*4*Math.PI;const y=Math.sin(f*t)+nz*(Math.random()-0.5);if(i===0)ctx.moveTo(i,H/2-y*60);else ctx.lineTo(i,H/2-y*60);}
      ctx.stroke();
      ctx.strokeStyle='#ff8c00';ctx.setLineDash([5,5]);ctx.beginPath();
      for(let i=0;i<W;i++){const t=i/W*4*Math.PI;const y=Math.sin(f*t);if(i===0)ctx.moveTo(i,H/2-y*60);else ctx.lineTo(i,H/2-y*60);}
      ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#0b5fff';ctx.font='13px sans-serif';ctx.fillText('관측(잡음)',10,20);
      ctx.fillStyle='#ff8c00';ctx.fillText('RNN 예측',10,38);
    }
    ['fr','nz'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
    draw();
  })();
  </script>
