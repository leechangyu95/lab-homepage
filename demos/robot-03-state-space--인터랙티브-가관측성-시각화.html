  <h1 class="page-title">🎮 인터랙티브: 가관측성 시각화</h1>
  <p class="demo-meta">
    로봇공학특론 · <a href="../backup-lectures/lectures/03-state-space.html">Lecture 3. 상태공간 모델</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 가관측성 시각화</h4>
    <p>7절의 두 질량 시스템을 그대로 두고, 이번엔 어느 질량을 <em>측정</em>하느냐(즉 $C$ 행렬을 어떻게 잡느냐)를 바꿔봅니다. 출력만 보고 네 상태($x_1, \dot x_1, x_2, \dot x_2$)를 모두 복원할 수 있을까요?</p>
    <canvas id="obsv" width="640" height="240"></canvas>
    <div class="controls">
      <label>측정 위치
        <select id="obsAt">
          <option value="0">m₁의 위치만 측정 (가관측 ✓)</option>
          <option value="1">m₂의 위치만 측정 (가관측 ✓)</option>
          <option value="2">두 질량 위치의 합만 측정 (불가관측 ✗)</option>
        </select>
      </label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('obsv'),x=c.getContext('2d');
    function rank(M){
      const A=M.map(r=>[...r]);const m=A.length,n=A[0].length;let r=0;
      for(let col=0;col<n&&r<m;col++){
        let pv=r;for(let i=r+1;i<m;i++)if(Math.abs(A[i][col])>Math.abs(A[pv][col]))pv=i;
        if(Math.abs(A[pv][col])<1e-9)continue;
        [A[r],A[pv]]=[A[pv],A[r]];
        for(let i=r+1;i<m;i++){const f=A[i][col]/A[r][col];for(let j=col;j<n;j++)A[i][j]-=f*A[r][j];}
        r++;
      }
      return r;
    }
    function vmul(v,A){return A[0].map((_,j)=>v.reduce((s,vi,i)=>s+vi*A[i][j],0));}
    function loop(){
      const sel=+document.getElementById('obsAt').value;
      // 동일 시스템: 두 질량(k=2, m=1, c=0)
      const A=[[0,1,0,0],[-2,0,2,0],[0,0,0,1],[2,0,-2,0]];
      let C;
      if(sel==0)C=[1,0,0,0];        // m₁ 위치
      else if(sel==1)C=[0,0,1,0];   // m₂ 위치
      else C=[1,0,1,0];             // 합
      const CA=vmul(C,A);
      const CA2=vmul(CA,A);
      const CA3=vmul(CA2,A);
      const O=[C,CA,CA2,CA3];
      const r=rank(O);
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      x.fillStyle='#999';x.fillRect(40,100,8,80);
      const m1x=180,m2x=380;
      x.strokeStyle='#666';x.lineWidth=2;x.beginPath();x.moveTo(48,140);
      for(let i=0;i<8;i++)x.lineTo(48+(m1x-48)*i/8,140+(i%2?-8:8));x.lineTo(m1x,140);x.stroke();
      x.beginPath();x.moveTo(m1x+40,140);
      for(let i=0;i<8;i++)x.lineTo(m1x+40+(m2x-m1x-40)*i/8,140+(i%2?-8:8));x.lineTo(m2x,140);x.stroke();
      x.fillStyle='#0b5fff';x.fillRect(m1x,115,40,50);x.fillRect(m2x,115,40,50);
      x.fillStyle='#fff';x.font='bold 14px sans-serif';x.textAlign='center';
      x.fillText('m₁',m1x+20,145);x.fillText('m₂',m2x+20,145);x.textAlign='start';
      // 센서 표시 (눈 모양)
      function sensor(sx){
        x.strokeStyle='#2e7d32';x.lineWidth=2;
        x.beginPath();x.arc(sx,90,10,0,Math.PI*2);x.stroke();
        x.fillStyle='#2e7d32';x.beginPath();x.arc(sx,90,4,0,Math.PI*2);x.fill();
        x.beginPath();x.moveTo(sx,100);x.lineTo(sx,113);x.stroke();
      }
      if(sel==0)sensor(m1x+20);
      else if(sel==1)sensor(m2x+20);
      else { sensor(m1x+20); sensor(m2x+20);
        x.strokeStyle='#2e7d32';x.lineWidth=1;x.setLineDash([4,3]);
        x.beginPath();x.moveTo(m1x+20,80);x.lineTo(m2x+20,80);x.stroke();x.setLineDash([]);
        x.fillStyle='#2e7d32';x.font='11px sans-serif';x.fillText('y = x₁ + x₂ (합만)',(m1x+m2x)/2-30,75);
      }
      const ok=r==4;
      x.fillStyle=ok?'#e8f5e9':'#ffebee';x.fillRect(450,30,170,180);
      x.strokeStyle=ok?'#2e7d32':'#c62828';x.strokeRect(450,30,170,180);
      x.fillStyle='#222';x.font='13px sans-serif';
      x.fillText('상태 차원 n = 4',460,55);
      x.fillText('rank(O) = '+r,460,80);
      x.fillStyle=ok?'#2e7d32':'#c62828';x.font='bold 14px sans-serif';
      x.fillText(ok?'✓ 가관측':'✗ 불가관측',460,110);
      x.fillStyle='#666';x.font='11px sans-serif';
      const lines=ok?['모든 내부 상태를','출력에서 복원','가능합니다.']:['대칭 모드(두 질량','동일 변위)는 합만','보면 0이라','구분 불가.'];
      lines.forEach((l,i)=>x.fillText(l,460,135+i*15));
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
