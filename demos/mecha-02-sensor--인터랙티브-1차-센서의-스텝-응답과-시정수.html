  <h1 class="page-title">🎮 인터랙티브: 1차 센서의 스텝 응답과 시정수</h1>
  <p class="demo-meta">
    메카트로닉스 · <a href="../backup-lectures/lectures-mechatronics/02-sensor.html">Week 2. 센서와 트랜스듀서</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 1차 센서의 스텝 응답과 시정수</h4>
    <p>$\tau$를 바꿔보세요. $t = \tau$에서 정확히 63.2%, $5\tau$에서 약 99% 도달. <strong>참값(스텝)은 즉시</strong>이지만 센서 출력은 시정수만큼 늦게 따라갑니다. 빠른 변화를 측정하려면 $\tau$가 작은 센서가 필요합니다.</p>
    <canvas id="tauDemo" width="640" height="280"></canvas>
    <div class="controls">
      <label>시정수 τ <span class="val" id="tauV">0.5</span> s<input type="range" id="tau" min="0.1" max="3" step="0.1" value="0.5"></label>
      <label>최종값 y∞ <span class="val" id="yfV">10</span><input type="range" id="yf" min="1" max="20" step="0.5" value="10"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('tauDemo');if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const tau=+document.getElementById('tau').value;
      const yf=+document.getElementById('yf').value;
      document.getElementById('tauV').textContent=tau.toFixed(1);
      document.getElementById('yfV').textContent=yf.toFixed(1);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const ox=60,oy=H-40,w=W-90,h=H-80,T=Math.max(5*tau,3);
      // grid
      ctx.strokeStyle='#eee';for(let g=0;g<=5;g++){const yy=oy-g/5*h;ctx.beginPath();ctx.moveTo(ox,yy);ctx.lineTo(ox+w,yy);ctx.stroke();}
      // axes
      ctx.strokeStyle='#999';ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+w,oy);ctx.moveTo(ox,30);ctx.lineTo(ox,oy);ctx.stroke();
      // step (truth)
      ctx.strokeStyle='#2e7d32';ctx.lineWidth=2;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+w*0.05,oy);ctx.lineTo(ox+w*0.05,oy-yf/20*h);ctx.lineTo(ox+w,oy-yf/20*h);ctx.stroke();
      ctx.setLineDash([]);
      // sensor curve
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2.5;ctx.beginPath();
      for(let i=0;i<=400;i++){
        const t=i/400*T;
        const y = t<T*0.05 ? 0 : yf*(1-Math.exp(-(t-T*0.05)/tau));
        const xx=ox+(t/T)*w, yy=oy-y/20*h;
        if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);
      }
      ctx.stroke();
      // mark τ, 2τ, 5τ
      [[1,'τ',0.632],[2,'2τ',0.865],[5,'5τ',0.993]].forEach(([k,lbl,frac])=>{
        const t=T*0.05+k*tau;if(t>T)return;
        const xx=ox+(t/T)*w, yy=oy-yf*frac/20*h;
        ctx.fillStyle='#c62828';ctx.beginPath();ctx.arc(xx,yy,4,0,Math.PI*2);ctx.fill();
        ctx.font='11px sans-serif';ctx.fillText(`${lbl} (${(frac*100).toFixed(1)}%)`,xx+5,yy-4);
        ctx.strokeStyle='#c62828';ctx.setLineDash([2,2]);ctx.beginPath();ctx.moveTo(xx,oy);ctx.lineTo(xx,yy);ctx.stroke();ctx.setLineDash([]);
      });
      ctx.fillStyle='#666';ctx.font='12px sans-serif';
      ctx.fillText('시간 t (s)',W-80,oy+25);ctx.fillText('출력',12,40);
      ctx.fillStyle='#2e7d32';ctx.fillText('— 참값 (스텝)',ox+10,55);
      ctx.fillStyle='#0b5fff';ctx.fillText('— 센서 출력',ox+10,75);
    }
    document.getElementById('tau').addEventListener('input',draw);
    document.getElementById('yf').addEventListener('input',draw);
    draw();
  })();
  </script>
