  <h1 class="page-title">🎮 인터랙티브: 브로드캐스팅 모양 시각화</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/02-data-handling.html">Week 2. 데이터 핸들링</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 브로드캐스팅 모양 시각화</h4>
    <p>두 배열의 모양을 골라서 NumPy가 어떻게 자동으로 늘리는지 봅니다. 끝부터 비교해서 (a) 같거나 (b) 한쪽이 1이면 ✅, 둘 다 아니면 ❌ 에러.</p>
    <canvas id="bcast" width="640" height="300"></canvas>
    <div class="controls">
      <label>A 모양 <select id="bcA">
        <option value="3,4">(3, 4)</option>
        <option value="1,4">(1, 4)</option>
        <option value="3,1">(3, 1)</option>
        <option value="4">(4,)</option>
        <option value="2,3,4" selected>(2, 3, 4)</option>
        <option value="1,3,1">(1, 3, 1)</option>
      </select></label>
      <label>B 모양 <select id="bcB">
        <option value="4" selected>(4,)</option>
        <option value="3,4">(3, 4)</option>
        <option value="3,1">(3, 1)</option>
        <option value="1,4">(1, 4)</option>
        <option value="2,1,4">(2, 1, 4)</option>
        <option value="2,3,1">(2, 3, 1)</option>
      </select></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('bcast');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function pad(arr,n){return Array(n-arr.length).fill(1).concat(arr);}
    function draw(){
      const A=document.getElementById('bcA').value.split(',').map(Number);
      const B=document.getElementById('bcB').value.split(',').map(Number);
      const n=Math.max(A.length,B.length);
      const Ap=pad(A,n),Bp=pad(B,n);
      let ok=true,result=[];
      for(let i=0;i<n;i++){
        if(Ap[i]===Bp[i]||Ap[i]===1||Bp[i]===1)result.push(Math.max(Ap[i],Bp[i]));
        else{ok=false;result.push('?');}
      }
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#222';ctx.font='14px monospace';
      const cell=70,startX=120,row=80;
      ctx.fillText('A',60,row+12);
      Ap.forEach((v,i)=>{
        const realI=i-(Ap.length-A.length);
        ctx.fillStyle=realI<0?'#999':'#0b5fff';
        ctx.font='14px monospace';
        ctx.fillText(realI<0?'(1)':v,startX+i*cell,row+12);
      });
      ctx.fillStyle='#222';ctx.fillText('B',60,row+50);
      Bp.forEach((v,i)=>{
        const realI=i-(Bp.length-B.length);
        ctx.fillStyle=realI<0?'#999':'#ff8c00';
        ctx.fillText(realI<0?'(1)':v,startX+i*cell,row+50);
      });
      ctx.strokeStyle='#999';ctx.beginPath();ctx.moveTo(60,row+62);ctx.lineTo(startX+(n-1)*cell+30,row+62);ctx.stroke();
      ctx.fillStyle='#222';ctx.fillText('=',60,row+90);
      result.forEach((v,i)=>{
        ctx.fillStyle=v==='?'?'#c62828':'#2e7d32';
        ctx.font='bold 14px monospace';
        ctx.fillText(v,startX+i*cell,row+90);
      });
      // verdict
      ctx.fillStyle=ok?'#2e7d32':'#c62828';
      ctx.font='bold 18px sans-serif';
      ctx.fillText(ok?`✅ 결과 모양: (${result.join(', ')})`:`❌ 호환되지 않음 — 차원이 안 맞아요`,60,200);
      ctx.fillStyle='#666';ctx.font='12px sans-serif';
      ctx.fillText('규칙: 끝에서부터 비교해 같거나 한쪽이 1이면 OK. 짧은 배열은 앞에 1을 채움.',60,235);
      ctx.fillText('파랑 = A의 실제 차원, 회색 = 자동 추가된 1, 주황 = B의 실제 차원',60,255);
    }
    document.getElementById('bcA').addEventListener('change',draw);
    document.getElementById('bcB').addEventListener('change',draw);
    draw();
  })();
  </script>
