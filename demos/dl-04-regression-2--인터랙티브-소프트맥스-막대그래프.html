  <h1 class="page-title">🎮 인터랙티브: 소프트맥스 막대그래프</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/04-regression-2.html">Week 4. 회귀 2: 다중회귀, 로지스틱, 소프트맥스</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 소프트맥스 막대그래프</h4>
    <p>세 클래스의 점수 $z$를 슬라이더로 조절하면 소프트맥스 확률이 어떻게 변하는지 보입니다.</p>
    <canvas id="smCanvas" width="640" height="260"></canvas>
    <div class="controls">
      <label>z₁ <span class="val" id="z1V">2</span><input type="range" id="z1" min="-5" max="5" step="0.1" value="2"></label>
      <label>z₂ <span class="val" id="z2V">1</span><input type="range" id="z2" min="-5" max="5" step="0.1" value="1"></label>
      <label>z₃ <span class="val" id="z3V">0</span><input type="range" id="z3" min="-5" max="5" step="0.1" value="0"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('smCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const z=[+document.getElementById('z1').value,+document.getElementById('z2').value,+document.getElementById('z3').value];
      ['z1','z2','z3'].forEach((id,i)=>document.getElementById(id+'V').textContent=z[i].toFixed(1));
      const m=Math.max(...z),ex=z.map(v=>Math.exp(v-m)),s=ex.reduce((a,b)=>a+b);
      const p=ex.map(v=>v/s);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const colors=['#0b5fff','#ff8c00','#2e7d32'];
      const bw=120,gap=40,baseY=H-40;
      p.forEach((pi,i)=>{
        const x=80+i*(bw+gap),h=pi*(H-80);
        ctx.fillStyle=colors[i];ctx.fillRect(x,baseY-h,bw,h);
        ctx.fillStyle='#333';ctx.font='14px sans-serif';
        ctx.fillText(`p${i+1}=${pi.toFixed(3)}`,x+10,baseY-h-8);
        ctx.fillText(`클래스${i+1}`,x+25,baseY+18);
      });
    }
    ['z1','z2','z3'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
    draw();
  })();
  </script>
