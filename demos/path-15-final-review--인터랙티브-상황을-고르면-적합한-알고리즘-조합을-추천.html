  <h1 class="page-title">🎮 인터랙티브: 상황을 고르면 적합한 알고리즘 조합을 추천</h1>
  <p class="demo-meta">
    경로계획 &amp; 추종 · <a href="../backup-lectures/lectures-path-planning/15-final-review.html">Week 15. 기말 전체 정리</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 상황을 고르면 적합한 알고리즘 조합을 추천</h4>
    <div class="controls">
      <label>환경
        <select id="env">
          <option value="grid">2D 격자 도심 (정적 장애물)</option>
          <option value="cont">연속 공간 (좁은 통로 / 주차)</option>
          <option value="hwy">고속도로 (고속·완만 곡률)</option>
          <option value="dyn">동적 보행자 빈번</option>
        </select>
      </label>
      <label>속도
        <select id="spd">
          <option value="lo">저속 (≤ 30 km/h)</option>
          <option value="mid">중속 (30~60)</option>
          <option value="hi">고속 (≥ 60)</option>
        </select>
      </label>
      <label>요구
        <select id="req">
          <option value="simple">단순/구현 빠르게</option>
          <option value="opt">최적성 중요</option>
          <option value="safe">안전 보장</option>
          <option value="data">데이터 풍부, 학습 가능</option>
        </select>
      </label>
    </div>
    <p>추천: <span class="recommend-out" id="rec">—</span></p>
    <p id="recExp" style="font-size:13px;color:var(--muted)"></p>
  </div>
  <script>
  (function(){
    const $=id=>document.getElementById(id);
    function refresh(){
      const env=$('env').value,spd=$('spd').value,req=$('req').value;
      let plan='A* + Costmap',track='Pure Pursuit + PID',safety='—';
      if(env==='cont')plan='Hybrid A* / RRT*';
      if(env==='hwy')plan='Frenet 기반 다항식 궤적';
      if(env==='dyn')plan='A* + 동적 재계획';
      if(spd==='hi')track='Stanley 또는 LQR (W12) / MPC (W13)';
      if(req==='opt')track='MPC';
      if(req==='safe')safety='+ CBF 안전 필터 (W12)';
      if(req==='data')track='DDPG/PPO + 안전 필터';
      $('rec').textContent='Plan: '+plan+'   /   Track: '+track+'   '+safety;
      let exp='';
      if(env==='hwy'&&spd==='hi')exp+='고속도로에서는 곡선 진입에서 슬립이 중요해 Stanley/LQR/MPC가 안정적입니다. ';
      if(req==='safe')exp+='CBF는 기본 컨트롤러를 그대로 두고 위험할 때만 살짝 수정하는 안전 필터로 끼워 넣으세요. ';
      if(env==='dyn')exp+='보행자가 빈번하면 정적 A* 결과를 100~500ms 주기로 재계획해야 합니다. ';
      if(req==='data'&&spd!=='hi')exp+='RL은 시뮬에서 충분히 학습한 뒤 안전 필터와 함께 실차에 옮기는 게 표준입니다. ';
      $('recExp').textContent=exp||'기본 조합. 가장 단순·견고한 출발점입니다.';
    }
    ['env','spd','req'].forEach(id=>$(id).onchange=refresh);refresh();
  })();
  </script>
