  <h1 class="page-title">🎮 인터랙티브: 4가지 표준 입력 한눈에 비교</h1>
  <p class="demo-meta">
    메카트로닉스 · <a href="../backup-lectures/lectures-mechatronics/09-dynamic-response.html">Week 9. 동적 응답 — 1차·2차 시스템의 시간 응답</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 4가지 표준 입력 한눈에 비교</h4>
    <p>입력의 모양만 봐도 머릿속 직관이 다릅니다. 임펄스는 "한 방 때리기", 스텝은 "갑자기 일정값 유지", 램프는 "꾸준히 증가", 정현파는 "주기적으로 흔들기". 각 입력에 대한 응답이 다음 절부터 어떻게 다른지를 비교해 보세요.</p>
    <canvas id="inputDemo" width="640" height="240"></canvas>
    <div class="controls">
      <label>입력 종류
        <select id="inSel">
          <option value="impulse">임펄스</option>
          <option value="step" selected>스텝</option>
          <option value="ramp">램프</option>
          <option value="sin">정현파</option>
        </select>
      </label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('inputDemo');if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const k=document.getElementById('inSel').value;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const ox=50,oy=H-30,w=W-70,h=H-60;
      ctx.strokeStyle='#999';ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(ox+w,oy);ctx.moveTo(ox,30);ctx.lineTo(ox,oy);ctx.stroke();
      ctx.fillStyle='#666';ctx.font='12px sans-serif';ctx.fillText('시간 t →',ox+w-50,oy+18);ctx.fillText('입력',ox-25,40);
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2.5;ctx.beginPath();
      const T=10;
      for(let i=0;i<=600;i++){const t=i/600*T;
        let v=0;
        if(k==='impulse') v = (t>0.5 && t<0.7) ? 4 : 0;
        else if(k==='step') v = t<0.5 ? 0 : 1;
        else if(k==='ramp') v = t<0.5 ? 0 : (t-0.5)*0.2;
        else if(k==='sin') v = Math.sin(2*Math.PI*0.4*t);
        const xx=ox+t/T*w, yy=oy-h*0.45-v*h*0.3;
        if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);}
      ctx.stroke();
      const desc={impulse:'아주 짧은 시간에 큰 에너지 한 방 → 시스템의 "고유" 진동을 그대로 노출',
        step:'갑자기 1로 올라가서 유지 → 시스템이 새 평형으로 어떻게 가는지',
        ramp:'시간에 비례해 증가 → 일정 속도 추적 능력',
        sin:'주기적 진동 → 주파수마다 진폭·위상 응답이 어떻게 달라지나'};
      ctx.fillStyle='#222';ctx.font='13px sans-serif';
      ctx.fillText(desc[k],ox,25);
    }
    document.getElementById('inSel').addEventListener('change',draw);draw();
  })();
  </script>
