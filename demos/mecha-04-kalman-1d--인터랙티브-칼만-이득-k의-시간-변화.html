  <h1 class="page-title">🎮 인터랙티브: 칼만 이득 K의 시간 변화</h1>
  <p class="demo-meta">
    메카트로닉스 · <a href="../backup-lectures/lectures-mechatronics/04-kalman-1d.html">Week 4. 칼만 필터 (1D) — 측정과 모델의 융합</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 칼만 이득 K의 시간 변화</h4>
    <p>처음에는 $P$가 커서 $K \approx 1$ — 측정을 거의 그대로 받습니다. 시간이 지나며 $P$가 줄고 $K$도 작아져 어떤 정상값에 수렴해요. <strong>$Q = 0$</strong>이면 $P$가 계속 줄어 결국 측정을 무시하기 시작합니다.</p>
    <canvas id="kgMc" width="640" height="280"></canvas>
    <div class="controls">
      <label>R <span class="val" id="kgRV2">5</span><input type="range" id="kgR2" min="0.5" max="20" step="0.5" value="5"></label>
      <label>Q <span class="val" id="kgQV2">0.1</span><input type="range" id="kgQ2" min="0" max="2" step="0.05" value="0.1"></label>
      <button id="kgRst2">재시작</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('kgMc');if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    let P,Khist,Phist,frame=0;
    function init(){P=100;Khist=[];Phist=[];frame=0;}
    init();document.getElementById('kgRst2').onclick=init;
    function loop(){
      if(frame++%5===0){
        const R=+document.getElementById('kgR2').value;
        const Q=+document.getElementById('kgQ2').value;
        P=P+Q;
        const K=P/(P+R);
        Khist.push(K);Phist.push(P);
        if(Khist.length>120){Khist.shift();Phist.shift();}
        P=(1-K)*P;
      }
      ['kgR2','kgQ2'].forEach(k=>document.getElementById(k+'V2').textContent=document.getElementById(k).value);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#999';ctx.beginPath();ctx.moveTo(40,240);ctx.lineTo(620,240);ctx.moveTo(40,30);ctx.lineTo(40,240);ctx.stroke();
      ctx.fillStyle='#666';ctx.font='12px sans-serif';ctx.fillText('스텝 →',560,255);ctx.fillText('K, P (정규화)',12,40);
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;ctx.beginPath();
      Khist.forEach((v,i)=>{const xx=40+i*4.8,yy=240-v*180;if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);});ctx.stroke();
      const Pmax=Math.max(...Phist,1);
      ctx.strokeStyle='#ff8c00';ctx.beginPath();
      Phist.forEach((v,i)=>{const xx=40+i*4.8,yy=240-v/Pmax*180;if(i===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);});ctx.stroke();
      ctx.fillStyle='#0b5fff';ctx.fillText('🔵 K (칼만 이득)',40,30);
      ctx.fillStyle='#ff8c00';ctx.fillText('🟠 P (정규화 분산)',180,30);
      ctx.fillStyle='#666';ctx.fillText('현재 K ≈ '+(Khist[Khist.length-1]||0).toFixed(3),330,30);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
