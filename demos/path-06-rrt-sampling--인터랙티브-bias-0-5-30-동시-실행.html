  <h1 class="page-title">🎮 인터랙티브: Bias 0% / 5% / 30% 동시 실행</h1>
  <p class="demo-meta">
    경로계획 &amp; 추종 · <a href="../backup-lectures/lectures-path-planning/06-rrt-sampling.html">Week 6. RRT — 뿌리처럼 뻗어 길을 찾는 알고리즘</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: Bias 0% / 5% / 30% 동시 실행</h4>
    <p>같은 환경·같은 step에서 세 가지 Bias로 동시에 RRT를 돌린 결과입니다. 자동 재생으로 한 번에 보세요.</p>
    <canvas id="biasCv" width="640" height="320"></canvas>
    <div class="controls">
      <button id="goBtn">3개 동시 실행</button>
      <button id="rstBtn2" class="alt">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('biasCv'),x=c.getContext('2d'),$=id=>document.getElementById(id);
    const W=20,H=10;const sc=c.width/3/W;const colW=c.width/3;
    const start=[2,2],goal=[18,8];
    const obs=[[10,5,1.4],[14,7,1.0],[7,8,1.0]];
    const cfgs=[{b:0,col:'#c62828'},{b:0.05,col:'#0b5fff'},{b:0.30,col:'#f57c00'}];
    let runs;
    function reset(){runs=cfgs.map(cf=>({b:cf.b,col:cf.col,nodes:[start.slice()],parents:[-1],path:null,iter:0}));draw();}
    reset();$('rstBtn2').onclick=reset;
    function dist(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1]);}
    function colFree(a,b){
      for(const o of obs){const[cx,cy,r]=o;const ab=[b[0]-a[0],b[1]-a[1]];const ap=[cx-a[0],cy-a[1]];
        const ab2=ab[0]*ab[0]+ab[1]*ab[1];const t=Math.max(0,Math.min(1,(ap[0]*ab[0]+ap[1]*ab[1])/(ab2+1e-9)));
        const px=a[0]+t*ab[0],py=a[1]+t*ab[1];if(Math.hypot(px-cx,py-cy)<r)return false;}
      if(b[0]<0||b[0]>W||b[1]<0||b[1]>H)return false;return true;
    }
    function step(r){
      if(r.path||r.iter>2000)return;r.iter++;
      const q=Math.random()<r.b?goal.slice():[Math.random()*W,Math.random()*H];
      let bi=0,bd=1e9;r.nodes.forEach((p,i)=>{const d=dist(p,q);if(d<bd){bd=d;bi=i;}});
      const a=r.nodes[bi];const v=[q[0]-a[0],q[1]-a[1]];const d=Math.hypot(v[0],v[1]);
      const nq=d<=0.7?q.slice():[a[0]+v[0]/d*0.7,a[1]+v[1]/d*0.7];
      if(!colFree(a,nq))return;
      r.nodes.push(nq);r.parents.push(bi);
      if(dist(nq,goal)<0.7){let id=r.nodes.length-1;r.path=[];while(id>=0){r.path.push(r.nodes[id]);id=r.parents[id];}}
    }
    let going=false;
    $('goBtn').onclick=()=>{if(going)return;going=true;reset();const id=setInterval(()=>{
      runs.forEach(r=>{for(let k=0;k<5;k++)step(r);});draw();
      if(runs.every(r=>r.path||r.iter>2000)){clearInterval(id);going=false;}},30);};
    function drawOne(r,ox,label){
      x.strokeStyle='#ddd';x.strokeRect(ox,0,colW,c.height);
      x.fillStyle='#fce4ec';x.strokeStyle='#c62828';
      obs.forEach(o=>{x.beginPath();x.arc(ox+o[0]*sc,c.height-o[1]*sc,o[2]*sc,0,2*Math.PI);x.fill();x.stroke();});
      x.strokeStyle='rgba(80,80,80,0.4)';x.lineWidth=0.7;
      for(let i=1;i<r.nodes.length;i++){const a=r.nodes[r.parents[i]],b=r.nodes[i];
        x.beginPath();x.moveTo(ox+a[0]*sc,c.height-a[1]*sc);x.lineTo(ox+b[0]*sc,c.height-b[1]*sc);x.stroke();}
      x.fillStyle='#2e7d32';x.beginPath();x.arc(ox+start[0]*sc,c.height-start[1]*sc,5,0,2*Math.PI);x.fill();
      x.fillStyle='#0b5fff';x.beginPath();x.arc(ox+goal[0]*sc,c.height-goal[1]*sc,5,0,2*Math.PI);x.fill();
      if(r.path){x.strokeStyle=r.col;x.lineWidth=2.5;x.beginPath();
        r.path.forEach((p,i)=>{const xx=ox+p[0]*sc,yy=c.height-p[1]*sc;if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);});x.stroke();}
      x.fillStyle=r.col;x.font='13px sans-serif';x.fillText(label,ox+8,18);
      x.fillStyle='#444';x.font='12px sans-serif';x.fillText('노드 '+r.nodes.length+(r.path?' · 도달':''),ox+8,c.height-10);
    }
    function draw(){
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      drawOne(runs[0],0,'Bias 0%');
      drawOne(runs[1],colW,'Bias 5%');
      drawOne(runs[2],2*colW,'Bias 30%');
    }
  })();
  </script>
</main>
