  <h1 class="page-title">🎮 인터랙티브: LOS 경로 추종 (직선 경로)</h1>
  <p class="demo-meta">
    로봇공학특론 · <a href="../backup-lectures/lectures/08-guidance-cbf.html">Lecture 8. 유도 &amp; 제어 장벽 함수 (CBF)</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: LOS 경로 추종 (직선 경로)</h4>
    <p>직선 경로(초록)를 향해 선박(파랑)이 LOS로 접근합니다. 전방 주시거리 $L_a$와 게인을 바꿔 횡오차 수렴 속도를 비교해 보세요.</p>
    <canvas id="los" width="640" height="320"></canvas>
    <div class="controls">
      <label>전방 주시 L_a <span class="val" id="laV">60</span><input type="range" id="la" min="20" max="160" value="60"></label>
      <label>속도 U <span class="val" id="uvV">2</span><input type="range" id="uv" min="0.5" max="4" step="0.1" value="2"></label>
      <button id="losRst">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('los'),x=c.getContext('2d');
    const pA=[40,200],pB=[600,140];
    let ship;
    function init(){ship={x:60,y:60,th:0.3};}
    init();document.getElementById('losRst').onclick=init;
    function loop(){
      const La=+document.getElementById('la').value;
      const U=+document.getElementById('uv').value;
      ['la','uv'].forEach(k=>document.getElementById(k+'V').textContent=document.getElementById(k).value);
      const tx=pB[0]-pA[0],ty=pB[1]-pA[1],len=Math.hypot(tx,ty);
      const ex=tx/len,ey=ty/len; // tangent
      const nx=-ey,ny=ex;         // normal
      const dx=ship.x-pA[0],dy=ship.y-pA[1];
      const s=dx*ex+dy*ey;         // along-track
      const ect=dx*nx+dy*ny;       // cross-track (signed)
      // LOS point: along-track + La
      const tgtX=pA[0]+(s+La)*ex, tgtY=pA[1]+(s+La)*ey;
      const desired=Math.atan2(tgtY-ship.y,tgtX-ship.x);
      // heading to desired
      let dth=((desired-ship.th+Math.PI*3)%(2*Math.PI))-Math.PI;
      ship.th+=Math.max(-0.08,Math.min(0.08,dth*0.15));
      ship.x+=U*Math.cos(ship.th);ship.y+=U*Math.sin(ship.th);
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      x.strokeStyle='#2e7d32';x.lineWidth=3;x.beginPath();x.moveTo(pA[0],pA[1]);x.lineTo(pB[0],pB[1]);x.stroke();
      // LOS target
      x.fillStyle='#ff8c00';x.beginPath();x.arc(tgtX,tgtY,6,0,Math.PI*2);x.fill();
      x.strokeStyle='#ff8c00';x.setLineDash([3,3]);x.beginPath();x.moveTo(ship.x,ship.y);x.lineTo(tgtX,tgtY);x.stroke();x.setLineDash([]);
      // cross-track projection
      const proj=[pA[0]+s*ex,pA[1]+s*ey];
      x.strokeStyle='#c62828';x.setLineDash([2,3]);x.beginPath();x.moveTo(ship.x,ship.y);x.lineTo(proj[0],proj[1]);x.stroke();x.setLineDash([]);
      // ship
      x.save();x.translate(ship.x,ship.y);x.rotate(ship.th);
      x.fillStyle='#0b5fff';x.beginPath();x.moveTo(12,0);x.lineTo(-8,-6);x.lineTo(-8,6);x.closePath();x.fill();
      x.restore();
      x.fillStyle='#666';x.font='12px sans-serif';x.fillText('횡오차 e_ct = '+ect.toFixed(1)+' px',12,305);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
