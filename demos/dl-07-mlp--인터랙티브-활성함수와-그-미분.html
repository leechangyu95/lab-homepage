  <h1 class="page-title">🎮 인터랙티브: 활성함수와 그 미분</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/07-mlp.html">Week 7. 퍼셉트론과 다층 신경망(MLP)</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 활성함수와 그 미분</h4>
    <p>함수를 골라 모양과 미분(점선)을 봅니다. ReLU의 단순함이 왜 딥러닝을 살렸는지 느껴보세요.</p>
    <canvas id="actCanvas" width="640" height="320"></canvas>
    <div class="controls">
      <label>함수
        <select id="actSel">
          <option value="sig">Sigmoid</option>
          <option value="tanh">tanh</option>
          <option value="relu">ReLU</option>
          <option value="lrelu">Leaky ReLU</option>
        </select>
      </label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('actCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const xmin=-5,xmax=5,ymin=-1.2,ymax=1.2;
    const toPx=x=>30+(x-xmin)/(xmax-xmin)*(W-50);
    const toPy=y=>H/2-y*((H-40)/(ymax-ymin));
    function f(t,x){
      if(t==='sig'){const s=1/(1+Math.exp(-x));return [s*2-1,2*s*(1-s)];}
      if(t==='tanh'){const s=Math.tanh(x);return [s,1-s*s];}
      if(t==='relu'){return [Math.max(0,x)/3,x>0?0.33:0];}
      if(t==='lrelu'){const v=x>0?x:0.1*x;return [v/3,x>0?0.33:0.033];}
    }
    function draw(){
      const t=document.getElementById('actSel').value;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#ddd';ctx.beginPath();ctx.moveTo(30,H/2);ctx.lineTo(W-20,H/2);ctx.moveTo(toPx(0),20);ctx.lineTo(toPx(0),H-20);ctx.stroke();
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;ctx.beginPath();
      for(let i=0;i<=200;i++){const x=xmin+(xmax-xmin)*i/200;const v=f(t,x)[0];if(i===0)ctx.moveTo(toPx(x),toPy(v));else ctx.lineTo(toPx(x),toPy(v));}
      ctx.stroke();
      ctx.strokeStyle='#ff8c00';ctx.setLineDash([4,4]);ctx.beginPath();
      for(let i=0;i<=200;i++){const x=xmin+(xmax-xmin)*i/200;const v=f(t,x)[1];if(i===0)ctx.moveTo(toPx(x),toPy(v));else ctx.lineTo(toPx(x),toPy(v));}
      ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#0b5fff';ctx.font='13px sans-serif';ctx.fillText('함수',W-100,30);
      ctx.fillStyle='#ff8c00';ctx.fillText('미분(점선)',W-100,48);
    }
    document.getElementById('actSel').onchange=draw;
    draw();
  })();
  </script>
