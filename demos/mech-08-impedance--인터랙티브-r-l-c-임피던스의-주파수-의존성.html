  <h1 class="page-title">🎮 인터랙티브: R, L, C 임피던스의 주파수 의존성</h1>
  <p class="demo-meta">
    기전공학기초 · <a href="../backup-lectures/lectures-mech/08-impedance.html">Week 8. 임피던스 — AC용 옴의 법칙</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: R, L, C 임피던스의 주파수 의존성</h4>
    <p>$|Z|$를 주파수에 대해 그립니다. 저항은 일정, 인덕터는 주파수에 비례, 커패시터는 반비례. 로그 축에서 보면 L과 C는 서로 거울 대칭입니다.</p>
    <canvas id="zwCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>R <span class="val" id="zwRV">100</span> Ω<input type="range" id="zwR" min="10" max="1000" step="10" value="100"></label>
      <label>L <span class="val" id="zwLV">10</span> mH<input type="range" id="zwL" min="0.1" max="100" step="0.1" value="10"></label>
      <label>C <span class="val" id="zwCV">10</span> μF<input type="range" id="zwC" min="0.1" max="100" step="0.1" value="10"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('zwCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const R=+document.getElementById('zwR').value;
      const L=+document.getElementById('zwL').value*1e-3;
      const Cv=+document.getElementById('zwC').value*1e-6;
      document.getElementById('zwRV').textContent=R;
      document.getElementById('zwLV').textContent=(L*1000).toFixed(1);
      document.getElementById('zwCV').textContent=(Cv*1e6).toFixed(1);
      const fmin=1,fmax=1e6;
      const lZmin=0,lZmax=5; // log10(Z): 1 to 100k
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      function x(f){return 60+(Math.log10(f)-Math.log10(fmin))/(Math.log10(fmax)-Math.log10(fmin))*(W-90);}
      function y(z){const lz=Math.log10(Math.max(1e-3,z));return H-50-(lz-lZmin)/(lZmax-lZmin)*(H-90);}
      ctx.strokeStyle='#ddd';
      for(let p=0;p<=6;p++){const f=Math.pow(10,p);ctx.beginPath();ctx.moveTo(x(f),y(1));ctx.lineTo(x(f),y(1e5));ctx.stroke();}
      for(let p=0;p<=5;p++){const z=Math.pow(10,p);ctx.beginPath();ctx.moveTo(x(fmin),y(z));ctx.lineTo(x(fmax),y(z));ctx.stroke();}
      ctx.strokeStyle='#666';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x(fmin),y(1));ctx.lineTo(x(fmax),y(1));ctx.stroke();
      ctx.beginPath();ctx.moveTo(x(fmin),y(1));ctx.lineTo(x(fmin),y(1e5));ctx.stroke();
      ctx.fillStyle='#666';ctx.font='11px sans-serif';
      for(let p=0;p<=6;p++){ctx.fillText('10^'+p,x(Math.pow(10,p))-12,H-35);}
      // R
      ctx.strokeStyle='#1b5e20';ctx.lineWidth=2;ctx.beginPath();
      ctx.moveTo(x(fmin),y(R));ctx.lineTo(x(fmax),y(R));ctx.stroke();
      // L
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2.5;ctx.beginPath();
      for(let lf=Math.log10(fmin);lf<=Math.log10(fmax);lf+=0.05){
        const f=Math.pow(10,lf);const z=2*Math.PI*f*L;
        if(lf===Math.log10(fmin))ctx.moveTo(x(f),y(z));else ctx.lineTo(x(f),y(z));
      }
      ctx.stroke();
      // C
      ctx.strokeStyle='#c62828';ctx.lineWidth=2.5;ctx.beginPath();
      for(let lf=Math.log10(fmin);lf<=Math.log10(fmax);lf+=0.05){
        const f=Math.pow(10,lf);const z=1/(2*Math.PI*f*Cv);
        if(lf===Math.log10(fmin))ctx.moveTo(x(f),y(z));else ctx.lineTo(x(f),y(z));
      }
      ctx.stroke();
      ctx.fillStyle='#1b5e20';ctx.font='13px sans-serif';
      ctx.fillText(`R = ${R} Ω`,W-150,30);
      ctx.fillStyle='#0b5fff';
      ctx.fillText(`Z_L = ωL ↑`,W-150,50);
      ctx.fillStyle='#c62828';
      ctx.fillText(`Z_C = 1/ωC ↓`,W-150,70);
      ctx.fillStyle='#666';ctx.font='12px sans-serif';
      ctx.fillText('주파수 f [Hz] (log)',W/2-50,H-15);
      ctx.save();ctx.translate(15,H/2);ctx.rotate(-Math.PI/2);ctx.fillText('|Z| [Ω] (log)',-30,0);ctx.restore();
    }
    ['zwR','zwL','zwC'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
    draw();
  })();
  </script>
