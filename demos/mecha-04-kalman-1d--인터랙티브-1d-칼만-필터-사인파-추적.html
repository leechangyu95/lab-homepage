  <h1 class="page-title">🎮 인터랙티브: 1D 칼만 필터 — 사인파 추적</h1>
  <p class="demo-meta">
    메카트로닉스 · <a href="../backup-lectures/lectures-mechatronics/04-kalman-1d.html">Week 4. 칼만 필터 (1D) — 측정과 모델의 융합</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 1D 칼만 필터 — 사인파 추적</h4>
    <p>참값(녹색)이 사인파처럼 움직이고, 측정(빨강)에는 잡음이 많아요. 측정 잡음 $R$과 모델 잡음 $Q$를 바꾸며 추정(파랑)이 어떻게 변하는지 보세요. <strong>$R$↑이면 측정 무시, $Q$↑이면 모델 무시</strong>.</p>
    <canvas id="kfMc" width="640" height="280"></canvas>
    <div class="controls">
      <label>측정 잡음 R <span class="val" id="kfRV">3</span><input type="range" id="kfR" min="0.1" max="10" step="0.1" value="3"></label>
      <label>모델 잡음 Q <span class="val" id="kfQV">0.1</span><input type="range" id="kfQ" min="0.01" max="2" step="0.01" value="0.1"></label>
      <button id="kfRst">리셋</button>
    </div>
    <p style="font-size:13px;color:#666">🟢 진짜 &nbsp; 🔴 측정 &nbsp; 🔵 KF 추정</p>
  </div>
  <script>
  (function(){
    const c=document.getElementById('kfMc');if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    let t=0,xh=0,P=1,hist=[];
    document.getElementById('kfRst').onclick=()=>{t=0;xh=0;P=1;hist=[];};
    function loop(){
      const R=+document.getElementById('kfR').value,Q=+document.getElementById('kfQ').value,dt=0.05,A=1,Hh=1;
      document.getElementById('kfRV').textContent=R.toFixed(1);
      document.getElementById('kfQV').textContent=Q.toFixed(2);
      const truth=20+15*Math.sin(t*0.5);
      const meas=truth+(Math.random()*2-1)*Math.sqrt(R)*1.5;
      const xp=A*xh, Pp=A*P*A+Q;
      const K=Pp*Hh/(Hh*Pp*Hh+R);
      xh=xp+K*(meas-Hh*xp);
      P=(1-K*Hh)*Pp;
      hist.push({truth,meas,est:xh});
      if(hist.length>300)hist.shift();
      t+=dt;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#eee';for(let i=0;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}
      const sx=v=>v*2.1, sy=v=>140-(v-20)*5;
      ctx.strokeStyle='#2e7d32';ctx.lineWidth=2;ctx.beginPath();
      hist.forEach((h,i)=>{const xx=sx(i),yy=sy(h.truth);if(i==0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);});ctx.stroke();
      ctx.fillStyle='#c62828';
      hist.forEach((h,i)=>{ctx.beginPath();ctx.arc(sx(i),sy(h.meas),1.5,0,Math.PI*2);ctx.fill();});
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;ctx.beginPath();
      hist.forEach((h,i)=>{const xx=sx(i),yy=sy(h.est);if(i==0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);});ctx.stroke();
      ctx.fillStyle='#666';ctx.font='12px sans-serif';
      ctx.fillText('K = '+K.toFixed(3)+'    P = '+P.toFixed(3),12,260);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
