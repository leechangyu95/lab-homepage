  <h1 class="page-title">🎮 인터랙티브: 옴의 법칙 V–I 곡선</h1>
  <p class="demo-meta">
    기전공학기초 · <a href="../backup-lectures/lectures-mech/02-basics.html">Week 2. 전기회로 기초</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 옴의 법칙 V–I 곡선</h4>
    <p>저항값을 바꿔가며 V–I 그래프의 기울기 변화를 봅니다. 같은 전압에서 저항이 클수록 전류가 작고, 그래프 기울기 $1/R$도 작아집니다. 빨간 점이 현재 동작점이에요.</p>
    <canvas id="ohmCanvas" width="640" height="320"></canvas>
    <div class="controls">
      <label>저항 R <span class="val" id="ohmRV">5</span> Ω<input type="range" id="ohmR" min="1" max="20" step="0.5" value="5"></label>
      <label>전압 V <span class="val" id="ohmVV">10</span> V<input type="range" id="ohmV" min="0" max="20" step="0.5" value="10"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('ohmCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const Vmax=20,Imax=5;
    function x(v){return 60+(v/Vmax)*(W-90);}
    function y(i){return H-50-(i/Imax)*(H-90);}
    function draw(){
      const R=+document.getElementById('ohmR').value;
      const V=+document.getElementById('ohmV').value;
      const I=V/R;
      document.getElementById('ohmRV').textContent=R.toFixed(1);
      document.getElementById('ohmVV').textContent=V.toFixed(1);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#ddd';ctx.lineWidth=1;
      for(let v=0;v<=Vmax;v+=2){ctx.beginPath();ctx.moveTo(x(v),y(0));ctx.lineTo(x(v),y(Imax));ctx.stroke();}
      for(let i=0;i<=Imax;i+=1){ctx.beginPath();ctx.moveTo(x(0),y(i));ctx.lineTo(x(Vmax),y(i));ctx.stroke();}
      ctx.strokeStyle='#666';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x(0),y(0));ctx.lineTo(x(Vmax),y(0));ctx.stroke();
      ctx.beginPath();ctx.moveTo(x(0),y(0));ctx.lineTo(x(0),y(Imax));ctx.stroke();
      ctx.fillStyle='#333';ctx.font='12px sans-serif';
      ctx.fillText('전압 V [V]',W/2-30,H-15);
      ctx.save();ctx.translate(15,H/2);ctx.rotate(-Math.PI/2);ctx.fillText('전류 I [A]',-25,0);ctx.restore();
      for(let v=0;v<=Vmax;v+=4){ctx.fillText(v,x(v)-5,H-35);}
      for(let i=0;i<=Imax;i+=1){ctx.fillText(i,30,y(i)+4);}
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(x(0),y(0));
      const Iend=Math.min(Imax,Vmax/R);
      ctx.lineTo(x(Iend*R),y(Iend));ctx.stroke();
      ctx.fillStyle='#c62828';
      ctx.beginPath();ctx.arc(x(V),y(Math.min(I,Imax)),7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#222';ctx.font='13px sans-serif';
      ctx.fillText(`I = V/R = ${V.toFixed(1)}/${R.toFixed(1)} = ${I.toFixed(2)} A`,60,30);
      ctx.fillText(`P = VI = ${(V*I).toFixed(2)} W`,60,50);
      ctx.fillStyle='#0b5fff';
      ctx.fillText(`기울기 1/R = ${(1/R).toFixed(3)}`,W-180,30);
    }
    document.getElementById('ohmR').addEventListener('input',draw);
    document.getElementById('ohmV').addEventListener('input',draw);
    draw();
  })();
  </script>
