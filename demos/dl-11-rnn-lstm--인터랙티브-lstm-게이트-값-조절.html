 onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]})"></script>

<main class="wrap">
  <a href="index.html" class="back-link">← Demos</a>
  <h1 class="page-title">🎮 인터랙티브: LSTM 게이트 값 조절</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/11-rnn-lstm.html">Week 11. RNN과 LSTM</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: LSTM 게이트 값 조절</h4>
    <p>세 게이트 값을 직접 움직이며 셀 상태가 어떻게 변하는지 보세요. 망각이 0이면 과거를 완전히 지우고, 입력이 0이면 새 정보를 받지 않습니다.</p>
    <canvas id="lstmCanvas" width="640" height="320"></canvas>
    <div class="controls">
      <label>망각 f <span class="val" id="fgV">0.9</span><input type="range" id="fg" min="0" max="1" step="0.01" value="0.9"></label>
      <label>입력 i <span class="val" id="igV">0.5</span><input type="range" id="ig" min="0" max="1" step="0.01" value="0.5"></label>
      <label>출력 o <span class="val" id="ogV">0.8</span><input type="range" id="og" min="0" max="1" step="0.01" value="0.8"></label>
      <button id="lstmRun">10스텝 실행</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('lstmCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function run(){
      const f=+document.getElementById('fg').value,i=+document.getElementById('ig').value,o=+document.getElementById('og').value;
      document.getElementById('fgV').textContent=f.toFixed(2);
      document.getElementById('igV').textContent=i.toFixed(2);
      document.getElementById('ogV').textContent=o.toFixed(2);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      let C=0,h=0;const Cs=[],hs=[];
      for(let t=0;t<10;t++){
        const x=Math.sin(t*0.6);
        const Cnew=Math.tanh(x+0.5*h);
        C=f*C+i*Cnew;
        h=o*Math.tanh(C);
        Cs.push(C);hs.push(h);
      }
      const xs=W-80,bw=xs/10;
      ctx.strokeStyle='#ddd';ctx.beginPath();ctx.moveTo(40,H/2);ctx.lineTo(W-20,H/2);ctx.stroke();
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;ctx.beginPath();
      Cs.forEach((v,k)=>{const x=40+k*bw,y=H/2-v*80;if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
      ctx.stroke();
      ctx.strokeStyle='#ff8c00';ctx.beginPath();
      hs.forEach((v,k)=>{const x=40+k*bw,y=H/2-v*80;if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
      ctx.stroke();
      ctx.fillStyle='#0b5fff';ctx.font='13px sans-serif';ctx.fillText('셀 상태 C',W-110,30);
      ctx.fillStyle='#ff8c00';ctx.fillText('출력 h',W-110,48);
    }
    ['fg','ig','og'].forEach(id=>document.getElementById(id).addEventListener('input',run));
    document.getElementById('lstmRun').onclick=run;
    run();
  })();
  </script>
</main>
</body>
</html>
