  <h1 class="page-title">🎮 인터랙티브: 1×1 합성곱 — 채널 병목의 마법</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/10-cnn-transfer.html">Week 10. CNN 심화와 전이학습</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 1×1 합성곱 — 채널 병목의 마법</h4>
    <p>5×5 합성곱을 그냥 적용할 때 vs 1×1로 채널을 먼저 줄인 뒤 5×5를 적용할 때의 <strong>곱셈 횟수</strong>를 직접 계산해 봅니다. 입력 채널을 키울수록 차이가 극적으로 벌어져요.</p>
    <canvas id="ococ" width="640" height="280"></canvas>
    <div class="controls">
      <label>입력 채널 $C_{in}$ <span class="val" id="oc1V">192</span><input type="range" id="oc1" min="32" max="512" step="16" value="192"></label>
      <label>출력 채널 $C_{out}$ <span class="val" id="oc2V">32</span><input type="range" id="oc2" min="16" max="128" step="8" value="32"></label>
      <label>1×1 병목 채널 <span class="val" id="oc3V">16</span><input type="range" id="oc3" min="4" max="64" step="4" value="16"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('ococ');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const Ci=+document.getElementById('oc1').value;
      const Co=+document.getElementById('oc2').value;
      const Cb=+document.getElementById('oc3').value;
      document.getElementById('oc1V').textContent=Ci;
      document.getElementById('oc2V').textContent=Co;
      document.getElementById('oc3V').textContent=Cb;
      const Hsize=28;
      const direct=Hsize*Hsize*5*5*Ci*Co;
      const bottleneck=Hsize*Hsize*1*1*Ci*Cb + Hsize*Hsize*5*5*Cb*Co;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const max=Math.max(direct,bottleneck);
      const barH=40,bx=180,bw=W-220;
      ctx.fillStyle='#222';ctx.font='13px sans-serif';
      ctx.fillText('5×5 직접 적용',12,55);
      ctx.fillStyle='#ff8c00';ctx.fillRect(bx,40,bw*direct/max,barH);
      ctx.fillStyle='#222';ctx.font='12px sans-serif';
      ctx.fillText(direct.toLocaleString()+' 곱셈',bx+8,68);
      ctx.fillStyle='#222';ctx.font='13px sans-serif';
      ctx.fillText('1×1 → 5×5',12,135);
      ctx.fillStyle='#0b5fff';ctx.fillRect(bx,120,bw*bottleneck/max,barH);
      ctx.fillStyle='#fff';ctx.font='12px sans-serif';
      ctx.fillText(bottleneck.toLocaleString()+' 곱셈',bx+8,148);
      const ratio=direct/bottleneck;
      ctx.fillStyle='#2e7d32';ctx.font='bold 16px sans-serif';
      ctx.fillText(`병목 적용 시 ${ratio.toFixed(1)}× 빠름 (계산량 ${(100*(1-bottleneck/direct)).toFixed(0)}% 감소)`,12,210);
      ctx.fillStyle='#666';ctx.font='12px sans-serif';
      ctx.fillText(`28×28×${Ci} → 28×28×${Co} 변환 기준`,12,235);
      ctx.fillText(`병목 = 1×1 (${Ci}→${Cb}) + 5×5 (${Cb}→${Co})`,12,253);
    }
    document.getElementById('oc1').addEventListener('input',draw);
    document.getElementById('oc2').addEventListener('input',draw);
    document.getElementById('oc3').addEventListener('input',draw);
    draw();
  })();
  </script>
