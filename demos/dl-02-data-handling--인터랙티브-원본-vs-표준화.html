  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/02-data-handling.html">Week 2. 데이터 핸들링</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 원본 vs 표준화</h4>
    <p>왼쪽은 원본 데이터, 오른쪽은 표준화한 데이터입니다. 두 컬럼의 스케일이 다를 때 표준화가 어떻게 데이터를 "둥글게" 만드는지 확인하세요.</p>
    <canvas id="stdCanvas" width="640" height="320"></canvas>
    <div class="controls">
      <label>X 스케일 <span class="val" id="sxV">3</span><input type="range" id="sx" min="1" max="6" step="0.1" value="3"></label>
      <label>Y 스케일 <span class="val" id="syV">1</span><input type="range" id="sy" min="0.2" max="3" step="0.1" value="1"></label>
      <button id="regenStd">새 데이터</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('stdCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    let raw=[];
    function gen(){
      raw=[];
      for(let i=0;i<60;i++){
        const u=Math.random(),v=Math.random();
        const z0=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
        const z1=Math.sqrt(-2*Math.log(u))*Math.sin(2*Math.PI*v);
        raw.push({x:z0,y:z1});
      }
      draw();
    }
    function draw(){
      const sx=+document.getElementById('sx').value,sy=+document.getElementById('sy').value;
      document.getElementById('sxV').textContent=sx.toFixed(1);
      document.getElementById('syV').textContent=sy.toFixed(1);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#ccc';ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
      const data=raw.map(p=>({x:p.x*sx+5,y:p.y*sy+2}));
      const xs=data.map(p=>p.x),ys=data.map(p=>p.y);
      const xmin=Math.min(...xs),xmax=Math.max(...xs),ymin=Math.min(...ys),ymax=Math.max(...ys);
      ctx.fillStyle='#0b5fff';
      data.forEach(p=>{
        const px=20+((p.x-xmin)/(xmax-xmin+1e-9))*(W/2-40);
        const py=20+((p.y-ymin)/(ymax-ymin+1e-9))*(H-40);
        ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fill();
      });
      const mx=xs.reduce((a,b)=>a+b)/xs.length,my=ys.reduce((a,b)=>a+b)/ys.length;
      const sxs=Math.sqrt(xs.reduce((a,b)=>a+(b-mx)*(b-mx),0)/xs.length);
      const sys=Math.sqrt(ys.reduce((a,b)=>a+(b-my)*(b-my),0)/ys.length);
      const z=data.map(p=>({x:(p.x-mx)/sxs,y:(p.y-my)/sys}));
      ctx.fillStyle='#ff8c00';
      const cx=3*W/4,cy=H/2,sc=40;
      z.forEach(p=>{ctx.beginPath();ctx.arc(cx+p.x*sc,cy+p.y*sc,3,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='#333';ctx.font='13px sans-serif';
      ctx.fillText('원본 데이터',20,15);ctx.fillText('표준화 (μ=0, σ=1)',W/2+20,15);
    }
    ['sx','sy'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
    document.getElementById('regenStd').addEventListener('click',gen);
    gen();
  })();
  </script>
