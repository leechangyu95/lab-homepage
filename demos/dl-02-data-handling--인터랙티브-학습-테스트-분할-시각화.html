    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/02-data-handling.html">Week 2. 데이터 핸들링</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 학습/테스트 분할 시각화</h4>
    <p>슬라이더로 테스트 비율을 바꾸고 셔플을 누르면, 데이터가 어떻게 두 그룹으로 나뉘는지 보입니다.</p>
    <canvas id="splitCanvas" width="640" height="240"></canvas>
    <div class="controls">
      <label>테스트 비율 <span class="val" id="trV">0.2</span><input type="range" id="tr" min="0.1" max="0.5" step="0.05" value="0.2"></label>
      <button id="shuf">셔플</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('splitCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const N=80;let order=[];
    function shuffle(){order=Array.from({length:N},(_,i)=>i).sort(()=>Math.random()-0.5);draw();}
    function draw(){
      const tr=+document.getElementById('tr').value;
      document.getElementById('trV').textContent=tr.toFixed(2);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const cols=20,cs=(W-40)/cols,rs=(H-40)/(N/cols);
      const cut=Math.floor(N*(1-tr));
      order.forEach((idx,k)=>{
        const r=Math.floor(k/cols),cc=k%cols;
        ctx.fillStyle=k<cut?'#0b5fff':'#ff8c00';
        ctx.fillRect(20+cc*cs,20+r*rs,cs-2,rs-2);
      });
      ctx.fillStyle='#333';ctx.font='13px sans-serif';
      ctx.fillText(`학습 ${cut}개`,20,15);ctx.fillText(`테스트 ${N-cut}개`,W-100,15);
    }
    document.getElementById('tr').addEventListener('input',draw);
    document.getElementById('shuf').addEventListener('click',shuffle);
    shuffle();
  })();
  </script>
