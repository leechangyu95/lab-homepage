  <h1 class="page-title">🎮 인터랙티브: 페이저 — 회전하는 화살표</h1>
  <p class="demo-meta">
    기전공학기초 · <a href="../backup-lectures/lectures-mech/06-ac-circuit.html">Week 6. 교류회로 — 정현파와 페이저</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 페이저 — 회전하는 화살표</h4>
    <p>왼쪽은 복소평면의 페이저(크기 $A$, 각도 $\theta$), 오른쪽은 시간 영역의 사인파. 페이저는 회전을 멈춘 정지 화상이고, 사인파는 그 회전의 실수부(수평 그림자)입니다.</p>
    <canvas id="phasorCanvas" width="640" height="300"></canvas>
    <div class="controls">
      <label>크기 |V| <span class="val" id="phAV">1.0</span><input type="range" id="phA" min="0.2" max="2" step="0.1" value="1"></label>
      <label>위상 θ <span class="val" id="phPV">0</span>°<input type="range" id="phP" min="0" max="360" step="10" value="0"></label>
      <label>애니메이션 t <span class="val" id="phTV">0.0</span> s<input type="range" id="phT" min="0" max="6.28" step="0.1" value="0"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('phasorCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const A=+document.getElementById('phA').value;
      const p=+document.getElementById('phP').value*Math.PI/180;
      const t=+document.getElementById('phT').value;
      document.getElementById('phAV').textContent=A.toFixed(1);
      document.getElementById('phPV').textContent=(p*180/Math.PI).toFixed(0);
      document.getElementById('phTV').textContent=t.toFixed(1);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      // Phasor on the left (radius up to 100)
      const cx=130,cy=H/2,r=80;
      ctx.strokeStyle='#ddd';
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(cx,cy,r/2,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='#666';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx-r-20,cy);ctx.lineTo(cx+r+20,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-r-20);ctx.lineTo(cx,cy+r+20);ctx.stroke();
      ctx.fillStyle='#666';ctx.font='11px sans-serif';
      ctx.fillText('Re',cx+r+22,cy+4);ctx.fillText('Im',cx-12,cy-r-22);
      // Rotating phasor
      const ang=p+t;
      const px=cx+r*A*Math.cos(ang);
      const py=cy-r*A*Math.sin(ang);
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(px,py);ctx.stroke();
      // Arrow head
      ctx.fillStyle='#0b5fff';
      ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();
      // Projection (real part)
      ctx.strokeStyle='#c62828';ctx.lineWidth=2;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px,cy);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#c62828';
      ctx.beginPath();ctx.arc(px,cy,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#222';ctx.font='12px sans-serif';
      ctx.fillText(`V = ${A.toFixed(2)}∠${(p*180/Math.PI).toFixed(0)}°`,40,30);
      // Time domain on the right
      const tx=290,tyc=H/2,tw=W-tx-20,th=80;
      ctx.strokeStyle='#666';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(tx,tyc);ctx.lineTo(tx+tw,tyc);ctx.stroke();
      ctx.beginPath();ctx.moveTo(tx,tyc-th);ctx.lineTo(tx,tyc+th);ctx.stroke();
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;
      ctx.beginPath();
      const Tspan=4*Math.PI;
      for(let s=0;s<=Tspan;s+=0.02){
        const v=A*Math.cos(s+p);
        const xx=tx+s/Tspan*tw;
        const yy=tyc-v*th/2;
        if(s===0)ctx.moveTo(xx,yy);else ctx.lineTo(xx,yy);
      }
      ctx.stroke();
      // Current point
      const cur=A*Math.cos(t+p);
      const cxp=tx+t/Tspan*tw;
      const cyp=tyc-cur*th/2;
      ctx.fillStyle='#c62828';
      ctx.beginPath();ctx.arc(cxp,cyp,6,0,Math.PI*2);ctx.fill();
      // Connect projection
      ctx.strokeStyle='#aaa';ctx.lineWidth=1;ctx.setLineDash([3,3]);
      ctx.beginPath();ctx.moveTo(px,cy);ctx.lineTo(cxp,cyp);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='#222';ctx.font='12px sans-serif';
      ctx.fillText(`v(t) = ${A.toFixed(1)}·cos(t + ${(p*180/Math.PI).toFixed(0)}°)`,tx+10,tyc-th-5);
      ctx.fillStyle='#c62828';
      ctx.fillText(`현재값: ${cur.toFixed(2)}`,tx+10,tyc+th+15);
    }
    ['phA','phP','phT'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
    draw();
  })();
  </script>
