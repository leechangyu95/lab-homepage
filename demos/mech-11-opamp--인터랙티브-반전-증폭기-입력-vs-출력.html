  <h1 class="page-title">🎮 인터랙티브: 반전 증폭기 — 입력 vs 출력</h1>
  <p class="demo-meta">
    기전공학기초 · <a href="../backup-lectures/lectures-mech/11-opamp.html">Week 11. 아날로그 기초·연산증폭기 — 두 줄 규칙으로 풀리는 마법</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 반전 증폭기 — 입력 vs 출력</h4>
    <p>$R_1$, $R_2$를 바꾸며 이득 $-R_2/R_1$이 어떻게 변하는지, 출력이 어떻게 입력의 부호 반전·크기 증폭이 되는지 봅니다. ±13V 포화 한계도 함께 표시합니다.</p>
    <canvas id="invCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>R₁ <span class="val" id="invR1V">10</span> kΩ<input type="range" id="invR1" min="1" max="100" step="1" value="10"></label>
      <label>R₂ <span class="val" id="invR2V">100</span> kΩ<input type="range" id="invR2" min="1" max="500" step="5" value="100"></label>
      <label>입력 진폭 <span class="val" id="invAV">0.5</span> V<input type="range" id="invA" min="0.1" max="3" step="0.1" value="0.5"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('invCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const Vsat=13;
    function draw(){
      const R1=+document.getElementById('invR1').value;
      const R2=+document.getElementById('invR2').value;
      const A=+document.getElementById('invA').value;
      document.getElementById('invR1V').textContent=R1;
      document.getElementById('invR2V').textContent=R2;
      document.getElementById('invAV').textContent=A.toFixed(1);
      const gain=-R2/R1;
      const Tspan=4*Math.PI;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      function x(t){return 60+t/Tspan*(W-90);}
      function y(v){return H/2-v/(Vsat+1)*(H-60)/2;}
      ctx.strokeStyle='#666';
      ctx.beginPath();ctx.moveTo(x(0),y(0));ctx.lineTo(x(Tspan),y(0));ctx.stroke();
      ctx.beginPath();ctx.moveTo(x(0),20);ctx.lineTo(x(0),H-30);ctx.stroke();
      ctx.strokeStyle='#999';ctx.lineWidth=1;ctx.setLineDash([6,3]);
      ctx.beginPath();ctx.moveTo(x(0),y(Vsat));ctx.lineTo(x(Tspan),y(Vsat));
      ctx.moveTo(x(0),y(-Vsat));ctx.lineTo(x(Tspan),y(-Vsat));ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2.5;ctx.beginPath();
      for(let t=0;t<=Tspan;t+=0.02){
        const v=A*Math.sin(t);
        if(t===0)ctx.moveTo(x(t),y(v));else ctx.lineTo(x(t),y(v));
      }
      ctx.stroke();
      ctx.strokeStyle='#c62828';ctx.lineWidth=2.5;ctx.beginPath();
      for(let t=0;t<=Tspan;t+=0.02){
        let v=gain*A*Math.sin(t);
        v=Math.max(-Vsat,Math.min(Vsat,v));
        if(t===0)ctx.moveTo(x(t),y(v));else ctx.lineTo(x(t),y(v));
      }
      ctx.stroke();
      ctx.fillStyle='#222';ctx.font='13px sans-serif';
      ctx.fillText(`이득 = −R_2/R_1 = ${gain.toFixed(2)}`,40,30);
      ctx.fillStyle='#0b5fff';
      ctx.fillText(`v_S = ${A.toFixed(1)} sin(t)`,W-300,30);
      ctx.fillStyle='#c62828';
      const peak=Math.abs(gain*A);
      ctx.fillText(`v_O peak ≈ ${peak.toFixed(2)} V${peak>Vsat?' (포화!)':''}`,W-160,30);
    }
    ['invR1','invR2','invA'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
    draw();
  })();
  </script>
