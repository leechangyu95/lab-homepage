  <h1 class="page-title">🎮 인터랙티브: Self-Attention 행렬</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/13-transformer-llm.html">Week 13. Transformer와 LLM</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: Self-Attention 행렬</h4>
    <p>5단어 문장의 Q·K^T 행렬을 시각화합니다. 행은 query, 열은 key. 각 셀의 색은 그 두 단어의 어울림 점수입니다.</p>
    <canvas id="saCanvas" width="640" height="380"></canvas>
    <div class="controls">
      <label>온도 (softmax) <span class="val" id="tpV">1</span><input type="range" id="tp" min="0.2" max="3" step="0.05" value="1"></label>
      <button id="saRegen">새 패턴</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('saCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const toks=['The','cat','sat','on','mat'];
    let scores=[];
    function gen(){
      scores=[];
      for(let i=0;i<5;i++){const r=[];for(let j=0;j<5;j++){r.push(Math.random()*4-1);}scores.push(r);}
      draw();
    }
    function draw(){
      const T=+document.getElementById('tp').value;
      document.getElementById('tpV').textContent=T.toFixed(2);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const cell=50,x0=120,y0=70;
      ctx.fillStyle='#333';ctx.font='13px sans-serif';
      for(let i=0;i<5;i++){ctx.fillText(toks[i],x0+i*cell+10,y0-10);ctx.fillText(toks[i],x0-70,y0+i*cell+30);}
      const M=[];
      for(let i=0;i<5;i++){
        const exps=scores[i].map(s=>Math.exp(s/T));
        const sm=exps.reduce((a,b)=>a+b);
        M.push(exps.map(v=>v/sm));
      }
      for(let i=0;i<5;i++)for(let j=0;j<5;j++){
        const v=M[i][j];const t=Math.floor(255-v*255);
        ctx.fillStyle=`rgb(${t},${t},255)`;
        ctx.fillRect(x0+j*cell,y0+i*cell,cell-2,cell-2);
        ctx.fillStyle=v>0.5?'#fff':'#333';ctx.font='12px sans-serif';
        ctx.fillText(v.toFixed(2),x0+j*cell+10,y0+i*cell+30);
      }
      ctx.fillStyle='#666';ctx.font='12px sans-serif';
      ctx.fillText('row = Query, col = Key',x0,y0+5*cell+25);
    }
    document.getElementById('tp').addEventListener('input',draw);
    document.getElementById('saRegen').onclick=gen;
    gen();
  })();
  </script>
</main>
