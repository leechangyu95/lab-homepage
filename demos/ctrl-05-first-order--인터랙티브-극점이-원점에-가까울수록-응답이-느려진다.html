  <h1 class="page-title">인터랙티브: 극점이 원점에 가까울수록 응답이 느려진다</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/05-first-order.html">Week 5. 1차 시스템 시간응답</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>인터랙티브: 극점이 원점에 가까울수록 응답이 느려진다</h4>
    <p>왼쪽 s-평면의 빨간 극점을 슬라이더로 좌우로 옮겨 보세요. 극점이 원점(허수축)에 가까우면 시스템이 느려지고,
    멀어지면 빨라집니다. 오른쪽 시간응답이 동시에 변합니다.</p>
    <canvas id="c5pole" width="640" height="320"></canvas>
    <div class="controls">
      <label>극점 위치 s = −1/τ <span class="val" id="c5pV">-1.00</span><input type="range" id="c5p" min="-6" max="-0.2" step="0.05" value="-1.0"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('c5pole'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('c5pV').textContent=(+$('c5p').value).toFixed(2);};
    $('c5p').oninput=upd;
    function loop(){
      const p=+$('c5p').value;
      const tau=-1/p;
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      // s-plane on left
      const cx=140, cy=160, sc=30;
      x.fillStyle='rgba(198,40,40,0.06)';x.fillRect(cx,20,160,280);
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(20,cy);x.lineTo(280,cy);x.moveTo(cx,20);x.lineTo(cx,300);x.stroke();
      x.fillStyle='#666';x.font='10px sans-serif';x.fillText('Re',272,cy-4);x.fillText('Im',cx+5,28);
      x.fillText('-5',cx-5*sc-6,cy+14);x.fillText('-3',cx-3*sc-6,cy+14);x.fillText('-1',cx-sc-6,cy+14);
      // pole
      const px=cx+p*sc;
      x.fillStyle='#c62828';x.beginPath();x.arc(px,cy,7,0,Math.PI*2);x.fill();
      x.strokeStyle='#c62828';x.lineWidth=2;x.beginPath();
      x.moveTo(px-5,cy-5);x.lineTo(px+5,cy+5);x.moveTo(px-5,cy+5);x.lineTo(px+5,cy-5);x.stroke();
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('s = '+p.toFixed(2)+'   τ = '+tau.toFixed(2)+' s',20,30);
      // mode line e^{pt} arrow
      x.strokeStyle='#0b5fff';x.beginPath();x.moveTo(px,cy);x.lineTo(px-30,cy-30);x.stroke();
      x.fillStyle='#0b5fff';x.font='11px sans-serif';x.fillText('e^(pt) 모드',px-50,cy-35);
      // step response right
      const ox=320, oy=270, w=300, h=200, T=10;
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,oy);x.lineTo(ox+w,oy);x.moveTo(ox,oy-h);x.lineTo(ox,oy);x.stroke();
      x.strokeStyle='#c62828';x.setLineDash([3,3]);x.beginPath();x.moveTo(ox,oy-h*0.6);x.lineTo(ox+w,oy-h*0.6);x.stroke();x.setLineDash([]);
      x.fillStyle='#c62828';x.font='10px sans-serif';x.fillText('K=1',ox+w-25,oy-h*0.6-2);
      // 0.632 line
      x.strokeStyle='#2e7d32';x.setLineDash([2,3]);x.beginPath();x.moveTo(ox,oy-h*0.6*0.632).constructor; x.beginPath();
      x.moveTo(ox,oy-h*0.6*0.632);x.lineTo(ox+w,oy-h*0.6*0.632);x.stroke();x.setLineDash([]);
      x.fillStyle='#2e7d32';x.fillText('0.632',ox+w-30,oy-h*0.6*0.632-2);
      // response curve
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      for(let i=0;i<=300;i++){const t=i*T/300, y=1-Math.exp(-t/tau);
        const xx=ox+i*w/300, yy=oy-y*h*0.6; if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}
      x.stroke();
      // mark tau
      if(tau<T){const tx=ox+tau*w/T;
        x.strokeStyle='#888';x.setLineDash([1,2]);x.beginPath();
        x.moveTo(tx,oy);x.lineTo(tx,oy-h*0.6*0.632);x.stroke();x.setLineDash([]);
        x.fillStyle='#444';x.fillText('τ='+tau.toFixed(2)+'s',tx-15,oy+12);}
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('계단응답  y(t)=1-e^(-t/τ)',ox,290);
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
