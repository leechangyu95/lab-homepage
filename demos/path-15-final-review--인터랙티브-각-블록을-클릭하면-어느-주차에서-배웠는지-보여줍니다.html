  <h1 class="page-title">🎮 인터랙티브: 각 블록을 클릭하면 어느 주차에서 배웠는지 보여줍니다</h1>
  <p class="demo-meta">
    경로계획 &amp; 추종 · <a href="../backup-lectures/lectures-path-planning/15-final-review.html">Week 15. 기말 전체 정리</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 각 블록을 클릭하면 어느 주차에서 배웠는지 보여줍니다</h4>
    <canvas id="pipe" width="640" height="220"></canvas>
    <p id="pipeMsg" style="margin-top:8px;color:var(--muted);font-size:13px">블록을 클릭하면 설명이 여기에 나옵니다.</p>
  </div>
  <script>
  (function(){
    const c=document.getElementById('pipe'),x=c.getContext('2d'),msg=document.getElementById('pipeMsg');
    const blocks=[
      {label:'Perception',sub:'(입력 가정)',col:'#f3e5f5',bd:'#9c27b0',w:120,info:'본 강의 범위 외. 카메라·LiDAR·Radar로 세상을 인식.'},
      {label:'Planning',sub:'W5–W7',col:'#eef3ff',bd:'#0b5fff',w:120,info:'W5 지도 표현 → W6 RRT / W7 A*. "어디로 갈까"의 답.'},
      {label:'Tracking',sub:'W9–W11',col:'#e8f5e9',bd:'#2e7d32',w:120,info:'W9 PID + W10 Pure Pursuit/Stanley + W11 통합 시뮬레이션.'},
      {label:'Safety',sub:'W12 CBF',col:'#fce4ec',bd:'#c62828',w:100,info:'W12 Control Barrier Function. 모든 명령에 안전 제약을 부여.'},
      {label:'Advanced',sub:'W13–W14',col:'#fff3e0',bd:'#f57c00',w:120,info:'W13 MPC: 미래 예측 + 최적화. W14 RL: 경험 기반 학습.'}
    ];
    const y0=70,h=70;let xs=20;blocks.forEach(b=>{b.x=xs;b.y=y0;b.h=h;xs+=b.w+12;});
    function draw(highlight){
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      blocks.forEach(b=>{
        x.fillStyle=b.col;x.strokeStyle=b.bd;x.lineWidth=highlight===b?3:1.2;
        x.fillRect(b.x,b.y,b.w,b.h);x.strokeRect(b.x,b.y,b.w,b.h);
        x.fillStyle='#222';x.font='14px sans-serif';x.fillText(b.label,b.x+10,b.y+28);
        x.fillStyle='#666';x.font='12px sans-serif';x.fillText(b.sub,b.x+10,b.y+48);
      });
      x.fillStyle='#666';x.font='12px sans-serif';x.fillText('자율주행 파이프라인 (좌→우)',12,24);
    }
    draw();
    c.addEventListener('click',e=>{const r=c.getBoundingClientRect();const px=e.clientX-r.left,py=e.clientY-r.top;
      const hit=blocks.find(b=>px>=b.x&&px<=b.x+b.w&&py>=b.y&&py<=b.y+b.h);
      if(hit){draw(hit);msg.textContent=hit.label+' — '+hit.info;}});
  })();
  </script>
</main>
</body>
