  <h1 class="page-title">🎮 인터랙티브: 논리 게이트 7가지</h1>
  <p class="demo-meta">
    기전공학기초 · <a href="../backup-lectures/lectures-mech/12-digital.html">Week 12. 디지털 논리 — 0과 1로 짓는 컴퓨터</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 논리 게이트 7가지</h4>
    <p>입력 A, B를 토글하며 7가지 게이트의 출력을 동시에 봅니다. 출력이 1이면 파란색.</p>
    <canvas id="gateCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>A
        <select id="gateA"><option value="0">0</option><option value="1">1</option></select>
      </label>
      <label>B
        <select id="gateB"><option value="0">0</option><option value="1">1</option></select>
      </label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('gateCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const gates=[
      {name:'AND',sym:'A·B',f:(a,b)=>a&b},
      {name:'OR',sym:'A+B',f:(a,b)=>a|b},
      {name:'NOT',sym:'~A',f:(a)=>1-a},
      {name:'NAND',sym:'~(A·B)',f:(a,b)=>1-(a&b)},
      {name:'NOR',sym:'~(A+B)',f:(a,b)=>1-(a|b)},
      {name:'XOR',sym:'A⊕B',f:(a,b)=>a^b},
      {name:'XNOR',sym:'A⊙B',f:(a,b)=>1-(a^b)}
    ];
    function draw(){
      const A=+document.getElementById('gateA').value;
      const B=+document.getElementById('gateB').value;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#222';ctx.font='15px sans-serif';
      ctx.fillText(`현재 입력: A=${A}, B=${B}`,30,30);
      gates.forEach((g,gi)=>{
        const col=gi%4,row=Math.floor(gi/4);
        const gx=30+col*150,gy=60+row*100;
        const out=g.name==='NOT'?g.f(A):g.f(A,B);
        ctx.fillStyle=out?'#0b5fff':'#bbb';
        ctx.fillRect(gx,gy,135,80);
        ctx.strokeStyle='#222';ctx.lineWidth=1.5;ctx.strokeRect(gx,gy,135,80);
        ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';
        ctx.fillText(g.name,gx+10,gy+25);
        ctx.font='12px sans-serif';
        ctx.fillText(g.sym,gx+10,gy+45);
        ctx.font='bold 22px sans-serif';
        ctx.fillText('→ '+out,gx+10,gy+70);
      });
      ctx.fillStyle='#666';ctx.font='12px sans-serif';
      ctx.fillText('NOT은 A만 사용. 모든 게이트가 동시에 같은 입력을 받습니다.',30,H-15);
    }
    ['gateA','gateB'].forEach(id=>document.getElementById(id).addEventListener('change',draw));
    draw();
  })();
  </script>
