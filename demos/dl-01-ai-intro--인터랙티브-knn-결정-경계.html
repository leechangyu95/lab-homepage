  <h1 class="page-title">🎮 인터랙티브: KNN 결정 경계</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/01-ai-intro.html">Week 1. AI의 세계</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: KNN 결정 경계</h4>
    <p>도미(파랑)와 빙어(주황) 데이터입니다. K를 조절하며 결정 경계가 어떻게 변하는지 보세요. 캔버스를 클릭해 새 데이터를 추가할 수 있고, 우클릭은 빙어입니다.</p>
    <canvas id="knn" width="640" height="380"></canvas>
    <div class="controls">
      <label>K (이웃 수) <span class="val" id="kV">5</span><input type="range" id="k" min="1" max="29" step="2" value="5"></label>
      <button id="rst">리셋</button>
      <span style="font-size:12px;color:#666">🔵 도미 &nbsp; 🟠 빙어 &nbsp; 클릭: 도미 추가, 우클릭: 빙어 추가</span>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('knn');
    if(!c)return;
    const ctx=c.getContext('2d');
    let pts=[];
    function seed(){
      pts=[];
      for(let i=0;i<25;i++)pts.push({x:380+Math.random()*180,y:80+Math.random()*120,c:0});
      for(let i=0;i<15;i++)pts.push({x:80+Math.random()*150,y:230+Math.random()*120,c:1});
    }
    seed();
    c.oncontextmenu=e=>{e.preventDefault();const r=c.getBoundingClientRect();pts.push({x:(e.clientX-r.left)*c.width/r.width,y:(e.clientY-r.top)*c.height/r.height,c:1});draw();};
    c.onclick=e=>{const r=c.getBoundingClientRect();pts.push({x:(e.clientX-r.left)*c.width/r.width,y:(e.clientY-r.top)*c.height/r.height,c:0});draw();};
    document.getElementById('rst').onclick=()=>{seed();draw();};
    document.getElementById('k').addEventListener('input',()=>{
      document.getElementById('kV').textContent=document.getElementById('k').value;
      draw();
    });
    function draw(){
      const K=+document.getElementById('k').value;
      const STEP=12;
      ctx.clearRect(0,0,c.width,c.height);
      for(let i=0;i<c.width;i+=STEP)for(let j=0;j<c.height;j+=STEP){
        const ds=pts.map(p=>({d:Math.hypot(p.x-i,p.y-j),c:p.c})).sort((a,b)=>a.d-b.d).slice(0,K);
        const v=ds.reduce((s,d)=>s+(d.c==0?1:-1),0);
        ctx.fillStyle=v>=0?'rgba(11,95,255,0.10)':'rgba(255,140,0,0.12)';
        ctx.fillRect(i,j,STEP,STEP);
      }
      pts.forEach(p=>{ctx.fillStyle=p.c==0?'#0b5fff':'#ff8c00';ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.stroke();});
    }
    draw();
  })();
  </script>
