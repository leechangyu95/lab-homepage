<main class="wrap">
  <a href="index.html" class="back-link">← Demos</a>
  <h1 class="page-title">🎮 인터랙티브: PN vs PPG 동시 비교</h1>
  <p class="demo-meta">
    로봇공학특론 · <a href="../backup-lectures/lectures/08-guidance-cbf.html">Lecture 8. 유도 &amp; 제어 장벽 함수 (CBF)</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: PN vs PPG 동시 비교</h4>
    <p>같은 시작 조건으로 PPG(주황)와 PN(파랑)을 동시에 발사합니다. PN의 궤적이 훨씬 더 직선에 가까운 것을 볼 수 있습니다. 횡가속도(|a|)와 명중 시각도 비교하세요.</p>
    <canvas id="pn" width="640" height="380"></canvas>
    <div class="controls">
      <label>표적 패턴
        <select id="pnPat">
          <option value="straight">직선</option>
          <option value="sine" selected>사인 회피</option>
          <option value="evade">급기동 회피</option>
        </select>
      </label>
      <label>항법상수 N <span class="val" id="pnNV">3.0</span><input type="range" id="pnN" min="1" max="6" step="0.1" value="3"></label>
      <label>회전 한계 ω_max <span class="val" id="pnOmaxV">3</span><input type="range" id="pnOmax" min="0.5" max="6" step="0.1" value="3"></label>
      <button id="pnRst">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('pn'),x=c.getContext('2d');
    const sl=(id)=>document.getElementById(id);
    const W=c.width,H=c.height;
    const aDiff=(a,b)=>((a-b+Math.PI*3)%(2*Math.PI))-Math.PI;
    let mp,mn,t,tk,lamPrev,hist,phitT,nhitT;
    function reset(){
      mp={x:60,y:340,th:-0.4,v:120,alive:true,latAcc:0};
      mn={x:60,y:340,th:-0.4,v:120,alive:true,latAcc:0};
      t={x:560,y:60,th:Math.PI*0.65,v:55};
      tk=0;
      lamPrev=Math.atan2(t.y-mn.y,t.x-mn.x);
      hist={mp:[],mn:[],t:[]};
      phitT=null;nhitT=null;
    }
    reset();
    sl('pnRst').onclick=reset;
    function moveTarget(dt){
      const pat=sl('pnPat').value;
      if(pat==='sine')t.th+=1.8*Math.cos(tk*1.5)*dt;
      else if(pat==='evade')t.th+=2.4*Math.cos(tk*2.2)*dt;
      t.x+=t.v*Math.cos(t.th)*dt;
      t.y+=t.v*Math.sin(t.th)*dt;
      if(t.x<20){t.x=20;t.th=Math.PI-t.th;}
      if(t.x>W-20){t.x=W-20;t.th=Math.PI-t.th;}
      if(t.y<20){t.y=20;t.th=-t.th;}
      if(t.y>H-20){t.y=H-20;t.th=-t.th;}
      tk+=dt;
    }
    function loop(){
      sl('pnNV').textContent=(+sl('pnN').value).toFixed(1);
      sl('pnOmaxV').textContent=sl('pnOmax').value;
      const dt=0.04,omegaMax=+sl('pnOmax').value,N=+sl('pnN').value;
      moveTarget(dt);
      // PPG (orange)
      if(mp.alive){
        const lam=Math.atan2(t.y-mp.y,t.x-mp.x);
        const desiredTurn=aDiff(lam,mp.th);
        const omega=Math.max(-omegaMax,Math.min(omegaMax,desiredTurn/dt));
        mp.latAcc=omega*mp.v;
        mp.th+=omega*dt;
        mp.x+=mp.v*Math.cos(mp.th)*dt;
        mp.y+=mp.v*Math.sin(mp.th)*dt;
        if(Math.hypot(t.x-mp.x,t.y-mp.y)<10){mp.alive=false;phitT=tk;}
      }
      // PN (blue)
      if(mn.alive){
        const lam=Math.atan2(t.y-mn.y,t.x-mn.x);
        const lamDot=aDiff(lam,lamPrev)/dt;
        lamPrev=lam;
        const omega=Math.max(-omegaMax,Math.min(omegaMax,N*lamDot));
        mn.latAcc=omega*mn.v;
        mn.th+=omega*dt;
        mn.x+=mn.v*Math.cos(mn.th)*dt;
        mn.y+=mn.v*Math.sin(mn.th)*dt;
        if(Math.hypot(t.x-mn.x,t.y-mn.y)<10){mn.alive=false;nhitT=tk;}
      }
      hist.mp.push({x:mp.x,y:mp.y});
      hist.mn.push({x:mn.x,y:mn.y});
      hist.t.push({x:t.x,y:t.y});
      if(hist.mp.length>500){hist.mp.shift();hist.mn.shift();hist.t.shift();}
      if((!mp.alive&&!mn.alive&&tk>Math.max(phitT||0,nhitT||0)+1.5)||tk>18)reset();
      // render
      x.fillStyle='#fafbfc';x.fillRect(0,0,W,H);
      x.strokeStyle='#eee';
      for(let i=0;i<W;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke();}
      for(let j=0;j<H;j+=40){x.beginPath();x.moveTo(0,j);x.lineTo(W,j);x.stroke();}
      x.strokeStyle='rgba(245,124,0,0.7)';x.lineWidth=2;x.beginPath();
      hist.mp.forEach((p,i)=>{if(i==0)x.moveTo(p.x,p.y);else x.lineTo(p.x,p.y);});x.stroke();
      x.strokeStyle='rgba(11,95,255,0.7)';x.beginPath();
      hist.mn.forEach((p,i)=>{if(i==0)x.moveTo(p.x,p.y);else x.lineTo(p.x,p.y);});x.stroke();
      x.strokeStyle='rgba(198,40,40,0.4)';x.beginPath();
      hist.t.forEach((p,i)=>{if(i==0)x.moveTo(p.x,p.y);else x.lineTo(p.x,p.y);});x.stroke();
      if(mp.alive){
        x.save();x.translate(mp.x,mp.y);x.rotate(mp.th);
        x.fillStyle='#f57c00';
        x.beginPath();x.moveTo(14,0);x.lineTo(-9,-6);x.lineTo(-9,6);x.closePath();x.fill();
        x.restore();
      }
      if(mn.alive){
        x.save();x.translate(mn.x,mn.y);x.rotate(mn.th);
        x.fillStyle='#0b5fff';
        x.beginPath();x.moveTo(14,0);x.lineTo(-9,-6);x.lineTo(-9,6);x.closePath();x.fill();
        x.restore();
      }
      x.fillStyle='#c62828';x.beginPath();x.arc(t.x,t.y,7,0,Math.PI*2);x.fill();
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('🟠 PPG  ·  🔵 PN (N='+(+sl('pnN').value).toFixed(1)+')  ·  🔴 표적',12,22);
      const sp=mp.alive?'추적':'명중@'+phitT.toFixed(1)+'s';
      const sn=mn.alive?'추적':'명중@'+nhitT.toFixed(1)+'s';
      x.fillStyle='#666';
      x.fillText('PPG '+sp+'  ·  PN '+sn+'  ·  |a_PPG|='+Math.abs(mp.latAcc).toFixed(0)+'  ·  |a_PN|='+Math.abs(mn.latAcc).toFixed(0)+'  ·  t='+tk.toFixed(1)+'s',12,H-10);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
</main>
