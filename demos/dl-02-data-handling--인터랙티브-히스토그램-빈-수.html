  <h1 class="page-title">🎮 인터랙티브: 히스토그램 빈 수</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/02-data-handling.html">Week 2. 데이터 핸들링</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 히스토그램 빈 수</h4>
    <p>같은 데이터도 빈(bin)을 몇 개로 나누느냐에 따라 모양이 달라집니다. 너무 적으면 거칠고, 너무 많으면 잡음이 보입니다.</p>
    <canvas id="histCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>빈 수 <span class="val" id="bnV">15</span><input type="range" id="bn" min="5" max="40" step="1" value="15"></label>
      <button id="histRegen">새 데이터</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('histCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    let data=[];
    function gen(){
      data=[];
      for(let i=0;i<400;i++){
        const u=Math.random(),v=Math.random();
        const z=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
        data.push(z);
      }
      draw();
    }
    function draw(){
      const B=+document.getElementById('bn').value;
      document.getElementById('bnV').textContent=B;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const mn=-3,mx=3,bw=(mx-mn)/B;
      const bins=new Array(B).fill(0);
      data.forEach(d=>{const b=Math.min(B-1,Math.max(0,Math.floor((d-mn)/bw)));bins[b]++;});
      const peak=Math.max(...bins);
      bins.forEach((v,i)=>{
        const x=20+i*((W-40)/B),y=H-30-(v/peak)*(H-60);
        ctx.fillStyle='#0b5fff';
        ctx.fillRect(x,y,(W-40)/B-2,H-30-y);
      });
      ctx.strokeStyle='#333';ctx.beginPath();ctx.moveTo(20,H-30);ctx.lineTo(W-20,H-30);ctx.stroke();
    }
    document.getElementById('bn').addEventListener('input',draw);
    document.getElementById('histRegen').addEventListener('click',gen);
    gen();
  })();
  </script>
