  <h1 class="page-title">🎮 인터랙티브: 도로 경사 변화에 대응</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/14-mobile-drone.html">Week 14. PID 응용 ② — 모바일 로봇·드론</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 도로 경사 변화에 대응</h4>
    <p>차량이 평지를 달리다가 경사 5°를 만나는 시나리오. 단순 P vs PI 비교로 정상오차 차이를 확인하세요.</p>
    <canvas id="c14cc" width="640" height="320"></canvas>
    <div class="controls">
      <label>Kp <span class="val" id="c14ccKpV">800</span><input type="range" id="c14ccKp" min="100" max="3000" step="50" value="800"></label>
      <label>Ki <span class="val" id="c14ccKiV">200</span><input type="range" id="c14ccKi" min="0" max="1500" step="20" value="200"></label>
      <label>경사각(°) <span class="val" id="c14ccAlV">5</span><input type="range" id="c14ccAl" min="0" max="15" step="0.5" value="5"></label>
      <button id="c14ccTrig">경사 시작/종료</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('c14cc'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('c14ccKpV').textContent=$('c14ccKp').value;$('c14ccKiV').textContent=$('c14ccKi').value;$('c14ccAlV').textContent=(+$('c14ccAl').value).toFixed(1);};
    ['c14ccKp','c14ccKi','c14ccAl'].forEach(id=>$(id).oninput=upd);
    let slope=false; $('c14ccTrig').onclick=()=>slope=!slope;
    let v=0, iE=0, hist=[], rHist=[], slHist=[];
    function loop(){
      const Kp=+$('c14ccKp').value, Ki=+$('c14ccKi').value, al=+$('c14ccAl').value*Math.PI/180;
      const m=1500, b=50, g=9.81, dt=0.05;
      const ref = 27.78; // 100 km/h
      const e = ref - v;
      const u_pre = Kp*e + Ki*iE;
      const u = Math.max(-8000, Math.min(8000, u_pre));
      if(u===u_pre) iE += e*dt;
      const slv = slope ? al : 0;
      const vd = (u - b*v - m*g*Math.sin(slv))/m;
      v += vd*dt;
      hist.push(v); rHist.push(ref); slHist.push(slv);
      if(hist.length>500){hist.shift();rHist.shift();slHist.shift();}
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      const ox=40, oy=240, w=560, h=180;
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,oy);x.lineTo(ox+w,oy);x.moveTo(ox,oy-h);x.lineTo(ox,oy);x.stroke();
      x.strokeStyle='#c62828';x.setLineDash([3,3]);x.beginPath();
      rHist.forEach((vv,i)=>{const xx=ox+i*w/500, yy=oy-vv*h*0.025;
        if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}); x.stroke();x.setLineDash([]);
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      hist.forEach((vv,i)=>{const xx=ox+i*w/500, yy=oy-Math.max(0,Math.min(40,vv))*h*0.025;
        if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}); x.stroke();
      x.strokeStyle='#9c27b0';x.lineWidth=1.5;x.beginPath();
      slHist.forEach((vv,i)=>{const xx=ox+i*w/500, yy=oy-vv*180/Math.PI*h*0.025;
        if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}); x.stroke();
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('파랑 = 속도 [m/s], 빨강 = 100km/h 목표, 보라 = 경사각×scale',ox,oy+18);
      x.fillText('현재 v = '+(v*3.6).toFixed(1)+' km/h,  iE = '+iE.toFixed(2),ox,oy+34);
      x.fillStyle=slope?'#c62828':'#2e7d32';
      x.fillText(slope?'경사 ON':'평지',ox,oy+52);
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
