<main class="wrap">

  <h1 class="page-title">🎮 편미분 = 한 변수 고정 후의 접선 기울기</h1>
  <p class="demo-meta">
    미분적분학 · <a href="../backup-lectures/lectures-calculus/13-multivariable-gradient.html">Week 13. 다변수 함수 &amp; 그라디언트</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 편미분 = 한 변수 고정 후의 접선 기울기</h4>
    <p>$y$ 를 고정하면 $z$ 는 $x$ 만의 함수 — 곡선 한 줄. 그 점에서의 접선 기울기가 정확히 $f_x$. $x$ 를 고정해도 마찬가지로 $f_y$.</p>
    <canvas id="ps" width="640" height="360"></canvas>
    <div class="controls">
      <label>함수
        <select id="psFn">
          <option value="bowl" selected>z = x² + y²</option>
          <option value="saddle">z = x² − y²</option>
          <option value="peaks">z = sin x + cos y</option>
        </select>
      </label>
      <label>고정 변수
        <select id="psV">
          <option value="y" selected>y 고정 → x 의 함수</option>
          <option value="x">x 고정 → y 의 함수</option>
        </select>
      </label>
      <label>고정값 <span class="val" id="psFV">0.50</span><input type="range" id="psFix" min="-2" max="2" step="0.05" value="0.5"></label>
      <label>관찰 점 <span class="val" id="psPV">0.80</span><input type="range" id="psP" min="-2" max="2" step="0.05" value="0.8"></label>
    </div>
    <p id="psInfo" style="margin-top:8px;font-family:Consolas,monospace;font-size:12px;color:#0742b8"></p>
  </div>
  <script>
  (function(){
    const c=document.getElementById('ps'),x=c.getContext('2d');
    const W=c.width,H=c.height;
    function fAndPartials(xv,yv){
      const m=document.getElementById('psFn').value;
      if(m==='bowl')return{f:xv*xv+yv*yv,fx:2*xv,fy:2*yv};
      if(m==='saddle')return{f:xv*xv-yv*yv,fx:2*xv,fy:-2*yv};
      return{f:Math.sin(xv)+Math.cos(yv),fx:Math.cos(xv),fy:-Math.sin(yv)};
    }
    function loop(){
      const fix=+document.getElementById('psFix').value;
      const pv=+document.getElementById('psP').value;
      const v=document.getElementById('psV').value;
      document.getElementById('psFV').textContent=fix.toFixed(2);
      document.getElementById('psPV').textContent=pv.toFixed(2);
      x.fillStyle='#fafbfc';x.fillRect(0,0,W,H);
      // left: contour map with horizontal/vertical line showing fixed slice
      const Lx0=20,Lx1=W/2-10,Ly0=20,Ly1=H-20;
      x.strokeStyle='#ddd';x.strokeRect(Lx0,Ly0,Lx1-Lx0,Ly1-Ly0);
      const xR=[-2.5,2.5],yR=[-2.5,2.5];
      function pxL(v){return Lx0+(v-xR[0])/(xR[1]-xR[0])*(Lx1-Lx0);}
      function pyL(v){return Ly1-(v-yR[0])/(yR[1]-yR[0])*(Ly1-Ly0);}
      // contour fill
      const cell=10;
      let vmin=Infinity,vmax=-Infinity;
      for(let i=0;i<6;i++)for(let j=0;j<6;j++){
        const xv=xR[0]+(i+0.5)/6*(xR[1]-xR[0]),yv=yR[0]+(j+0.5)/6*(yR[1]-yR[0]);
        const f=fAndPartials(xv,yv).f;if(f<vmin)vmin=f;if(f>vmax)vmax=f;
      }
      for(let i=Lx0;i<Lx1;i+=cell){
        for(let j=Ly0;j<Ly1;j+=cell){
          const xv=xR[0]+(i-Lx0)/(Lx1-Lx0)*(xR[1]-xR[0]);
          const yv=yR[0]+(Ly1-j)/(Ly1-Ly0)*(yR[1]-yR[0]);
          const f=fAndPartials(xv,yv).f;
          const t=Math.min(1,Math.max(0,(f-vmin)/(vmax-vmin+1e-9)));
          const r=Math.floor(40+t*200),g=Math.floor(140-t*100),b=Math.floor(255-t*200);
          x.fillStyle=`rgb(${r},${g},${b})`;
          x.fillRect(i,j,cell,cell);
        }
      }
      // slice line
      x.strokeStyle='#fff';x.lineWidth=2;
      if(v==='y'){x.beginPath();x.moveTo(Lx0,pyL(fix));x.lineTo(Lx1,pyL(fix));x.stroke();}
      else{x.beginPath();x.moveTo(pxL(fix),Ly0);x.lineTo(pxL(fix),Ly1);x.stroke();}
      // observe point
      const xObs=v==='y'?pv:fix,yObs=v==='y'?fix:pv;
      x.fillStyle='#c62828';x.beginPath();x.arc(pxL(xObs),pyL(yObs),5,0,Math.PI*2);x.fill();
      x.fillStyle='#fff';x.font='12px sans-serif';
      x.fillText('흰선: 고정된 슬라이스',Lx0+10,Ly0+18);
      // right: 1D slice
      const Rx0=W/2+10,Rx1=W-20,Ry0=20,Ry1=H-20;
      x.fillStyle='#fafbfc';x.fillRect(Rx0,Ry0,Rx1-Rx0,Ry1-Ry0);
      x.strokeStyle='#ddd';x.strokeRect(Rx0,Ry0,Rx1-Rx0,Ry1-Ry0);
      // sample slice
      const samples=[];let s_min=Infinity,s_max=-Infinity;
      for(let i=0;i<=200;i++){
        const t=xR[0]+i/200*(xR[1]-xR[0]);
        const f=v==='y'?fAndPartials(t,fix).f:fAndPartials(fix,t).f;
        samples.push({t,f});
        if(f<s_min)s_min=f;if(f>s_max)s_max=f;
      }
      function pxR(t){return Rx0+(t-xR[0])/(xR[1]-xR[0])*(Rx1-Rx0);}
      function pyR(f){return Ry1 - (f-s_min)/(s_max-s_min+1e-9)*(Ry1-Ry0-30) - 15;}
      // axis
      x.strokeStyle='#888';x.beginPath();x.moveTo(Rx0,Ry1-15);x.lineTo(Rx1,Ry1-15);x.stroke();
      // curve
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      samples.forEach((s,i)=>{i?x.lineTo(pxR(s.t),pyR(s.f)):x.moveTo(pxR(s.t),pyR(s.f));});x.stroke();
      // tangent at pv
      const f_at=v==='y'?fAndPartials(pv,fix):fAndPartials(fix,pv);
      const slope=v==='y'?f_at.fx:f_at.fy;
      const y0=f_at.f;
      x.strokeStyle='#1b5e20';x.lineWidth=2;x.setLineDash([6,4]);
      x.beginPath();
      const t0=xR[0],t1=xR[1];
      x.moveTo(pxR(t0),pyR(y0+slope*(t0-pv)));
      x.lineTo(pxR(t1),pyR(y0+slope*(t1-pv)));
      x.stroke();x.setLineDash([]);
      x.fillStyle='#c62828';x.beginPath();x.arc(pxR(pv),pyR(y0),5,0,Math.PI*2);x.fill();
      // labels
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText((v==='y'?'z = f(x, '+fix.toFixed(2)+')':'z = f('+fix.toFixed(2)+', y)'),Rx0+10,Ry0+18);
      x.fillStyle='#1b5e20';
      const which=v==='y'?'∂f/∂x':'∂f/∂y';
      x.fillText('접선 기울기 = '+which+' = '+slope.toFixed(3),Rx0+10,Ry0+38);
      document.getElementById('psInfo').textContent='편미분의 의미: '+which+' 는 '+(v==='y'?'y':'x')+'를 '+fix.toFixed(2)+'로 고정한 슬라이스 곡선의 접선 기울기.';
    }
    loop();
    document.getElementById('psFn').onchange=loop;
    document.getElementById('psV').onchange=loop;
    document.getElementById('psFix').oninput=loop;
    document.getElementById('psP').oninput=loop;
  })();
  </script>
</main>
</body>
