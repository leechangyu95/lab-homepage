  <h1 class="page-title">🎮 인터랙티브: 초기화 방법별 활성값 분포</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/08-dnn-backprop.html">Week 8. 심층신경망과 역전파</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 초기화 방법별 활성값 분포</h4>
    <p>5층을 통과한 뒤 마지막 층의 활성값 분포가 어떤지 봅니다. 0 가까이 모이거나 양 끝에 쌓이면 학습이 어려워집니다.</p>
    <canvas id="initCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>초기화
        <select id="initSel"><option value="zero">Zero</option><option value="xavier">Xavier</option><option value="he">He</option><option value="big">큰값</option></select>
      </label>
      <button id="initRun">새 샘플</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('initCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const t=document.getElementById('initSel').value;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const N=2000,n=64;
      const std={zero:0,xavier:Math.sqrt(1/n),he:Math.sqrt(2/n),big:0.5}[t];
      const out=[];
      for(let s=0;s<N;s++){
        let x=new Array(n).fill(0).map(()=>Math.random()*2-1);
        for(let l=0;l<5;l++){
          const y=new Array(n).fill(0);
          for(let i=0;i<n;i++){let z=0;for(let j=0;j<n;j++){const u=Math.random(),v=Math.random();const w=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)*std;z+=w*x[j];}y[i]=Math.max(0,z);}
          x=y;
        }
        out.push(x[0]);
      }
      const B=40;const mn=Math.min(...out),mx=Math.max(...out);const bins=new Array(B).fill(0);
      out.forEach(v=>{const b=Math.min(B-1,Math.max(0,Math.floor((v-mn)/(mx-mn+1e-9)*B)));bins[b]++;});
      const peak=Math.max(...bins);
      bins.forEach((v,i)=>{const x=20+i*((W-40)/B),y=H-30-(v/peak)*(H-60);ctx.fillStyle='#0b5fff';ctx.fillRect(x,y,(W-40)/B-2,H-30-y);});
      ctx.fillStyle='#333';ctx.font='12px sans-serif';
      ctx.fillText(`범위 [${mn.toFixed(3)}, ${mx.toFixed(3)}]`,20,18);
    }
    document.getElementById('initSel').addEventListener('change',draw);
    document.getElementById('initRun').addEventListener('click',draw);
    draw();
  })();
  </script>
