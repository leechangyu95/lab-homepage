<main class="wrap">

  <h1 class="page-title">🎮 수렴 속도 비교 — 2차 수렴 vs 1차 수렴</h1>
  <p class="demo-meta">
    미분적분학 · <a href="../backup-lectures/lectures-calculus/06-optimization-newton.html">Week 6. 최적화 &amp; 뉴턴법</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 수렴 속도 비교 — 2차 수렴 vs 1차 수렴</h4>
    <p>$y$축이 로그 스케일(오차의 $\log_{10}$). 뉴턴법은 직선이 아니라 가속하며 떨어지고, 이분법은 일정한 기울기 직선. 30번 반복까지 시뮬레이션.</p>
    <canvas id="cvg" width="640" height="320"></canvas>
    <div class="controls">
      <label>함수
        <select id="cvgFn">
          <option value="sqrt2" selected>x² − 2 = 0  (근 = √2)</option>
          <option value="cosx">cos x − x = 0</option>
          <option value="cubic">x³ − x − 1 = 0</option>
        </select>
      </label>
    </div>
    <p id="cvgInfo" style="margin-top:8px;font-family:Consolas,monospace;font-size:12px;color:#0742b8"></p>
  </div>
  <script>
  (function(){
    const c=document.getElementById('cvg'),x=c.getContext('2d');
    const W=c.width,H=c.height;
    const M={l:60,r:20,t:30,b:40};
    function setup(){
      const m=document.getElementById('cvgFn').value;
      if(m==='sqrt2')return{f:v=>v*v-2,d:v=>2*v,a:1,b:2,start:1.0,exact:Math.SQRT2};
      if(m==='cosx')return{f:v=>Math.cos(v)-v,d:v=>-Math.sin(v)-1,a:0,b:1.5,start:1.5,exact:0.7390851332151607};
      return{f:v=>v*v*v-v-1,d:v=>3*v*v-1,a:1,b:2,start:1.5,exact:1.3247179572447460};
    }
    function loop(){
      const S=setup();
      const N=30;
      // Newton trace
      let xn=S.start;const newton=[Math.abs(xn-S.exact)];
      for(let i=0;i<N;i++){
        const fp=S.d(xn);if(Math.abs(fp)<1e-15)break;
        xn=xn-S.f(xn)/fp;newton.push(Math.max(Math.abs(xn-S.exact),1e-17));
      }
      // Bisection trace
      let a=S.a,b=S.b;const bisec=[Math.max(Math.abs((a+b)/2-S.exact),1e-17)];
      for(let i=0;i<N;i++){
        const c0=(a+b)/2;
        if(S.f(a)*S.f(c0)<0)b=c0;else a=c0;
        bisec.push(Math.max(Math.abs((a+b)/2-S.exact),1e-17));
      }
      // plot log10(error) vs iteration
      x.fillStyle='#fafbfc';x.fillRect(0,0,W,H);
      const Lx0=M.l,Lx1=W-M.r,Ly0=M.t,Ly1=H-M.b;
      x.strokeStyle='#ddd';x.strokeRect(Lx0,Ly0,Lx1-Lx0,Ly1-Ly0);
      function px(i){return Lx0+i/N*(Lx1-Lx0);}
      function py(e){return Ly0 + (Math.log10(Math.max(e,1e-17))+17)/17 *(Ly1-Ly0)*-1 + (Ly1-Ly0);}
      // gridlines + ylabels (log decades)
      x.strokeStyle='#eee';x.fillStyle='#666';x.font='11px sans-serif';
      for(let p=0;p>=-16;p-=2){
        const yy=Ly0 + (p+17)/17 *(Ly1-Ly0)*-1 + (Ly1-Ly0);
        x.beginPath();x.moveTo(Lx0,yy);x.lineTo(Lx1,yy);x.stroke();
        x.fillText('10^'+p,8,yy+4);
      }
      for(let i=0;i<=N;i+=5){
        const xx=px(i);
        x.strokeStyle='#eee';x.beginPath();x.moveTo(xx,Ly0);x.lineTo(xx,Ly1);x.stroke();
        x.fillStyle='#666';x.fillText(i,xx-3,Ly1+14);
      }
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('|오차|  (로그 스케일)',8,Ly0-8);
      x.fillText('반복 →',Lx1-30,Ly1+30);
      // newton (blue)
      x.strokeStyle='#0b5fff';x.lineWidth=2.5;x.beginPath();
      newton.forEach((e,i)=>{i?x.lineTo(px(i),py(e)):x.moveTo(px(i),py(e));});x.stroke();
      newton.forEach((e,i)=>{x.fillStyle='#0b5fff';x.beginPath();x.arc(px(i),py(e),2.5,0,Math.PI*2);x.fill();});
      // bisection (orange)
      x.strokeStyle='#f57c00';x.lineWidth=2.5;x.beginPath();
      bisec.forEach((e,i)=>{i?x.lineTo(px(i),py(e)):x.moveTo(px(i),py(e));});x.stroke();
      bisec.forEach((e,i)=>{x.fillStyle='#f57c00';x.beginPath();x.arc(px(i),py(e),2.5,0,Math.PI*2);x.fill();});
      // legend
      x.fillStyle='#0b5fff';x.fillRect(Lx1-160,Ly0+8,16,3);x.fillStyle='#222';x.fillText('뉴턴법 (2차 수렴)',Lx1-140,Ly0+13);
      x.fillStyle='#f57c00';x.fillRect(Lx1-160,Ly0+24,16,3);x.fillStyle='#222';x.fillText('이분법 (1차 수렴)',Lx1-140,Ly0+29);
      // info
      const lastN=newton[newton.length-1],lastB=bisec[bisec.length-1];
      document.getElementById('cvgInfo').textContent='30번 후 오차:   뉴턴법 ≈ '+lastN.toExponential(2)+'   ·   이분법 ≈ '+lastB.toExponential(2)+'   (이분법은 30번 만에 약 10⁻⁹ 정밀도)';
    }
    loop();
    document.getElementById('cvgFn').onchange=loop;
  })();
  </script>
</main>
</body>
