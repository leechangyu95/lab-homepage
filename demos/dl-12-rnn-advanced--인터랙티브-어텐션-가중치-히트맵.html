  <h1 class="page-title">🎮 인터랙티브: 어텐션 가중치 히트맵</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/12-rnn-advanced.html">Week 12. Seq2Seq와 Attention</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 어텐션 가중치 히트맵</h4>
    <p>한→영 번역의 가상 어텐션 행렬입니다. 행은 출력 단어, 열은 입력 단어. 진할수록 큰 가중치입니다. 슬라이더로 패턴을 바꿔보세요.</p>
    <canvas id="attCanvas" width="640" height="320"></canvas>
    <div class="controls">
      <label>대각 강도 <span class="val" id="dgV">3</span><input type="range" id="dg" min="0" max="6" step="0.1" value="3"></label>
      <button id="attRegen">새 패턴</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('attCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const ko=['나는','오늘','학교에','갔다','.'],en=['I','went','to','school','today'];
    let perm=[0,3,2,3,1];
    function draw(){
      const dg=+document.getElementById('dg').value;
      document.getElementById('dgV').textContent=dg.toFixed(1);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const cell=44,x0=120,y0=50;
      const N=5;
      // header
      ctx.fillStyle='#333';ctx.font='13px sans-serif';
      for(let i=0;i<N;i++)ctx.fillText(ko[i],x0+i*cell+5,y0-8);
      for(let j=0;j<N;j++)ctx.fillText(en[j],x0-80,y0+j*cell+25);
      // matrix
      const M=[];
      for(let j=0;j<N;j++){const r=[];for(let i=0;i<N;i++){r.push(Math.exp(-Math.pow(i-perm[j],2)*0.5/Math.max(0.1,dg)));}
        const s=r.reduce((a,b)=>a+b);M.push(r.map(v=>v/s));}
      for(let j=0;j<N;j++)for(let i=0;i<N;i++){
        const v=M[j][i];const t=Math.floor(255-v*255);
        ctx.fillStyle=`rgb(${t},${t},255)`;
        ctx.fillRect(x0+i*cell,y0+j*cell,cell-2,cell-2);
        ctx.fillStyle=v>0.5?'#fff':'#333';ctx.font='11px sans-serif';
        ctx.fillText(v.toFixed(2),x0+i*cell+8,y0+j*cell+25);
      }
    }
    document.getElementById('dg').addEventListener('input',draw);
    document.getElementById('attRegen').onclick=()=>{perm=Array.from({length:5},()=>Math.floor(Math.random()*5));draw();};
    draw();
  })();
  </script>
