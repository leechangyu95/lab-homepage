<main class="wrap">

  <h1 class="page-title">🎮 인터랙티브: 외란 환경에서 호버링</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/14-mobile-drone.html">Week 14. PID 응용 ② — 모바일 로봇·드론</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 외란 환경에서 호버링</h4>
    <p>드론이 (0,0)에서 호버링 중. 외란 토크 + 바람으로 인한 외력. 위치-자세 캐스케이드 PID가 어떻게 회복하는지 확인.</p>
    <canvas id="c14hov" width="640" height="360"></canvas>
    <div class="controls">
      <label>위치 Kp <span class="val" id="c14posKpV">1.5</span><input type="range" id="c14posKp" min="0.1" max="5" step="0.1" value="1.5"></label>
      <label>위치 Kd <span class="val" id="c14posKdV">1.0</span><input type="range" id="c14posKd" min="0" max="3" step="0.05" value="1.0"></label>
      <label>자세 Kp <span class="val" id="c14attKpV">8</span><input type="range" id="c14attKp" min="1" max="20" step="0.5" value="8"></label>
      <button id="c14gust">돌풍</button>
      <button id="c14move">목표 위치 이동</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('c14hov'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('c14posKpV').textContent=(+$('c14posKp').value).toFixed(2);$('c14posKdV').textContent=(+$('c14posKd').value).toFixed(2);$('c14attKpV').textContent=(+$('c14attKp').value).toFixed(1);};
    ['c14posKp','c14posKd','c14attKp'].forEach(id=>$(id).oninput=upd);
    let xref=0, x_=0, vx=0, theta=0, om=0, fx=0, fxT=0;
    $('c14gust').onclick=()=>{fx=4; fxT=0.4;};
    $('c14move').onclick=()=>{xref = xref===0 ? 2 : (xref>0 ? -2 : 0);};
    let trace=[];
    function loop(){
      const Kp=+$('c14posKp').value, Kd=+$('c14posKd').value, KpA=+$('c14attKp').value;
      const m=0.5, g=9.81, J=0.005, dt=0.02;
      // outer position PD -> a_cmd
      const ex = xref - x_, edx = -vx;
      const a_cmd = Kp*ex + Kd*edx;
      const theta_cmd = Math.max(-0.4, Math.min(0.4, a_cmd/g));
      // attitude P
      const KdA=1.0;
      const tau = KpA*(theta_cmd - theta) - KdA*om;
      const tau_c = Math.max(-1, Math.min(1, tau));
      // physics
      const ax = g*theta + fx/m;
      vx += ax*dt; x_ += vx*dt;
      const omd = tau_c/J;
      om += omd*dt; theta += om*dt;
      if(fxT>0){fxT-=dt; if(fxT<=0)fx=0;}
      trace.push([x_, theta]); if(trace.length>500)trace.shift();
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      // drone visualization
      const cx=320+x_*60, cy=120;
      x.save();x.translate(cx,cy);x.rotate(theta);
      x.strokeStyle='#0b5fff';x.lineWidth=4;x.beginPath();x.moveTo(-30,0);x.lineTo(30,0);x.stroke();
      x.fillStyle='#444';x.fillRect(-6,-4,12,8);
      [-30,30].forEach(xx=>{x.fillStyle='#888';x.beginPath();x.arc(xx,0,5,0,Math.PI*2);x.fill();});
      x.restore();
      // target
      x.strokeStyle='#c62828';x.setLineDash([4,4]);x.beginPath();
      x.moveTo(320+xref*60-15,cy);x.lineTo(320+xref*60+15,cy);x.stroke();x.setLineDash([]);
      x.fillStyle='#c62828';x.font='11px sans-serif';x.fillText('목표',320+xref*60+18,cy+4);
      // gust
      if(fxT>0){
        x.strokeStyle='#9c27b0';x.lineWidth=3;x.beginPath();
        x.moveTo(cx-50,cy-15);x.lineTo(cx-25,cy-15);x.stroke();
        x.fillStyle='#9c27b0';x.font='12px sans-serif';x.fillText('돌풍',cx-65,cy-25);
      }
      // trace plot
      const ox=40, oy=300, w=560, h=120;
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,oy);x.lineTo(ox+w,oy);x.moveTo(ox,oy-h);x.lineTo(ox,oy);x.stroke();
      x.strokeStyle='#0b5fff';x.lineWidth=1.5;x.beginPath();
      trace.forEach((p,i)=>{const xx=ox+i*w/500, yy=oy-h/2-p[0]*h/8;
        if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}); x.stroke();
      x.strokeStyle='#2e7d32';x.lineWidth=1.2;x.beginPath();
      trace.forEach((p,i)=>{const xx=ox+i*w/500, yy=oy-h/2-p[1]*h*0.8;
        if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}); x.stroke();
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('파랑 = x [m],  녹색 = pitch [rad]',ox,oy+18);
      x.fillText('x = '+x_.toFixed(2)+',  θ = '+(theta*180/Math.PI).toFixed(1)+'°',20,180);
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
</main>
