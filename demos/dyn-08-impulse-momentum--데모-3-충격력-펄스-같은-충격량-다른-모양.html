  <h1 class="page-title">데모 3: 충격력 펄스 — 같은 충격량, 다른 모양</h1>
  <p class="demo-meta">
    동역학 · <a href="../backup-lectures/lectures-dynamics/08-impulse-momentum.html">Week 8. 충격량과 운동량</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>데모 3: 충격력 펄스 — 같은 충격량, 다른 모양</h4>
    <p>같은 충격량(같은 면적)인데 펄스의 폭과 높이가 다른 두 경우. 평균 힘과 최대 힘이 어떻게 달라지는지 확인.</p>
    <canvas id="d8p" width="640" height="280"></canvas>
    <div class="controls">
      <label>충돌 시간 Δt (s) <span class="val" id="d8pTV">0.1</span><input type="range" id="d8pT" min="0.005" max="0.5" step="0.005" value="0.1"></label>
      <label>운동량 변화 Δp (N·s) <span class="val" id="d8pPV">10</span><input type="range" id="d8pP" min="1" max="50" step="1" value="10"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('d8p'),x=c.getContext('2d');
    const sl=id=>document.getElementById(id);
    ['d8pT','d8pP'].forEach(k=>sl(k).oninput=()=>sl(k+'V').textContent=sl(k).value);
    function loop(){
      const dt=+sl('d8pT').value,dp=+sl('d8pP').value;
      const Fmax=2*dp/dt;
      const Favg=dp/dt;
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      x.strokeStyle='#333';x.lineWidth=1;
      x.beginPath();x.moveTo(60,240);x.lineTo(620,240);x.stroke();
      x.beginPath();x.moveTo(60,240);x.lineTo(60,40);x.stroke();
      x.fillStyle='#666';x.font='10px sans-serif';
      x.fillText('F (N)',20,55);x.fillText('t (s)',610,255);
      // 펄스 (삼각형) — 너비 dt, 높이 Fmax
      const xScale=400/0.5;
      const yScale=180/3000;
      const w=dt*xScale;
      const h=Math.min(Fmax*yScale,180);
      const xCenter=200;
      x.fillStyle='#c6282844';x.strokeStyle='#c62828';x.lineWidth=2;
      x.beginPath();
      x.moveTo(xCenter-w/2,240);
      x.lineTo(xCenter,240-h);
      x.lineTo(xCenter+w/2,240);
      x.closePath();x.fill();x.stroke();
      // 평균 힘 라인
      const havg=Math.min(Favg*yScale,180);
      x.strokeStyle='#0b5fff';x.setLineDash([4,3]);x.lineWidth=2;
      x.beginPath();
      x.moveTo(xCenter-w/2,240-havg);x.lineTo(xCenter+w/2,240-havg);x.stroke();
      x.setLineDash([]);
      x.fillStyle='#444';x.font='12px Consolas,monospace';
      x.fillText('Δt = '+dt.toFixed(3)+' s',420,80);
      x.fillText('Δp = '+dp.toFixed(0)+' N·s',420,100);
      x.fillText('F_max = 2Δp/Δt = '+Fmax.toFixed(1)+' N',420,120);
      x.fillStyle='#0b5fff';
      x.fillText('F_avg = Δp/Δt = '+Favg.toFixed(1)+' N',420,140);
      x.fillStyle='#666';x.font='11px sans-serif';
      x.fillText('Δt를 두 배로 → 평균/최대 힘 절반',420,170);
      x.fillText('충격량(면적)은 변하지 않음',420,188);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
