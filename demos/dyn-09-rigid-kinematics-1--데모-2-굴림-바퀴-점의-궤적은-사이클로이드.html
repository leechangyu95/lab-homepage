  <h1 class="page-title">🎮 데모 2: 굴림 바퀴 — 점의 궤적은 사이클로이드</h1>
  <p class="demo-meta">
    동역학 · <a href="../backup-lectures/lectures-dynamics/09-rigid-kinematics-1.html">Week 9. 강체의 평면 운동학 — 병진과 고정축 회전</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 데모 2: 굴림 바퀴 — 점의 궤적은 사이클로이드</h4>
    <p>바퀴가 일정 속도로 굴러갑니다. <strong>바퀴의 중심점은 직선</strong>으로 가지만, <strong>가장자리의 점은 사이클로이드(cycloid)</strong>를 그립니다. 가장자리 점이 지면에 닿는 순간 그 점의 속도가 0이라는 게 보입니다(접촉점 정지).</p>
    <canvas id="rollC" width="640" height="320"></canvas>
    <div class="controls">
      <label>각속도 ω <span class="val" id="rlWV">2</span><input type="range" id="rlW" min="0.5" max="4" step="0.1" value="2"></label>
      <label>점의 위치 (반지름 비율) <span class="val" id="rlPV">1.0</span><input type="range" id="rlP" min="0.2" max="1.5" step="0.05" value="1"></label>
      <button id="rlReset">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('rollC'),x=c.getContext('2d');
    const sl=id=>document.getElementById(id);
    const ks=['rlW','rlP'];
    const upd=()=>ks.forEach(k=>sl(k+'V').textContent=sl(k).value);
    ks.forEach(k=>sl(k).oninput=upd);upd();
    let t=0,trail=[];
    sl('rlReset').onclick=()=>{t=0;trail=[];};
    function loop(){
      const w=+sl('rlW').value,pr=+sl('rlP').value;
      t+=0.025;
      const r=40;
      const cx=60+r*w*t*15,cy=240;
      const px=cx-pr*r*Math.sin(w*t*5),py=cy-pr*r*Math.cos(w*t*5);
      trail.push({x:px,y:py});if(trail.length>500)trail.shift();
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      // ground
      x.fillStyle='#bcd6a8';x.fillRect(0,280,c.width,40);
      x.strokeStyle='#666';x.beginPath();x.moveTo(0,280);x.lineTo(c.width,280);x.stroke();
      if(cx>c.width-40){t=0;trail=[];}
      // trail
      x.strokeStyle='#0b5fff';x.lineWidth=1.5;x.beginPath();
      trail.forEach((p,i)=>{if(i===0)x.moveTo(p.x,p.y);else x.lineTo(p.x,p.y);});
      x.stroke();
      // wheel
      x.fillStyle='#e8e8e8';x.beginPath();x.arc(cx,cy,r,0,Math.PI*2);x.fill();x.strokeStyle='#333';x.stroke();
      // spoke
      x.strokeStyle='#888';x.lineWidth=2;x.beginPath();
      x.moveTo(cx,cy);x.lineTo(cx-r*Math.sin(w*t*5),cy-r*Math.cos(w*t*5));x.stroke();
      // contact point indicator
      x.fillStyle='#c62828';x.beginPath();x.arc(cx,cy+r,4,0,Math.PI*2);x.fill();
      x.fillStyle='#c62828';x.font='10px sans-serif';x.textAlign='center';x.fillText('접촉점 v=0',cx,cy+r+18);
      // tracked point
      x.fillStyle='#0b5fff';x.beginPath();x.arc(px,py,5,0,Math.PI*2);x.fill();
      // velocity arrow at tracked point: v_center + omega x r_from_center
      const vc=r*w*5;
      const dxc=px-cx,dyc=py-cy;
      // omega is into page (CW seen from front, since wheel rolls right with positive omega about screen-z out)
      // velocity of point = (vc, 0) + ω × r where ω = (0,0,-w*5) for rolling right
      const W2=-w*5;
      const vxp=vc + (-W2)*dyc;
      const vyp=W2*dxc;
      x.strokeStyle='#0b5fff';x.lineWidth=2;
      x.beginPath();x.moveTo(px,py);x.lineTo(px+vxp*1.5,py+vyp*1.5);x.stroke();
      // info
      x.fillStyle='#444';x.font='12px Consolas,monospace';x.textAlign='left';
      x.fillText('중심 속도 v_c = r·ω,  접촉점 속도 = 0',20,30);
      x.fillText('가장자리 점(p=1)의 trace = 사이클로이드',20,48);
      x.fillText('p<1: 짧은 사이클로이드, p>1: 긴 사이클로이드(트로코이드)',20,66);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
