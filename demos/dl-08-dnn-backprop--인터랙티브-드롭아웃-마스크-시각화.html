  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/08-dnn-backprop.html">Week 8. 심층신경망과 역전파</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 드롭아웃 마스크 시각화</h4>
    <p>뉴런 격자에서 드롭아웃 비율 p에 따라 무작위로 꺼지는(회색) 뉴런을 봅니다. "새 마스크"를 누르면 매번 다른 패턴이 됩니다.</p>
    <canvas id="dropCanvas" width="640" height="240"></canvas>
    <div class="controls">
      <label>드롭아웃 p <span class="val" id="dpV2">0.5</span><input type="range" id="dp2" min="0" max="0.9" step="0.05" value="0.5"></label>
      <button id="dpNew">새 마스크</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('dropCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    let mask=[];
    function gen(){const N=15*6;mask=new Array(N).fill(0).map(()=>Math.random());draw();}
    function draw(){
      const p=+document.getElementById('dp2').value;
      document.getElementById('dpV2').textContent=p.toFixed(2);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const cols=15,rows=6,sx=(W-40)/cols,sy=(H-40)/rows;
      for(let r=0;r<rows;r++)for(let cc=0;cc<cols;cc++){
        const k=r*cols+cc;const on=mask[k]>p;
        ctx.fillStyle=on?'#0b5fff':'#bbb';
        ctx.beginPath();ctx.arc(20+cc*sx+sx/2,20+r*sy+sy/2,Math.min(sx,sy)/2-3,0,Math.PI*2);ctx.fill();
      }
    }
    document.getElementById('dp2').addEventListener('input',draw);
    document.getElementById('dpNew').addEventListener('click',gen);
    gen();
  })();
  </script>
