  <h1 class="page-title">🎮 입력 주파수와 진폭 응답 (공명 곡선)</h1>
  <p class="demo-meta">
    동역학 · <a href="../backup-lectures/lectures-dynamics/12-vibration.html">Week 12. 진동 입문</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 입력 주파수와 진폭 응답 (공명 곡선)</h4>
    <p>외부 강제력의 주파수 $\omega$ 를 바꿀 때 정상상태 진폭이 어떻게 변하는가. ω = ω_n 에서 공명 발생.</p>
    <canvas id="d12ResDemo" width="640" height="320"></canvas>
    <div class="controls">
      <label>감쇠비 ζ <span class="val" id="d12rzV">0.1</span><input type="range" id="d12rz" min="0.02" max="1" step="0.02" value="0.1"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('d12ResDemo');if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const z=+document.getElementById('d12rz').value;
      document.getElementById('d12rzV').textContent=z.toFixed(2);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const ox=40,oy=H-40,sx=(W-60)/3,sy=(H-60)/8;
      ctx.strokeStyle='#888';ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(W-20,oy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ox,30);ctx.lineTo(ox,oy);ctx.stroke();
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;ctx.beginPath();
      const N=300;let peakR=0,peakW=0;
      for(let i=0;i<=N;i++){
        const r=i/N*3;
        const denom=Math.sqrt((1-r*r)**2+(2*z*r)**2);
        const M=1/denom;
        if(M>peakR){peakR=M;peakW=r;}
        const px=ox+r*sx,py=oy-M*sy;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.stroke();
      ctx.fillStyle='#222';ctx.font='13px sans-serif';
      ctx.fillText(`주파수비 r = ω/ω_n`,ox+10,oy+25);
      ctx.fillText(`최대 증폭 M_peak ≈ ${peakR.toFixed(2)} (r ≈ ${peakW.toFixed(2)})`,ox+10,30);
      ctx.fillText(`r=1 (공명점) 에서 진폭 ≈ 1/(2ζ) = ${(1/(2*z)).toFixed(2)}`,ox+10,50);
      ctx.fillStyle='#cf1322';
      const px=ox+1*sx,py=oy-(1/(2*z))*sy;
      ctx.beginPath();ctx.arc(px,py,5,0,2*Math.PI);ctx.fill();
    }
    document.getElementById('d12rz').addEventListener('input',draw);
    draw();
  })();
  </script>
