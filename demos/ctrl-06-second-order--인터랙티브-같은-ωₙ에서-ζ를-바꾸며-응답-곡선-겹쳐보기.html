  <h1 class="page-title">인터랙티브: 같은 ωₙ에서 ζ를 바꾸며 응답 곡선 겹쳐보기</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/06-second-order.html">Week 6. 2차 시스템 시간응답</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>인터랙티브: 같은 ωₙ에서 ζ를 바꾸며 응답 곡선 겹쳐보기</h4>
    <p>같은 고유주파수에서 감쇠비만 바뀌면 응답 모양이 어떻게 변화하는지를 한눈에 보세요. 무감쇠/미감쇠/임계/과감쇠를 동시에 그립니다.</p>
    <canvas id="c6overlay" width="640" height="320"></canvas>
    <div class="controls">
      <label>고유주파수 ωₙ <span class="val" id="c6oV">2.0</span><input type="range" id="c6w" min="0.5" max="5" step="0.1" value="2.0"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('c6overlay'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('c6oV').textContent=(+$('c6w').value).toFixed(1);};
    $('c6w').oninput=upd;
    function loop(){
      const wn=+$('c6w').value;
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      const ox=50, oy=270, w=560, h=220, T=10;
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,oy);x.lineTo(ox+w,oy);x.moveTo(ox,oy-h);x.lineTo(ox,oy);x.stroke();
      x.strokeStyle='#c62828';x.setLineDash([3,3]);x.beginPath();x.moveTo(ox,oy-h*0.5);x.lineTo(ox+w,oy-h*0.5);x.stroke();x.setLineDash([]);
      x.fillStyle='#c62828';x.font='10px sans-serif';x.fillText('1.0',ox-22,oy-h*0.5+4);
      const stepResp=(z,t)=>{
        if(z<0.001) return 1-Math.cos(wn*t);
        if(z<1){const wd=wn*Math.sqrt(1-z*z);
          return 1 - Math.exp(-z*wn*t)/Math.sqrt(1-z*z) * Math.sin(wd*t + Math.acos(z));}
        if(Math.abs(z-1)<1e-3) return 1 - (1+wn*t)*Math.exp(-wn*t);
        const a=z*wn, b=wn*Math.sqrt(z*z-1);
        const r1=-a+b, r2=-a-b;
        return 1 - (r2*Math.exp(r1*t)-r1*Math.exp(r2*t))/(r2-r1);};
      const cases=[
        {z:0.1, color:'#9c27b0', label:'ζ=0.1 강한 진동'},
        {z:0.4, color:'#f57c00', label:'ζ=0.4'},
        {z:0.7, color:'#0b5fff', label:'ζ=0.7 표준'},
        {z:1.0, color:'#2e7d32', label:'ζ=1.0 임계'},
        {z:2.0, color:'#666',    label:'ζ=2.0 과감쇠'},
      ];
      cases.forEach(cs=>{
        x.strokeStyle=cs.color;x.lineWidth=2;x.beginPath();
        for(let i=0;i<=300;i++){const t=i*T/300, y=stepResp(cs.z,t);
          const xx=ox+i*w/300, yy=oy-Math.max(0,Math.min(2,y))*h*0.5;
          if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}
        x.stroke();
      });
      x.font='12px sans-serif';
      cases.forEach((cs,i)=>{x.fillStyle=cs.color;x.fillText(cs.label,ox+i*120,30);});
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
