  <h1 class="page-title">🎮 인터랙티브: 시그모이드 곡선</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/04-regression-2.html">Week 4. 회귀 2: 다중회귀, 로지스틱, 소프트맥스</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 시그모이드 곡선</h4>
    <p>$z = wx + b$의 $w$와 $b$를 움직이며 시그모이드의 모양과 위치 변화를 관찰하세요.</p>
    <canvas id="sigCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>w <span class="val" id="swV">1</span><input type="range" id="sw" min="-5" max="5" step="0.1" value="1"></label>
      <label>b <span class="val" id="sbV">0</span><input type="range" id="sb" min="-5" max="5" step="0.1" value="0"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('sigCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const xmin=-6,xmax=6;
    const toPx=x=>30+(x-xmin)/(xmax-xmin)*(W-50);
    const toPy=y=>H-30-y*(H-50);
    function draw(){
      const w=+document.getElementById('sw').value,b=+document.getElementById('sb').value;
      document.getElementById('swV').textContent=w.toFixed(2);
      document.getElementById('sbV').textContent=b.toFixed(2);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#ddd';ctx.beginPath();ctx.moveTo(30,H-30);ctx.lineTo(W-20,H-30);ctx.moveTo(30,10);ctx.lineTo(30,H-30);ctx.stroke();
      ctx.strokeStyle='#aaa';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(30,toPy(0.5));ctx.lineTo(W-20,toPy(0.5));ctx.stroke();ctx.setLineDash([]);
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;ctx.beginPath();
      for(let i=0;i<=200;i++){
        const x=xmin+(xmax-xmin)*i/200;
        const z=w*x+b,s=1/(1+Math.exp(-z));
        if(i===0)ctx.moveTo(toPx(x),toPy(s));else ctx.lineTo(toPx(x),toPy(s));
      }
      ctx.stroke();
      ctx.fillStyle='#333';ctx.font='12px sans-serif';ctx.fillText('1',10,toPy(1)+5);ctx.fillText('0.5',5,toPy(0.5)+5);ctx.fillText('0',10,toPy(0)+5);
    }
    ['sw','sb'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
    draw();
  })();
  </script>
