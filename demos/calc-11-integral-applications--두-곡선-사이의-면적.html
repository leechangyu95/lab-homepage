  <h1 class="page-title">🎮 두 곡선 사이의 면적</h1>
  <p class="demo-meta">
    미분적분학 · <a href="../backup-lectures/lectures-calculus/11-integral-applications.html">Week 11. 적분 응용 — 면적·부피·곡선 길이</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 두 곡선 사이의 면적</h4>
    <p>위쪽 곡선 - 아래쪽 곡선의 적분이 면적. 교점 양쪽에서 위·아래가 바뀌면 절댓값을 따로 처리해야 합니다.</p>
    <canvas id="ar" width="640" height="380"></canvas>
    <div class="controls">
      <label>곡선 쌍
        <select id="arP">
          <option value="parab" selected>y = x², y = 2x</option>
          <option value="sin">y = sin x, y = cos x</option>
          <option value="cubic">y = x³, y = x</option>
          <option value="exp">y = eˣ, y = x+2</option>
        </select>
      </label>
    </div>
    <p id="arInfo" style="margin-top:8px;font-family:Consolas,monospace;font-size:13px;color:#0742b8"></p>
  </div>
  <script>
  (function(){
    const c=document.getElementById('ar'),x=c.getContext('2d');
    const W=c.width,H=c.height;
    const M={l:50,r:20,t:30,b:30};
    function setup(){
      const m=document.getElementById('arP').value;
      if(m==='parab')return{f:v=>v*v,g:v=>2*v,xR:[-0.5,2.5],yR:[-0.5,4.5],roots:[0,2],label:'y=x², y=2x'};
      if(m==='sin')return{f:Math.sin,g:Math.cos,xR:[0,2*Math.PI],yR:[-1.3,1.3],roots:[Math.PI/4,Math.PI*5/4],label:'y=sin x, y=cos x'};
      if(m==='cubic')return{f:v=>v*v*v,g:v=>v,xR:[-1.5,1.5],yR:[-2,2],roots:[-1,0,1],label:'y=x³, y=x'};
      return{f:Math.exp,g:v=>v+2,xR:[-2,1.5],yR:[-0.5,5],roots:null,label:'y=eˣ, y=x+2'};
    }
    function findRoots(f,g,xR){
      const roots=[];const N=200;
      const dx=(xR[1]-xR[0])/N;
      let prev=f(xR[0])-g(xR[0]);
      for(let i=1;i<=N;i++){
        const xv=xR[0]+i*dx;const cur=f(xv)-g(xv);
        if(prev*cur<0){
          // bisect
          let lo=xv-dx,hi=xv;
          for(let j=0;j<40;j++){const mid=(lo+hi)/2;if((f(lo)-g(lo))*(f(mid)-g(mid))<0)hi=mid;else lo=mid;}
          roots.push((lo+hi)/2);
        }
        prev=cur;
      }
      return roots;
    }
    function loop(){
      const S=setup();
      const xR=S.xR,yR=S.yR;
      const roots=S.roots||findRoots(S.f,S.g,xR);
      function px(v){return M.l+(v-xR[0])/(xR[1]-xR[0])*(W-M.l-M.r);}
      function py(v){return H-M.b-(v-yR[0])/(yR[1]-yR[0])*(H-M.t-M.b);}
      x.fillStyle='#fafbfc';x.fillRect(0,0,W,H);
      x.strokeStyle='#eee';
      for(let v=Math.ceil(xR[0]);v<=xR[1];v++){x.beginPath();x.moveTo(px(v),py(yR[0]));x.lineTo(px(v),py(yR[1]));x.stroke();}
      for(let v=Math.ceil(yR[0]);v<=yR[1];v++){x.beginPath();x.moveTo(px(xR[0]),py(v));x.lineTo(px(xR[1]),py(v));x.stroke();}
      x.strokeStyle='#888';x.beginPath();x.moveTo(px(xR[0]),py(0));x.lineTo(px(xR[1]),py(0));x.stroke();
      // shade between curves where they exist (and within the consecutive root segments)
      let totalArea=0;
      const segments=[];
      const allXs=[xR[0]].concat(roots.filter(r=>r>xR[0]&&r<xR[1])).concat([xR[1]]);
      for(let i=0;i<allXs.length-1;i++){
        const a=allXs[i],b=allXs[i+1];
        // determine which is upper
        const mid=(a+b)/2;const fmid=S.f(mid),gmid=S.g(mid);
        const upper=fmid>gmid?S.f:S.g;
        const lower=fmid>gmid?S.g:S.f;
        // shade
        x.fillStyle='rgba(11,95,255,0.18)';
        x.beginPath();
        const N=80;
        for(let k=0;k<=N;k++){const xv=a+k*(b-a)/N;k?x.lineTo(px(xv),py(upper(xv))):x.moveTo(px(xv),py(upper(xv)));}
        for(let k=N;k>=0;k--){const xv=a+k*(b-a)/N;x.lineTo(px(xv),py(lower(xv)));}
        x.closePath();x.fill();
        // numerical integration
        let area=0;const dn=200;const dx=(b-a)/dn;
        for(let k=0;k<dn;k++){const xv=a+(k+0.5)*dx;area+=Math.abs(S.f(xv)-S.g(xv))*dx;}
        totalArea+=area;
        segments.push({a:a.toFixed(2),b:b.toFixed(2),area:area.toFixed(3),upper:fmid>gmid?'f':'g'});
      }
      // draw curves
      x.strokeStyle='#c62828';x.lineWidth=2;x.beginPath();let first=true;
      for(let v=xR[0];v<=xR[1];v+=(xR[1]-xR[0])/600){const yv=S.f(v);if(yv<yR[0]||yv>yR[1]){first=true;continue;}if(first){x.moveTo(px(v),py(yv));first=false;}else x.lineTo(px(v),py(yv));}x.stroke();
      x.strokeStyle='#1b5e20';x.lineWidth=2;x.beginPath();first=true;
      for(let v=xR[0];v<=xR[1];v+=(xR[1]-xR[0])/600){const yv=S.g(v);if(yv<yR[0]||yv>yR[1]){first=true;continue;}if(first){x.moveTo(px(v),py(yv));first=false;}else x.lineTo(px(v),py(yv));}x.stroke();
      // intersection points
      x.fillStyle='#0742b8';
      roots.filter(r=>r>=xR[0]&&r<=xR[1]).forEach(r=>{x.beginPath();x.arc(px(r),py(S.f(r)),5,0,Math.PI*2);x.fill();});
      // legend
      x.fillStyle='#c62828';x.fillRect(M.l+10,M.t-22,16,3);x.fillStyle='#222';x.font='12px sans-serif';x.fillText('f(x)',M.l+30,M.t-18);
      x.fillStyle='#1b5e20';x.fillRect(M.l+70,M.t-22,16,3);x.fillStyle='#222';x.fillText('g(x)',M.l+90,M.t-18);
      // info
      const segText=segments.map(s=>'['+s.a+','+s.b+']: '+s.area+' (위='+(s.upper==='f'?'f':'g')+')').join('   ·   ');
      document.getElementById('arInfo').textContent='총 면적 ≈ '+totalArea.toFixed(3)+'    ·    구간별: '+segText;
    }
    loop();
    document.getElementById('arP').onchange=loop;
  })();
  </script>
</main>
