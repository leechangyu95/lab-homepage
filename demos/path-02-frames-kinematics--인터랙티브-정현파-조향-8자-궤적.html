  <h1 class="page-title">🎮 인터랙티브: 정현파 조향 → 8자 궤적</h1>
  <p class="demo-meta">
    경로계획 &amp; 추종 · <a href="../backup-lectures/lectures-path-planning/02-frames-kinematics.html">Week 2. 좌표계 &amp; 차량 기구학 모델</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 정현파 조향 → 8자 궤적</h4>
    <p>조향을 시간에 따라 $\delta(t) = \delta_{\max}\sin(\omega t)$로 흔들면 차는 <strong>8자</strong>를 그립니다.
    $\delta_{\max}$가 폭, $\omega$가 빠르기를 결정합니다. 자율주행 대회 시험 주행의 단골 패턴이에요.</p>
    <canvas id="fig8" width="640" height="380"></canvas>
    <div class="controls">
      <label>δ_max° <span class="val" id="dmV">20</span><input type="range" id="dm" min="5" max="35" step="1" value="20"></label>
      <label>ω rad/s <span class="val" id="omV">0.4</span><input type="range" id="om" min="0.1" max="1.2" step="0.05" value="0.4"></label>
      <label>속도 v <span class="val" id="v8V">5</span><input type="range" id="v8" min="2" max="12" step="0.5" value="5"></label>
      <button id="rst8" class="alt">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('fig8'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const L=2.5;
    let st={x:0,y:0,psi:0,t:0}, hist=[];
    function reset(){st={x:0,y:0,psi:0,t:0}; hist=[];}
    $('rst8').onclick=reset;
    function w2s(p){return {x:c.width/2+p[0]*9, y:c.height/2-p[1]*9};}
    function loop(){
      const dm=+$('dm').value, om=+$('om').value, v=+$('v8').value;
      $('dmV').textContent=dm; $('omV').textContent=om.toFixed(2); $('v8V').textContent=v.toFixed(1);
      const dt=0.05;
      const drad=dm*Math.PI/180*Math.sin(om*st.t);
      st.x+=v*Math.cos(st.psi)*dt;
      st.y+=v*Math.sin(st.psi)*dt;
      st.psi+=v/L*Math.tan(drad)*dt;
      st.t+=dt;
      hist.push({x:st.x,y:st.y});
      if(hist.length>1500) hist.shift();
      if(Math.abs(st.x)>40||Math.abs(st.y)>25) reset();
      x.fillStyle='#fafbfc'; x.fillRect(0,0,c.width,c.height);
      // grid
      x.strokeStyle='#eee';
      for(let i=-40;i<=40;i+=5){
        const s1=w2s([i,-25]), s2=w2s([i,25]);
        x.beginPath(); x.moveTo(s1.x,s1.y); x.lineTo(s2.x,s2.y); x.stroke();
      }
      // path
      x.strokeStyle='#0b5fff'; x.lineWidth=2; x.beginPath();
      hist.forEach((p,i)=>{const s=w2s([p.x,p.y]); if(i===0)x.moveTo(s.x,s.y); else x.lineTo(s.x,s.y);});
      x.stroke();
      // car
      const sc=w2s([st.x,st.y]);
      x.save(); x.translate(sc.x,sc.y); x.rotate(-st.psi);
      x.fillStyle='#fff'; x.strokeStyle='#c62828'; x.lineWidth=2;
      x.fillRect(-12,-6,24,12); x.strokeRect(-12,-6,24,12);
      x.restore();
      // info: delta(t) sparkline
      const sx=380, sy=20, sw=240, sh=60;
      x.fillStyle='#fff'; x.fillRect(sx,sy,sw,sh);
      x.strokeStyle='#ddd'; x.strokeRect(sx,sy,sw,sh);
      x.fillStyle='#444'; x.font='11px sans-serif';
      x.fillText('δ(t) = '+(drad*180/Math.PI).toFixed(1)+'°', sx+5, sy+15);
      x.strokeStyle='#666'; x.beginPath(); x.moveTo(sx,sy+sh/2); x.lineTo(sx+sw,sy+sh/2); x.stroke();
      x.strokeStyle='#c62828'; x.beginPath();
      const N=60;
      for(let i=0;i<N;i++){
        const tt=st.t-((N-1-i)/N)*(2*Math.PI/om);
        const dv=Math.sin(om*tt)*dm*Math.PI/180;
        const xx=sx+i/N*sw, yy=sy+sh/2 - dv/(35*Math.PI/180)*sh*0.45;
        if(i===0) x.moveTo(xx,yy); else x.lineTo(xx,yy);
      }
      x.stroke();
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
