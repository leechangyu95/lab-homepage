  <h1 class="page-title">🎮 인터랙티브: 표준화 전후의 KNN 결정 경계</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/02-data-handling.html">Week 2. 데이터 핸들링</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 표준화 전후의 KNN 결정 경계</h4>
    <p>같은 점들에 대해 표준화 전(왼쪽)과 후(오른쪽)의 KNN 결정 경계를 동시에 보여줍니다. 표준화 안 하면 경계가 거의 수직선/수평선이 되어 한 축만 본다는 것을 한눈에 볼 수 있습니다.</p>
    <canvas id="stdKnn" width="640" height="320"></canvas>
    <div class="controls">
      <label>K <span class="val" id="skV">5</span><input type="range" id="sk" min="1" max="15" step="2" value="5"></label>
      <label>Y 스케일 <span class="val" id="skSV">10</span>×<input type="range" id="skS" min="1" max="50" step="1" value="10"></label>
      <button id="skR">새 데이터</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('stdKnn');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    let pts=[];
    function gen(){
      pts=[];
      for(let i=0;i<20;i++){pts.push({x:0.3+Math.random()*0.2,y:0.3+Math.random()*0.2,c:0});}
      for(let i=0;i<20;i++){pts.push({x:0.6+Math.random()*0.2,y:0.6+Math.random()*0.2,c:1});}
      draw();
    }
    function knn(qx,qy,xs,ys,K){
      const ds=pts.map((p,i)=>({d:Math.hypot(qx-xs[i],qy-ys[i]),c:p.c})).sort((a,b)=>a.d-b.d).slice(0,K);
      let v=0;ds.forEach(d=>v+=(d.c==0?1:-1));return v>=0?0:1;
    }
    function draw(){
      const K=+document.getElementById('sk').value;
      const sc=+document.getElementById('skS').value;
      document.getElementById('skV').textContent=K;
      document.getElementById('skSV').textContent=sc;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#ccc';ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
      // Left: raw with scaled Y
      const xsRaw=pts.map(p=>p.x);
      const ysRaw=pts.map(p=>p.y*sc);
      const STEP=10;
      for(let i=0;i<W/2;i+=STEP)for(let j=0;j<H;j+=STEP){
        const qx=i/(W/2),qy=(1-j/H)*sc;
        const c=knn(qx,qy,xsRaw,ysRaw,K);
        ctx.fillStyle=c==0?'rgba(11,95,255,0.10)':'rgba(255,140,0,0.12)';
        ctx.fillRect(i,j,STEP,STEP);
      }
      // Right: standardized
      const mx=xsRaw.reduce((a,b)=>a+b)/xsRaw.length;
      const sx=Math.sqrt(xsRaw.reduce((a,b)=>a+(b-mx)**2,0)/xsRaw.length)||1;
      const my=ysRaw.reduce((a,b)=>a+b)/ysRaw.length;
      const sy=Math.sqrt(ysRaw.reduce((a,b)=>a+(b-my)**2,0)/ysRaw.length)||1;
      const xsZ=xsRaw.map(v=>(v-mx)/sx),ysZ=ysRaw.map(v=>(v-my)/sy);
      for(let i=0;i<W/2;i+=STEP)for(let j=0;j<H;j+=STEP){
        const qx=((i/(W/2))-mx)/sx,qy=((1-j/H)*sc-my)/sy;
        const c=knn(qx,qy,xsZ,ysZ,K);
        ctx.fillStyle=c==0?'rgba(11,95,255,0.10)':'rgba(255,140,0,0.12)';
        ctx.fillRect(W/2+i,j,STEP,STEP);
      }
      // points
      pts.forEach(p=>{
        const px1=p.x*W/2,py1=(1-p.y)*H;
        ctx.fillStyle=p.c?'#ff8c00':'#0b5fff';
        ctx.beginPath();ctx.arc(px1,py1,4,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(W/2+px1,py1,4,0,Math.PI*2);ctx.fill();
      });
      ctx.fillStyle='#222';ctx.font='13px sans-serif';
      ctx.fillText('표준화 안 함 (Y 스케일 ×'+sc+')',10,16);
      ctx.fillText('표준화 후',W/2+10,16);
    }
    document.getElementById('sk').addEventListener('input',draw);
    document.getElementById('skS').addEventListener('input',draw);
    document.getElementById('skR').addEventListener('click',gen);
    gen();
  })();
  </script>
</main>
