  <h1 class="page-title">🎮 인터랙티브: SR 래치 — 1비트 메모리</h1>
  <p class="demo-meta">
    기전공학기초 · <a href="../backup-lectures/lectures-mech/12-digital.html">Week 12. 디지털 논리 — 0과 1로 짓는 컴퓨터</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: SR 래치 — 1비트 메모리</h4>
    <p>S, R을 펄스로 쳐보세요. S=1로 설정, R=1로 리셋, 둘 다 0이면 <strong>이전 값 유지</strong> — 이것이 "기억"의 본질. <strong>스텝</strong>으로 시간 진행.</p>
    <canvas id="srCanvas" width="640" height="240"></canvas>
    <div class="controls">
      <button id="srSet">Set (S=1)</button>
      <button id="srReset">Reset (R=1)</button>
      <button id="srHold">Hold (S=R=0)</button>
      <button id="srClear" class="alt">초기화</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('srCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const events=[];
    let Q=0;
    function tick(S,R){
      if(S===1&&R===1)return;
      if(S===1)Q=1;
      else if(R===1)Q=0;
      events.push({S,R,Q});
      if(events.length>20)events.shift();
      draw();
    }
    function draw(){
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#222';ctx.font='14px sans-serif';
      ctx.fillText('현재 Q = '+Q,30,30);
      ctx.font='12px sans-serif';ctx.fillStyle='#666';
      ctx.fillText('타임라인 (왼쪽 = 과거, 오른쪽 = 현재)',30,55);
      const cellW=Math.floor((W-60)/Math.max(events.length,5));
      events.forEach((ev,i)=>{
        const x=30+i*cellW;
        // S row
        ctx.fillStyle=ev.S?'#0b5fff':'#eee';
        ctx.fillRect(x,80,cellW-2,30);
        ctx.strokeStyle='#999';ctx.strokeRect(x,80,cellW-2,30);
        // R row
        ctx.fillStyle=ev.R?'#c62828':'#eee';
        ctx.fillRect(x,115,cellW-2,30);
        ctx.strokeRect(x,115,cellW-2,30);
        // Q row
        ctx.fillStyle=ev.Q?'#1b5e20':'#bbb';
        ctx.fillRect(x,150,cellW-2,30);
        ctx.strokeRect(x,150,cellW-2,30);
        ctx.fillStyle='#fff';ctx.font='bold 13px sans-serif';
        ctx.fillText(ev.S,x+cellW/2-4,100);
        ctx.fillText(ev.R,x+cellW/2-4,135);
        ctx.fillText(ev.Q,x+cellW/2-4,170);
      });
      ctx.fillStyle='#222';ctx.font='12px sans-serif';
      ctx.fillText('S',10,100);ctx.fillText('R',10,135);ctx.fillText('Q',10,170);
      ctx.fillText('S=R=0이면 Q 유지(=메모리). S=1이면 Set, R=1이면 Reset.',30,H-15);
    }
    document.getElementById('srSet').addEventListener('click',()=>tick(1,0));
    document.getElementById('srReset').addEventListener('click',()=>tick(0,1));
    document.getElementById('srHold').addEventListener('click',()=>tick(0,0));
    document.getElementById('srClear').addEventListener('click',()=>{events.length=0;Q=0;draw();});
    draw();
  })();
  </script>
