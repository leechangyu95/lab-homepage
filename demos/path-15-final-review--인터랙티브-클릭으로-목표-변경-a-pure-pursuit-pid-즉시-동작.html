  <h1 class="page-title">🎮 인터랙티브: 클릭으로 목표 변경 → A* + Pure Pursuit + PID 즉시 동작</h1>
  <p class="demo-meta">
    경로계획 &amp; 추종 · <a href="../backup-lectures/lectures-path-planning/15-final-review.html">Week 15. 기말 전체 정리</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 클릭으로 목표 변경 → A* + Pure Pursuit + PID 즉시 동작</h4>
    <p>이 강의 전체의 결과물 — 클릭으로 목표를 옮기면 즉시 재계획·재추종합니다.</p>
    <canvas id="finalCv" width="640" height="320"></canvas>
    <div class="controls">
      <button id="rstFin" class="alt">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('finalCv'),x=c.getContext('2d');
    const W=22,H=11;const sc=Math.min(c.width/W,c.height/H);
    let start=[2,2],goal=[20,9];
    const obs=[[8,4,1.4],[12,7,1.3],[16,3,1.0],[6,8,1.0]];
    let path=null,car;
    function planA(){
      const N=44,M=22;const gx=W/N,gy=H/M;
      const blocked=(i,j)=>{const x_=i*gx+gx/2,y_=j*gy+gy/2;for(const o of obs){if(Math.hypot(x_-o[0],y_-o[1])<o[2]+0.4)return true;}return false;};
      const si=Math.round(start[0]/gx),sj=Math.round(start[1]/gy);
      const ti=Math.round(goal[0]/gx),tj=Math.round(goal[1]/gy);
      const open=new Map(),closed=new Set(),parent=new Map(),g=new Map();
      const k0=si+','+sj;g.set(k0,0);open.set(k0,{i:si,j:sj,f:Math.hypot(si-ti,sj-tj)});
      let found=null,it=0;
      while(open.size>0&&it<6000){it++;let bk=null,bf=1e9;for(const[k,n]of open){if(n.f<bf){bf=n.f;bk=k;}}
        const cur=open.get(bk);open.delete(bk);closed.add(bk);
        if(cur.i===ti&&cur.j===tj){found=bk;break;}
        for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++){if(di===0&&dj===0)continue;
          const ni=cur.i+di,nj=cur.j+dj;if(ni<0||ni>=N||nj<0||nj>=M)continue;if(blocked(ni,nj))continue;
          const nk=ni+','+nj;if(closed.has(nk))continue;const cost=(di&&dj)?Math.SQRT2:1;
          const ng=g.get(bk)+cost;if(!g.has(nk)||ng<g.get(nk)){g.set(nk,ng);parent.set(nk,bk);
            open.set(nk,{i:ni,j:nj,f:ng+Math.hypot(ni-ti,nj-tj)});}}}
      if(!found)return null;const pts=[];let k=found;while(k){const[ii,jj]=k.split(',').map(Number);pts.push([ii*gx+gx/2,jj*gy+gy/2]);k=parent.get(k);}pts.reverse();return pts;
    }
    function plan(){path=planA();car={x:start[0],y:start[1],psi:0,v:0,I:0,e_p:null};}
    plan();
    document.getElementById('rstFin').onclick=plan;
    c.addEventListener('click',e=>{const r=c.getBoundingClientRect();goal=[(e.clientX-r.left)/sc,(c.height-(e.clientY-r.top))/sc];plan();});
    function loop(){
      if(path){
        const Lfc=1.5,k=0.1;const Ld=k*car.v+Lfc;
        let bi=0,bd=1e9;path.forEach((p,i)=>{const d=Math.hypot(p[0]-car.x,p[1]-car.y);if(d<bd){bd=d;bi=i;}});
        let tg=path[path.length-1];for(let j=bi;j<path.length;j++){if(Math.hypot(path[j][0]-car.x,path[j][1]-car.y)>=Ld){tg=path[j];break;}}
        const alpha=Math.atan2(tg[1]-car.y,tg[0]-car.x)-car.psi;const wa=Math.atan2(Math.sin(alpha),Math.cos(alpha));
        const L=2.5;const delta=Math.atan2(2*L*Math.sin(wa),Ld);
        const vRef=Math.hypot(car.x-goal[0],car.y-goal[1])>1.5?6.0:1.0;
        const e=vRef-car.v;car.I+=e*0.02;const dedt=car.e_p===null?0:(e-car.e_p)/0.02;car.e_p=e;
        let a=1.5*e+0.4*car.I+0.05*dedt;a=Math.max(-3,Math.min(2,a));
        const dt=0.02;car.x+=car.v*Math.cos(car.psi)*dt;car.y+=car.v*Math.sin(car.psi)*dt;
        car.psi+=car.v/L*Math.tan(delta)*dt;car.v=Math.max(0,car.v+a*dt);
      }
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      x.fillStyle='#fce4ec';x.strokeStyle='#c62828';
      obs.forEach(o=>{x.beginPath();x.arc(o[0]*sc,c.height-o[1]*sc,o[2]*sc,0,2*Math.PI);x.fill();x.stroke();});
      if(path){x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
        path.forEach((p,i)=>{const xx=p[0]*sc,yy=c.height-p[1]*sc;if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);});x.stroke();}
      x.fillStyle='#2e7d32';x.beginPath();x.arc(start[0]*sc,c.height-start[1]*sc,7,0,2*Math.PI);x.fill();
      x.fillStyle='#c62828';x.beginPath();x.arc(goal[0]*sc,c.height-goal[1]*sc,7,0,2*Math.PI);x.fill();
      x.save();x.translate(car.x*sc,c.height-car.y*sc);x.rotate(-car.psi);
      x.fillStyle='#0b5fff';x.fillRect(-12,-6,24,12);x.fillStyle='#fff';x.fillRect(7,-5,4,10);x.restore();
      x.fillStyle='#222';x.font='12px sans-serif';x.fillText('클릭으로 목표 이동.  v='+car.v.toFixed(2)+' m/s',12,18);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
