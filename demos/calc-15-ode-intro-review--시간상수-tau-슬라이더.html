  <h1 class="page-title">🎮 시간상수 $\tau$ 슬라이더</h1>
  <p class="demo-meta">
    미분적분학 · <a href="../backup-lectures/lectures-calculus/15-ode-intro-review.html">Week 15. 1차 ODE + 종합 정리</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 시간상수 $\tau$ 슬라이더</h4>
    <p>$\tau$ 를 움직여 보세요. 작은 $\tau$ → 빠른 응답, 큰 $\tau$ → 느린 응답. 입력 종류(계단·임펄스·사인)에 따라 응답 모양이 어떻게 바뀌는지 비교해 보세요.
    이 한 시스템이 RC 회로·뉴턴 냉각·차량의 종방향 1차 모델 등 수많은 현상을 모두 설명합니다.</p>
    <canvas id="fo" width="640" height="320"></canvas>
    <div class="controls">
      <label>시간상수 τ <span class="val" id="foTV">1.00</span><input type="range" id="foT" min="0.1" max="3" step="0.05" value="1"></label>
      <label>입력
        <select id="foU">
          <option value="step" selected>계단</option>
          <option value="impulse">임펄스 (짧은 펄스)</option>
          <option value="sine">사인</option>
          <option value="ramp">램프</option>
        </select>
      </label>
      <button id="foRst" class="alt">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('fo'),x=c.getContext('2d');
    const W=c.width,H=c.height;
    const M={l:50,r:20,t:20,b:30};
    const Tmax=10,N=600;
    const dt=Tmax/N;
    function uAt(t){
      const m=document.getElementById('foU').value;
      if(m==='step')return t<1?0:1;
      if(m==='impulse')return(t>=1&&t<1.2)?5:0;
      if(m==='sine')return Math.sin(t*1.5);
      return Math.min(t/3,1);
    }
    let auto=null;
    document.getElementById('foRst').onclick=()=>{auto=null;};
    function loop(){
      const tau=+document.getElementById('foT').value;
      document.getElementById('foTV').textContent=tau.toFixed(2);
      // simulate: tau y' + y = u
      let y=0;const ys=[],us=[],ts=[];
      for(let i=0;i<=N;i++){
        const t=i*dt;ts.push(t);
        const u=uAt(t);us.push(u);ys.push(y);
        // forward Euler
        const dy=(u-y)/tau;
        y+=dy*dt;
      }
      x.fillStyle='#fafbfc';x.fillRect(0,0,W,H);
      const Lx0=M.l,Lx1=W-M.r;
      const Ly0=M.t,Ly1=H-M.b;
      x.strokeStyle='#ddd';x.strokeRect(Lx0,Ly0,Lx1-Lx0,Ly1-Ly0);
      // axis
      const vmax=Math.max(2,Math.max(...us.map(Math.abs))*1.2);
      function px(t){return Lx0+t/Tmax*(Lx1-Lx0);}
      function py(v){return(Ly0+Ly1)/2-v/vmax*((Ly1-Ly0)/2-12);}
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(Lx0,(Ly0+Ly1)/2);x.lineTo(Lx1,(Ly0+Ly1)/2);x.stroke();
      // input (gray)
      x.strokeStyle='#999';x.lineWidth=1.5;x.setLineDash([4,3]);x.beginPath();
      us.forEach((u,i)=>{i?x.lineTo(px(ts[i]),py(u)):x.moveTo(px(ts[i]),py(u));});x.stroke();x.setLineDash([]);
      // output (blue)
      x.strokeStyle='#0b5fff';x.lineWidth=2.5;x.beginPath();
      ys.forEach((u,i)=>{i?x.lineTo(px(ts[i]),py(u)):x.moveTo(px(ts[i]),py(u));});x.stroke();
      // legend
      x.fillStyle='#666';x.fillRect(Lx0+10,Ly0+10,16,2);x.fillStyle='#222';x.font='12px sans-serif';x.fillText('입력 u(t)',Lx0+30,Ly0+15);
      x.fillStyle='#0b5fff';x.fillRect(Lx0+90,Ly0+10,16,3);x.fillStyle='#222';x.fillText('출력 y(t)',Lx0+110,Ly0+15);
      x.fillStyle='#0742b8';x.font='12px sans-serif';
      x.fillText('τ y\' + y = u    ·    τ = '+tau.toFixed(2)+'    ·    63% 도달 시간 ≈ τ',Lx0+10,Ly1-8);
      requestAnimationFrame(()=>setTimeout(loop,80));
    }
    loop();
  })();
  </script>
