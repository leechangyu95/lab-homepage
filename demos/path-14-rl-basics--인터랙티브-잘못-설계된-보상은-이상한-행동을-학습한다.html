  <h1 class="page-title">🎮 인터랙티브: 잘못 설계된 보상은 이상한 행동을 학습한다</h1>
  <p class="demo-meta">
    경로계획 &amp; 추종 · <a href="../backup-lectures/lectures-path-planning/14-rl-basics.html">Week 14. 강화학습(RL) 기초 — 경험으로 배우는 제어</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 잘못 설계된 보상은 이상한 행동을 학습한다</h4>
    <p>같은 그리드월드에 보상 설계만 다르게 줍니다. 어느 보상 설계가 "원하는 행동"을 만들어내는지 비교해 보세요.</p>
    <canvas id="rewCv" width="640" height="220"></canvas>
    <div class="controls">
      <label>설계
        <select id="rewSel">
          <option value="standard">표준: 도달 +10, 함정 -5, 매스텝 -0.1</option>
          <option value="speed">속도만 +: 매스텝 +0.1, 도달 +10 (함정 패널티 없음)</option>
          <option value="sparse">희박: 도달 +10, 그 외 0</option>
        </select>
      </label>
      <button id="goRew">10000 에피소드 학습</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('rewCv'),x=c.getContext('2d'),$=id=>document.getElementById(id);
    const N=5;const acts=[[1,0],[-1,0],[0,1],[0,-1]];
    const trap=[2,2],goal=[4,4],startC=[0,0];
    function argmax(arr){let bi=0;for(let i=1;i<arr.length;i++)if(arr[i]>arr[bi])bi=i;return bi;}
    function rew(ns,sel){
      const onGoal=ns[0]===goal[0]&&ns[1]===goal[1],onTrap=ns[0]===trap[0]&&ns[1]===trap[1];
      if(sel==='standard')return onGoal?10:onTrap?-5:-0.1;
      if(sel==='speed')return onGoal?10:0.1;
      return onGoal?10:0;
    }
    function train(sel){
      const Q=Array.from({length:N},()=>Array.from({length:N},()=>[0,0,0,0]));
      const al=0.2,gm=0.95;let eps=0.4;
      for(let ep=0;ep<10000;ep++){let s=startC.slice();let it=0;
        while(it<300){const ai=Math.random()<eps?Math.floor(Math.random()*4):argmax(Q[s[0]][s[1]]);
          const ns=[Math.max(0,Math.min(N-1,s[0]+acts[ai][0])),Math.max(0,Math.min(N-1,s[1]+acts[ai][1]))];
          const r=rew(ns,sel);const done=(r===10);
          Q[s[0]][s[1]][ai]+=al*(r+(done?0:gm*Math.max(...Q[ns[0]][ns[1]]))-Q[s[0]][s[1]][ai]);
          s=ns;if(done)break;it++;}
        eps=Math.max(0.05,eps*0.9995);}
      return Q;
    }
    let Qstd,Qspd,Qsps,sel='standard';
    function draw(Q,ox,label){
      const sc=180/N;
      x.strokeStyle='#bbb';
      for(let i=0;i<N;i++)for(let j=0;j<N;j++){
        let fill='#fff';if(i===trap[0]&&j===trap[1])fill='#999';if(i===goal[0]&&j===goal[1])fill='#fce4ec';
        x.fillStyle=fill;x.fillRect(ox+i*sc,(N-1-j)*sc,sc-1,sc-1);x.strokeRect(ox+i*sc,(N-1-j)*sc,sc-1,sc-1);
        const q=Q[i][j];const ai=argmax(q);const da=acts[ai];const cx=ox+i*sc+sc/2,cy=(N-1-j)*sc+sc/2;
        x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
        x.moveTo(cx-da[0]*sc*0.3,cy+da[1]*sc*0.3);x.lineTo(cx+da[0]*sc*0.3,cy-da[1]*sc*0.3);x.stroke();
        x.beginPath();x.arc(cx+da[0]*sc*0.3,cy-da[1]*sc*0.3,3,0,2*Math.PI);x.fillStyle='#0b5fff';x.fill();
        x.strokeStyle='#bbb';
      }
      x.fillStyle='#222';x.font='12px sans-serif';x.fillText(label,ox+8,N*sc+16);
    }
    function render(){
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      if(Qstd)draw(Qstd,10,'표준');if(Qspd)draw(Qspd,210,'속도만 +');if(Qsps)draw(Qsps,410,'희박');
      x.fillStyle='#666';x.font='11px sans-serif';
      x.fillText('파랑 화살표: 학습된 정책 π(s) = argmax Q(s,a)',10,c.height-6);
    }
    $('goRew').onclick=()=>{Qstd=train('standard');Qspd=train('speed');Qsps=train('sparse');render();};
    render();
  })();
  </script>
