  <h1 class="page-title">🎮 인터랙티브: 쿼드콥터 1축 캐스케이드 PID</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/14-mobile-drone.html">Week 14. PID 응용 ② — 모바일 로봇·드론</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 쿼드콥터 1축 캐스케이드 PID</h4>
    <p>회전 관성 J인 1자유도 시스템. 자세 PD + 각속도 PID 캐스케이드.
    버튼으로 갑작스러운 외부 토크(돌풍) 외란을 가해보세요.</p>
    <canvas id="quad" width="640" height="320"></canvas>
    <div class="controls">
      <label>자세 Kp <span class="val" id="qaKpV">5</span><input type="range" id="qaKp" min="0" max="20" step="0.5" value="5"></label>
      <label>자세 Kd <span class="val" id="qaKdV">1</span><input type="range" id="qaKd" min="0" max="5" step="0.1" value="1"></label>
      <label>각속도 Kp <span class="val" id="qrKpV">2.5</span><input type="range" id="qrKp" min="0" max="10" step="0.1" value="2.5"></label>
      <button id="qDist">돌풍 외란</button>
      <button id="qStep">목표각 변경</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('quad'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('qaKpV').textContent=(+$('qaKp').value).toFixed(1);$('qaKdV').textContent=(+$('qaKd').value).toFixed(2);$('qrKpV').textContent=(+$('qrKp').value).toFixed(2);};
    ['qaKp','qaKd','qrKp'].forEach(id=>$(id).oninput=upd);
    let ref=0, th=0, om=0, dist=0, distT=0;
    $('qStep').onclick=()=>{ref = ref===0 ? 0.5 : (ref>0 ? -0.5 : 0);};
    $('qDist').onclick=()=>{dist=8; distT=0.5;};
    const hist=[];
    function loop(){
      const Kp=+$('qaKp').value, Kd=+$('qaKd').value, Kpv=+$('qrKp').value;
      const J=0.05, dt=0.01;
      const om_cmd = Kp*(ref-th) - Kd*om;
      const tau = Kpv*(om_cmd - om);
      const tau_total = Math.max(-12,Math.min(12,tau)) + dist;
      const omd = tau_total/J;
      om += omd*dt; th += om*dt;
      if(distT>0){distT-=dt; if(distT<=0)dist=0;}
      hist.push(th); if(hist.length>500)hist.shift();
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      // quadcopter visualization
      const cx=200, cy=150;
      x.save();x.translate(cx,cy);x.rotate(th);
      x.strokeStyle='#0b5fff';x.lineWidth=4;x.beginPath();
      x.moveTo(-80,0);x.lineTo(80,0);x.stroke();
      x.fillStyle='#444';x.fillRect(-12,-8,24,16);
      [-80,80].forEach(xx=>{x.fillStyle='#888';x.beginPath();x.arc(xx,0,12,0,Math.PI*2);x.fill();});
      x.restore();
      // target angle line
      x.save();x.translate(cx,cy);x.rotate(ref);
      x.strokeStyle='#c62828';x.setLineDash([4,4]);x.beginPath();x.moveTo(-80,0);x.lineTo(80,0);x.stroke();x.setLineDash([]);
      x.restore();
      // disturbance arrow
      if(distT>0){
        x.strokeStyle='#9c27b0';x.lineWidth=3;x.beginPath();
        x.moveTo(cx-110,cy-20);x.lineTo(cx-80,cy-20);x.stroke();
        x.fillStyle='#9c27b0';x.beginPath();
        x.moveTo(cx-80,cy-20);x.lineTo(cx-90,cy-25);x.lineTo(cx-90,cy-15);x.closePath();x.fill();
        x.font='12px sans-serif';x.fillText('돌풍 외란',cx-125,cy-30);
      }
      // history plot
      const ox=350, oy=270, w=270, h=160;
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,oy);x.lineTo(ox+w,oy);x.moveTo(ox,oy-h);x.lineTo(ox,oy);x.stroke();
      x.strokeStyle='#c62828';x.setLineDash([3,3]);x.beginPath();x.moveTo(ox,oy-h*0.5);x.lineTo(ox+w,oy-h*0.5);x.stroke();x.setLineDash([]);
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      hist.forEach((v,i)=>{const xx=ox+i*w/500, yy=oy-h*0.5-v*40;
        if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}); x.stroke();
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('자세각 θ 시간 응답',ox,oy-h-8);
      x.fillText('θ_ref = '+(ref*180/Math.PI).toFixed(0)+'°,  θ = '+(th*180/Math.PI).toFixed(1)+'°',20,310);
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
