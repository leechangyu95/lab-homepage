  <h1 class="page-title">🎮 감쇠비 ζ 슬라이더로 진동 패턴 비교</h1>
  <p class="demo-meta">
    동역학 · <a href="../backup-lectures/lectures-dynamics/12-vibration.html">Week 12. 진동 입문</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 감쇠비 ζ 슬라이더로 진동 패턴 비교</h4>
    <p>$\ddot x + 2\zeta\omega_n \dot x + \omega_n^2 x = 0$ 의 해. ζ 가 어떻게 진동 패턴을 결정하는지 확인.</p>
    <canvas id="d12DampDemo" width="640" height="320"></canvas>
    <div class="controls">
      <label>감쇠비 ζ <span class="val" id="d12zV">0.2</span><input type="range" id="d12z" min="0" max="2" step="0.05" value="0.2"></label>
      <label>고유진동수 ω_n <span class="val" id="d12wnV">2</span><input type="range" id="d12wn" min="0.5" max="5" step="0.1" value="2"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('d12DampDemo');if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const z=+document.getElementById('d12z').value;
      const wn=+document.getElementById('d12wn').value;
      ['d12z','d12wn'].forEach(k=>document.getElementById(k+'V').textContent=document.getElementById(k).value);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const ox=40,oy=H/2,scale=Math.min((W-60)/15,(H-60)/3);
      ctx.strokeStyle='#888';ctx.beginPath();ctx.moveTo(ox,oy);ctx.lineTo(W-20,oy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ox,30);ctx.lineTo(ox,H-30);ctx.stroke();
      // simulate
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;ctx.beginPath();
      let x=1,xd=0;const dt=0.01;
      for(let t=0,i=0;t<15;t+=dt,i++){
        const xdd=-2*z*wn*xd-wn*wn*x;
        xd+=xdd*dt;x+=xd*dt;
        const px=ox+t*scale,py=oy-x*scale;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.stroke();
      ctx.fillStyle='#222';ctx.font='14px Consolas,monospace';
      let regime='';
      if(z<1)regime='저감쇠 (under-damped) — 진동하며 수렴';
      else if(z===1||Math.abs(z-1)<0.01)regime='임계감쇠 (critically) — 가장 빠른 안정';
      else regime='과감쇠 (over-damped) — 진동 없이 천천히 수렴';
      ctx.fillText(`ζ = ${z}, ω_n = ${wn} rad/s`,ox+10,30);
      ctx.fillText(regime,ox+10,55);
      if(z>0&&z<1){
        const wd=wn*Math.sqrt(1-z*z);
        ctx.fillText(`ω_d (감쇠진동수) = ${wd.toFixed(3)} rad/s`,ox+10,75);
      }
    }
    ['d12z','d12wn'].forEach(k=>document.getElementById(k).addEventListener('input',draw));
    draw();
  })();
  </script>
