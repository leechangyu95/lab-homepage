  <h1 class="page-title">🎮 인터랙티브: 활성화 함수 비교</h1>
  <p class="demo-meta">
    로봇공학특론 · <a href="../backup-lectures/lectures/10-ann.html">Lecture 10. 인공 신경망 (ANN)</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 활성화 함수 비교</h4>
    <p>네 가지 함수의 모양과 기울기를 동시에 확인합니다.</p>
    <canvas id="acts" width="640" height="260"></canvas>
  </div>
  <script>
  (function(){
    const c=document.getElementById('acts'),x=c.getContext('2d');
    const fns=[
      {name:'ReLU',f:z=>Math.max(0,z),col:'#0b5fff'},
      {name:'Sigmoid',f:z=>1/(1+Math.exp(-z)),col:'#c62828'},
      {name:'Tanh',f:z=>Math.tanh(z),col:'#2e7d32'},
      {name:'Leaky ReLU',f:z=>z>0?z:0.1*z,col:'#f57c00'}
    ];
    function draw(){
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      const X0=40,Y0=130,W=560,H=100;
      x.strokeStyle='#ddd';x.beginPath();x.moveTo(X0,Y0);x.lineTo(X0+W,Y0);x.moveTo(X0+W/2,Y0-H);x.lineTo(X0+W/2,Y0+H);x.stroke();
      fns.forEach((fn,idx)=>{
        x.strokeStyle=fn.col;x.lineWidth=2;x.beginPath();
        for(let i=0;i<=W;i+=2){const z=(i-W/2)/30;const v=fn.f(z);const xx=X0+i,yy=Y0-Math.max(-1.5,Math.min(1.5,v))*(H/1.5);if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}
        x.stroke();
        x.fillStyle=fn.col;x.fillText(fn.name,X0+10+idx*140,20);
      });
      x.fillStyle='#666';x.font='11px sans-serif';x.fillText('x축: z ∈ [-10,10], y축: σ(z)',X0,250);
    }
    draw();
  })();
  </script>
