  <h1 class="page-title">🎮 인터랙티브: 병렬 합성저항과 전류 분배</h1>
  <p class="demo-meta">
    기전공학기초 · <a href="../backup-lectures/lectures-mech/03-dc-circuit.html">Week 3. 직류회로 — 직렬·병렬·직병렬</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 병렬 합성저항과 전류 분배</h4>
    <p>두 저항 $R_1$, $R_2$가 같은 두 노드 사이에 병렬로 연결됩니다. 합성저항 $R_T = R_1 R_2/(R_1 + R_2)$는 항상 두 저항 모두보다 작아요. 전류는 컨덕턴스 비대로 분배 — 작은 저항 쪽으로 더 많이 흐릅니다.</p>
    <canvas id="pdivCanvas" width="640" height="300"></canvas>
    <div class="controls">
      <label>전체 전압 V <span class="val" id="pdivVV">12</span> V<input type="range" id="pdivV" min="1" max="20" step="0.5" value="12"></label>
      <label>R₁ <span class="val" id="pdivR1V">100</span> Ω<input type="range" id="pdivR1" min="10" max="500" step="10" value="100"></label>
      <label>R₂ <span class="val" id="pdivR2V">300</span> Ω<input type="range" id="pdivR2" min="10" max="500" step="10" value="300"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('pdivCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const V=+document.getElementById('pdivV').value;
      const R1=+document.getElementById('pdivR1').value;
      const R2=+document.getElementById('pdivR2').value;
      document.getElementById('pdivVV').textContent=V.toFixed(1);
      document.getElementById('pdivR1V').textContent=R1;
      document.getElementById('pdivR2V').textContent=R2;
      const RT=R1*R2/(R1+R2);
      const I1=V/R1,I2=V/R2,IT=I1+I2;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#333';ctx.font='13px sans-serif';
      ctx.fillText(`R_T = R_1‖R_2 = ${RT.toFixed(2)} Ω  (R_1=${R1}, R_2=${R2})`,30,28);
      ctx.fillText(`I_T = V/R_T = ${(IT*1000).toFixed(2)} mA`,30,50);
      const cx=180,cy=170,scale=400;
      ctx.strokeStyle='#222';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(60,cy);ctx.lineTo(cx,cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy-60);ctx.lineTo(cx+200,cy-60);ctx.lineTo(cx+200,cy+60);ctx.lineTo(cx,cy+60);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy-60);ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+60);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+200,cy-60);ctx.lineTo(cx+200,cy);ctx.lineTo(W-40,cy);ctx.moveTo(cx+200,cy+60);ctx.lineTo(cx+200,cy);ctx.stroke();
      ctx.fillStyle='#0b5fff';ctx.font='12px sans-serif';
      ctx.fillText(`R_1=${R1}Ω`,cx+80,cy-65);
      ctx.fillText(`I_1=${(I1*1000).toFixed(2)}mA`,cx+80,cy-40);
      ctx.fillStyle='#c62828';
      ctx.fillText(`R_2=${R2}Ω`,cx+80,cy+80);
      ctx.fillText(`I_2=${(I2*1000).toFixed(2)}mA`,cx+80,cy+55);
      const w1=Math.max(2,(I1/IT)*30);
      const w2=Math.max(2,(I2/IT)*30);
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=w1;ctx.beginPath();ctx.moveTo(cx+30,cy-60);ctx.lineTo(cx+170,cy-60);ctx.stroke();
      ctx.strokeStyle='#c62828';ctx.lineWidth=w2;ctx.beginPath();ctx.moveTo(cx+30,cy+60);ctx.lineTo(cx+170,cy+60);ctx.stroke();
      ctx.fillStyle='#333';ctx.font='12px sans-serif';
      ctx.fillText(`전류 분배: I_1/I_T = ${(I1/IT*100).toFixed(1)}%, I_2/I_T = ${(I2/IT*100).toFixed(1)}%`,30,H-20);
      ctx.fillText(`작은 저항 쪽으로 더 많이 흐름 (선 굵기 = 전류 크기)`,30,H-40);
    }
    ['pdivV','pdivR1','pdivR2'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
    draw();
  })();
  </script>
