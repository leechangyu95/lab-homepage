  <h1 class="page-title">🎮 인터랙티브: 잔차 연결의 효과</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/10-cnn-transfer.html">Week 10. CNN 심화와 전이학습</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 잔차 연결의 효과</h4>
    <p>같은 50층 네트워크에서 잔차 연결이 있을 때(파랑)와 없을 때(주황) 입력층에 도달하는 기울기 크기를 비교합니다.</p>
    <canvas id="resCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>층 수 <span class="val" id="rlV">50</span><input type="range" id="rl" min="5" max="100" step="1" value="50"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('resCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const L=+document.getElementById('rl').value;
      document.getElementById('rlV').textContent=L;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#ddd';ctx.beginPath();ctx.moveTo(40,H-30);ctx.lineTo(W-20,H-30);ctx.moveTo(40,20);ctx.lineTo(40,H-30);ctx.stroke();
      const xs=W-60;
      ctx.strokeStyle='#ff8c00';ctx.lineWidth=2;ctx.beginPath();
      for(let k=0;k<=L;k++){const g=Math.pow(0.85,k);const x=40+k/L*xs,y=H-30-g*(H-60);if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
      ctx.stroke();
      ctx.strokeStyle='#0b5fff';ctx.beginPath();
      for(let k=0;k<=L;k++){const g=1/(1+k*0.02);const x=40+k/L*xs,y=H-30-g*(H-60);if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
      ctx.stroke();
      ctx.fillStyle='#0b5fff';ctx.font='13px sans-serif';ctx.fillText('잔차 연결 있음',W-160,30);
      ctx.fillStyle='#ff8c00';ctx.fillText('잔차 연결 없음',W-160,48);
    }
    document.getElementById('rl').addEventListener('input',draw);
    draw();
  })();
  </script>
