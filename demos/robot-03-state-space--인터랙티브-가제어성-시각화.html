  <h1 class="page-title">🎮 인터랙티브: 가제어성 시각화</h1>
  <p class="demo-meta">
    로봇공학특론 · <a href="../backup-lectures/lectures/03-state-space.html">Lecture 3. 상태공간 모델</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 가제어성 시각화</h4>
    <p>두 질량이 직렬로 연결된 시스템에서 어느 질량에 힘을 가하느냐에 따라 가제어성이 달라집니다. 입력 위치를 바꿔보세요.</p>
    <canvas id="ctrl" width="640" height="240"></canvas>
    <div class="controls">
      <label>입력 위치
        <select id="inputAt">
          <option value="0">m₁에 힘 가하기 (가제어 ✓)</option>
          <option value="1">m₂에만 힘 가하기 (가제어 ✓)</option>
          <option value="2">두 질량을 같은 힘으로 (불가제어 ✗)</option>
        </select>
      </label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('ctrl'),x=c.getContext('2d');
    function rank(M){
      // simple gaussian elimination on copy
      const A=M.map(r=>[...r]);const m=A.length,n=A[0].length;let r=0;
      for(let col=0;col<n&&r<m;col++){
        let pv=r;for(let i=r+1;i<m;i++)if(Math.abs(A[i][col])>Math.abs(A[pv][col]))pv=i;
        if(Math.abs(A[pv][col])<1e-9)continue;
        [A[r],A[pv]]=[A[pv],A[r]];
        for(let i=r+1;i<m;i++){const f=A[i][col]/A[r][col];for(let j=col;j<n;j++)A[i][j]-=f*A[r][j];}
        r++;
      }
      return r;
    }
    function matmul(A,v){return A.map(r=>r.reduce((s,a,i)=>s+a*v[i],0));}
    function loop(){
      const sel=+document.getElementById('inputAt').value;
      // double mass: x = [x1, v1, x2, v2], k=2, m=1, c=0
      const A=[[0,1,0,0],[-2,0,2,0],[0,0,0,1],[2,0,-2,0]];
      let B;
      if(sel==0)B=[0,1,0,0];
      else if(sel==1)B=[0,0,0,1];
      else B=[0,1,0,1];
      const AB=matmul(A,B);
      const A2B=matmul(A,AB);
      const A3B=matmul(A,A2B);
      const C=[B,AB,A2B,A3B];           // rows are columns of [B AB A²B A³B]
      // we want rank of n×4 matrix; transpose to 4×n then transpose for rank
      const M=[];for(let i=0;i<4;i++)M.push([C[0][i],C[1][i],C[2][i],C[3][i]]);
      const r=rank(M);
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      // 그림: 두 질량
      x.fillStyle='#999';x.fillRect(40,100,8,80);
      const m1x=180,m2x=380;
      // 스프링 1
      x.strokeStyle='#666';x.lineWidth=2;x.beginPath();x.moveTo(48,140);
      for(let i=0;i<8;i++)x.lineTo(48+(m1x-48)*i/8,140+(i%2?-8:8));x.lineTo(m1x,140);x.stroke();
      // 스프링 2
      x.beginPath();x.moveTo(m1x+40,140);
      for(let i=0;i<8;i++)x.lineTo(m1x+40+(m2x-m1x-40)*i/8,140+(i%2?-8:8));x.lineTo(m2x,140);x.stroke();
      // 질량
      x.fillStyle='#0b5fff';x.fillRect(m1x,115,40,50);
      x.fillStyle='#0b5fff';x.fillRect(m2x,115,40,50);
      x.fillStyle='#fff';x.font='bold 14px sans-serif';x.textAlign='center';
      x.fillText('m₁',m1x+20,145);x.fillText('m₂',m2x+20,145);x.textAlign='start';
      // 입력 화살표
      x.strokeStyle='#c62828';x.lineWidth=3;
      function arrow(ax,ay,bx,by){x.beginPath();x.moveTo(ax,ay);x.lineTo(bx,by);x.stroke();
        x.beginPath();x.moveTo(bx,by);x.lineTo(bx-8,by-4);x.lineTo(bx-8,by+4);x.closePath();x.fillStyle='#c62828';x.fill();}
      if(sel==0||sel==2)arrow(m1x-40,140,m1x-5,140);
      if(sel==1||sel==2)arrow(m2x-40,140,m2x-5,140);
      // 결과 박스
      const ok=r==4;
      x.fillStyle=ok?'#e8f5e9':'#ffebee';x.fillRect(450,30,170,180);
      x.strokeStyle=ok?'#2e7d32':'#c62828';x.strokeRect(450,30,170,180);
      x.fillStyle='#222';x.font='13px sans-serif';
      x.fillText('상태 차원 n = 4',460,55);
      x.fillText('rank(C) = '+r,460,80);
      x.fillStyle=ok?'#2e7d32':'#c62828';x.font='bold 14px sans-serif';
      x.fillText(ok?'✓ 가제어':'✗ 불가제어',460,110);
      x.fillStyle='#666';x.font='11px sans-serif';
      const lines=ok?['모든 상태에','도달 가능합니다.']:['두 질량이 같은','입력을 받으면','대칭 모드는','제어 불가.'];
      lines.forEach((l,i)=>x.fillText(l,460,135+i*15));
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
