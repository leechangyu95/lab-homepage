  <h1 class="page-title">🎮 인터랙티브: 1차 시스템의 계단응답 만져보기</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/05-first-order.html">Week 5. 1차 시스템 시간응답</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 1차 시스템의 계단응답 만져보기</h4>
    <p>$\tau$와 $K$를 바꿔보면서 응답이 어떻게 변하는지 관찰하세요.
    파란 점은 $t = \tau$, $2\tau$, $3\tau$, $5\tau$ 위치.</p>
    <canvas id="fo" width="640" height="320"></canvas>
    <div class="controls">
      <label>시정수 τ <span class="val" id="ftV">1.0</span><input type="range" id="ft" min="0.2" max="3" step="0.05" value="1.0"></label>
      <label>DC 게인 K <span class="val" id="fkV">1.0</span><input type="range" id="fk" min="0.2" max="3" step="0.1" value="1.0"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('fo'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('ftV').textContent=(+$('ft').value).toFixed(2);$('fkV').textContent=(+$('fk').value).toFixed(1);};
    ['ft','fk'].forEach(id=>$(id).oninput=upd);
    function loop(){
      const tau=+$('ft').value, K=+$('fk').value;
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      const ox=50, oy=270, w=560, h=220, T=10;
      // grid + axes
      x.strokeStyle='#eee';for(let i=0;i<=5;i++){const xx=ox+i*w/5;x.beginPath();x.moveTo(xx,oy-h);x.lineTo(xx,oy);x.stroke();
        x.fillStyle='#888';x.font='10px sans-serif';x.fillText((i*T/5).toFixed(0)+'s',xx-8,oy+13);}
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,oy);x.lineTo(ox+w,oy);x.moveTo(ox,oy-h);x.lineTo(ox,oy);x.stroke();
      // K line
      const kY=oy-K*h/3;
      x.strokeStyle='#c62828';x.setLineDash([4,4]);x.beginPath();x.moveTo(ox,kY);x.lineTo(ox+w,kY);x.stroke();x.setLineDash([]);
      x.fillStyle='#c62828';x.fillText('K = '+K.toFixed(1),ox+w-50,kY-4);
      // 63% line
      const y63=oy-K*0.632*h/3;
      x.strokeStyle='#0b5fff';x.setLineDash([2,3]);x.beginPath();x.moveTo(ox,y63);x.lineTo(ox+w,y63);x.stroke();x.setLineDash([]);
      x.fillStyle='#0b5fff';x.fillText('0.632·K',ox+w-60,y63-4);
      // response curve
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      for(let i=0;i<=300;i++){const t=i*T/300, y=K*(1-Math.exp(-t/tau));
        const xx=ox+i*w/300, yy=oy-y*h/3; if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}
      x.stroke();
      // markers at τ, 2τ, 3τ, 5τ
      [1,2,3,5].forEach(n=>{const t=n*tau;if(t>T)return;
        const y=K*(1-Math.exp(-n)); const xx=ox+t*w/T, yy=oy-y*h/3;
        x.fillStyle='#0b5fff';x.beginPath();x.arc(xx,yy,5,0,Math.PI*2);x.fill();
        x.fillStyle='#444';x.font='11px sans-serif';x.fillText(n+'τ',xx-6,yy-8);});
      // labels
      x.fillStyle='#444';x.font='13px sans-serif';
      x.fillText('y(t) = K(1 − e^(−t/τ))   ⟶  τ='+tau.toFixed(2)+'s, 5τ='+(5*tau).toFixed(2)+'s',20,30);
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
