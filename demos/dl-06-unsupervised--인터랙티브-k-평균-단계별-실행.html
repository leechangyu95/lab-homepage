  <h1 class="page-title">🎮 인터랙티브: K-평균 단계별 실행</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/06-unsupervised.html">Week 6. 비지도학습 — 군집화와 차원 축소</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: K-평균 단계별 실행</h4>
    <p>"한 단계"를 누르면 할당과 갱신이 한 번씩 실행됩니다. "자동"은 수렴까지 돌립니다. 중심은 별표로 표시됩니다.</p>
    <canvas id="kmCanvas" width="640" height="380"></canvas>
    <div class="controls">
      <label>K <span class="val" id="kmKV">3</span><input type="range" id="kmK" min="2" max="6" step="1" value="3"></label>
      <button id="kmStep">한 단계</button>
      <button id="kmAuto">자동</button>
      <button id="kmReset">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('kmCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const COLORS=['#0b5fff','#ff8c00','#2e7d32','#c62828','#6a1b9a','#00838f'];
    let pts=[],centers=[],raf=null,running=false;
    function gen(){
      const K=+document.getElementById('kmK').value;
      pts=[];centers=[];
      const realK=Math.max(K,3);
      for(let k=0;k<realK;k++){
        const cx=80+Math.random()*(W-160),cy=60+Math.random()*(H-120);
        for(let i=0;i<35;i++){
          const u=Math.random(),v=Math.random();
          const z0=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)*30;
          const z1=Math.sqrt(-2*Math.log(u))*Math.sin(2*Math.PI*v)*30;
          pts.push({x:cx+z0,y:cy+z1,c:0});
        }
      }
      for(let k=0;k<K;k++)centers.push({x:80+Math.random()*(W-160),y:60+Math.random()*(H-120)});
      draw();
    }
    function step(){
      pts.forEach(p=>{
        let bd=Infinity,bi=0;
        centers.forEach((c,i)=>{const d=(p.x-c.x)**2+(p.y-c.y)**2;if(d<bd){bd=d;bi=i;}});
        p.c=bi;
      });
      centers.forEach((c,i)=>{
        const grp=pts.filter(p=>p.c===i);
        if(grp.length){c.x=grp.reduce((a,b)=>a+b.x,0)/grp.length;c.y=grp.reduce((a,b)=>a+b.y,0)/grp.length;}
      });
      draw();
    }
    function draw(){
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      pts.forEach(p=>{ctx.fillStyle=COLORS[p.c%6];ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();});
      centers.forEach((c,i)=>{
        ctx.fillStyle=COLORS[i%6];ctx.strokeStyle='#000';ctx.lineWidth=2;
        ctx.beginPath();
        for(let k=0;k<10;k++){const a=Math.PI*2*k/10-Math.PI/2,r=k%2===0?14:6;
          const x=c.x+Math.cos(a)*r,y=c.y+Math.sin(a)*r;if(k===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
        ctx.closePath();ctx.fill();ctx.stroke();
      });
    }
    function auto(){step();if(running)raf=requestAnimationFrame(()=>setTimeout(auto,400));}
    document.getElementById('kmStep').onclick=step;
    document.getElementById('kmAuto').onclick=()=>{if(!running){running=true;auto();}else{running=false;}};
    document.getElementById('kmReset').onclick=()=>{running=false;gen();};
    document.getElementById('kmK').addEventListener('input',()=>{document.getElementById('kmKV').textContent=document.getElementById('kmK').value;gen();});
    gen();
  })();
  </script>
