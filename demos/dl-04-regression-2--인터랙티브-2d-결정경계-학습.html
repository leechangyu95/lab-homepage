  <h1 class="page-title">🎮 인터랙티브: 2D 결정경계 학습</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/04-regression-2.html">Week 4. 회귀 2: 다중회귀, 로지스틱, 소프트맥스</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 2D 결정경계 학습</h4>
    <p>두 가우시안 클러스터(빨강/파랑)를 분리하는 직선을 로지스틱 회귀로 학습합니다. "학습" 버튼을 누르면 경사하강이 돌아갑니다.</p>
    <canvas id="logCanvas" width="640" height="340"></canvas>
    <div class="controls">
      <button id="logTrain">학습</button>
      <button id="logReset">리셋</button>
      <span id="logInfo" style="font-size:12px;color:#666"></span>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('logCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    let pts=[],w1=0.1,w2=-0.1,b=0,raf=null,running=false;
    function gen(){
      pts=[];
      for(let i=0;i<40;i++){pts.push({x:0.3+Math.random()*0.3,y:0.3+Math.random()*0.3,c:0});}
      for(let i=0;i<40;i++){pts.push({x:0.6+Math.random()*0.3,y:0.6+Math.random()*0.3,c:1});}
    }
    gen();
    function draw(){
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const STEP=10;
      for(let i=0;i<W;i+=STEP)for(let j=0;j<H;j+=STEP){
        const x=i/W,y=j/H;
        const z=w1*x+w2*y+b,s=1/(1+Math.exp(-z));
        ctx.fillStyle=s>0.5?'rgba(255,140,0,0.15)':'rgba(11,95,255,0.12)';
        ctx.fillRect(i,j,STEP,STEP);
      }
      pts.forEach(p=>{ctx.fillStyle=p.c?'#ff8c00':'#0b5fff';ctx.beginPath();ctx.arc(p.x*W,p.y*H,5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.stroke();});
      document.getElementById('logInfo').textContent=`w₁=${w1.toFixed(2)}  w₂=${w2.toFixed(2)}  b=${b.toFixed(2)}`;
    }
    function tick(){
      const lr=0.5;
      let dw1=0,dw2=0,db=0;
      pts.forEach(p=>{
        const z=w1*p.x+w2*p.y+b,s=1/(1+Math.exp(-z));
        const e=s-p.c;dw1+=e*p.x;dw2+=e*p.y;db+=e;
      });
      const N=pts.length;w1-=lr*dw1/N;w2-=lr*dw2/N;b-=lr*db/N;
      draw();
      if(running){raf=requestAnimationFrame(tick);}
    }
    document.getElementById('logTrain').onclick=()=>{if(!running){running=true;tick();}else{running=false;cancelAnimationFrame(raf);}};
    document.getElementById('logReset').onclick=()=>{running=false;cancelAnimationFrame(raf);w1=0.1;w2=-0.1;b=0;gen();draw();};
    draw();
  })();
  </script>
