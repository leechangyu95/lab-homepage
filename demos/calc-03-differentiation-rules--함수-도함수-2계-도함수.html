  <h1 class="page-title">🎮 함수 → 도함수 → 2계 도함수</h1>
  <p class="demo-meta">
    미분적분학 · <a href="../backup-lectures/lectures-calculus/03-differentiation-rules.html">Week 3. 미분 규칙</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 함수 → 도함수 → 2계 도함수</h4>
    <p>$f$가 증가하는 구간에서는 $f' > 0$, $f$가 볼록한 구간에서는 $f'' > 0$. 세 그래프가 어떻게 연결되는지 직접 비교해 보세요.</p>
    <canvas id="dr" width="640" height="360"></canvas>
    <div class="controls">
      <label>함수 선택
        <select id="drFn">
          <option value="poly" selected>다항: $x^3 - 3x$</option>
          <option value="sin">사인: $\sin x$</option>
          <option value="exp">지수: $e^{-x^2/2}$</option>
          <option value="prod">곱: $x \sin x$</option>
        </select>
      </label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('dr'),x=c.getContext('2d');
    const W=c.width,H=c.height;
    const xR=[-3,3];
    const M={l:50,r:20,t:20,b:30};
    function fn(v){
      const m=document.getElementById('drFn').value;
      if(m==='poly')return{f:v*v*v-3*v,d:3*v*v-3,d2:6*v};
      if(m==='sin')return{f:Math.sin(v),d:Math.cos(v),d2:-Math.sin(v)};
      if(m==='exp'){const e=Math.exp(-v*v/2);return{f:e,d:-v*e,d2:(v*v-1)*e};}
      // x sin x
      const s=Math.sin(v),co=Math.cos(v);
      return{f:v*s,d:s+v*co,d2:2*co-v*s};
    }
    function loop(){
      x.fillStyle='#fafbfc';x.fillRect(0,0,W,H);
      const panels=[
        {y0:20,y1:130,key:'f',color:'#0b5fff',label:'f(x)'},
        {y0:140,y1:240,key:'d',color:'#1b5e20',label:"f'(x)"},
        {y0:250,y1:350,key:'d2',color:'#c62828',label:"f''(x)"},
      ];
      const Lx0=50,Lx1=W-20;
      // sample
      const N=400;
      const samples=[];
      let mx={f:0,d:0,d2:0};
      for(let i=0;i<=N;i++){
        const v=xR[0]+i*(xR[1]-xR[0])/N;
        const o=fn(v);samples.push(o);
        ['f','d','d2'].forEach(k=>{if(Math.abs(o[k])>mx[k])mx[k]=Math.abs(o[k]);});
      }
      panels.forEach(p=>{
        x.strokeStyle='#ddd';x.strokeRect(Lx0,p.y0,Lx1-Lx0,p.y1-p.y0);
        x.fillStyle='#444';x.font='12px sans-serif';
        x.fillText(p.label,Lx0+6,p.y0+14);
        const yC=(p.y0+p.y1)/2;
        x.strokeStyle='#bbb';x.beginPath();x.moveTo(Lx0,yC);x.lineTo(Lx1,yC);x.stroke();
        // x-axis ticks
        for(let v=Math.ceil(xR[0]);v<=xR[1];v++){
          const xx=Lx0+(v-xR[0])/(xR[1]-xR[0])*(Lx1-Lx0);
          x.strokeStyle='#eee';x.beginPath();x.moveTo(xx,p.y0);x.lineTo(xx,p.y1);x.stroke();
        }
        x.strokeStyle=p.color;x.lineWidth=2;x.beginPath();
        const m=Math.max(0.5,mx[p.key]*1.05);
        for(let i=0;i<=N;i++){
          const v=xR[0]+i*(xR[1]-xR[0])/N;
          const xx=Lx0+(v-xR[0])/(xR[1]-xR[0])*(Lx1-Lx0);
          const yy=yC - samples[i][p.key]/m*((p.y1-p.y0)/2 - 12);
          if(i===0)x.moveTo(xx,yy);else x.lineTo(xx,yy);
        }
        x.stroke();
      });
      requestAnimationFrame(()=>setTimeout(loop,80));
    }
    loop();
  })();
  </script>
</main>
