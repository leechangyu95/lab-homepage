  <h1 class="page-title">🎮 인터랙티브: $K$의 시간 변화</h1>
  <p class="demo-meta">
    로봇공학특론 · <a href="../backup-lectures/lectures/04-kalman-1d.html">Lecture 4. 칼만 필터 (1D)</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: $K$의 시간 변화</h4>
    <p>초기에 분산 $P$가 크므로 $K$가 거의 1입니다(측정을 그대로 받음). 시간이 지나며 $P$가 줄고 $K$도 작아져 안정됩니다.</p>
    <canvas id="kgain" width="640" height="280"></canvas>
    <div class="controls">
      <label>R <span class="val" id="kgRV">5</span><input type="range" id="kgR" min="0.5" max="20" step="0.5" value="5"></label>
      <label>Q <span class="val" id="kgQV">0.1</span><input type="range" id="kgQ" min="0" max="2" step="0.05" value="0.1"></label>
      <button id="kgRst">재시작</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('kgain'),x=c.getContext('2d');
    let P,Khist,Phist,frame=0;
    function init(){P=100;Khist=[];Phist=[];frame=0;}
    init();document.getElementById('kgRst').onclick=init;
    function loop(){
      if(frame++%5===0){
        const R=+document.getElementById('kgR').value;
        const Q=+document.getElementById('kgQ').value;
        // predict
        P=P+Q;
        // K
        const K=P/(P+R);
        Khist.push(K);Phist.push(P);
        if(Khist.length>120){Khist.shift();Phist.shift();}
        // update
        P=(1-K)*P;
      }
      ['kgR','kgQ'].forEach(k=>document.getElementById(k+'V').textContent=document.getElementById(k).value);
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      x.strokeStyle='#999';x.beginPath();x.moveTo(40,240);x.lineTo(620,240);x.moveTo(40,30);x.lineTo(40,240);x.stroke();
      x.fillStyle='#666';x.font='12px sans-serif';x.fillText('스텝 →',560,255);x.fillText('K, P',12,40);
      // K (0~1) 곡선
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      Khist.forEach((v,i)=>{const xx=40+i*4.8,yy=240-v*180;if(i===0)x.moveTo(xx,yy);else x.lineTo(xx,yy);});x.stroke();
      // P (정규화) 곡선
      const Pmax=Math.max(...Phist,1);
      x.strokeStyle='#ff8c00';x.beginPath();
      Phist.forEach((v,i)=>{const xx=40+i*4.8,yy=240-v/Pmax*180;if(i===0)x.moveTo(xx,yy);else x.lineTo(xx,yy);});x.stroke();
      x.fillStyle='#0b5fff';x.fillText('🔵 K (칼만 이득)',40,30);
      x.fillStyle='#ff8c00';x.fillText('🟠 P (정규화 분산)',180,30);
      x.fillStyle='#666';x.fillText('수렴 K ≈ '+(Khist[Khist.length-1]||0).toFixed(3),330,30);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
