  <h1 class="page-title">🎮 인터랙티브: 활성함수 모양 비교</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/07-mlp.html">Week 7. 퍼셉트론과 다층 신경망(MLP)</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 활성함수 모양 비교</h4>
    <p>네 가지 활성함수를 동시에 그립니다. 각각의 출력 범위와 미분 가능 영역을 한눈에.</p>
    <canvas id="actComp" width="640" height="320"></canvas>
  </div>
  <script>
  (function(){
    const c=document.getElementById('actComp');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const PL=50,PR=20,PT=20,PB=30;
    const plotW=W-PL-PR,plotH=H-PT-PB;
    function px(x){return PL+(x+5)/10*plotW;}
    function py(y){return PT+plotH/2-y*plotH/4;}
    ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#bbb';ctx.beginPath();ctx.moveTo(PL,py(0));ctx.lineTo(PL+plotW,py(0));ctx.moveTo(px(0),PT);ctx.lineTo(px(0),PT+plotH);ctx.stroke();
    function plot(f,col,lab,labY){
      ctx.strokeStyle=col;ctx.lineWidth=2;ctx.beginPath();
      for(let i=0;i<=200;i++){const z=-5+10*i/200;const v=f(z);if(i===0)ctx.moveTo(px(z),py(v));else ctx.lineTo(px(z),py(v));}
      ctx.stroke();
      ctx.fillStyle=col;ctx.font='13px sans-serif';ctx.fillText(lab,PL+10,labY);
    }
    plot(z=>1/(1+Math.exp(-z)),'#0b5fff','Sigmoid (0,1)',PT+15);
    plot(z=>Math.tanh(z),'#2e7d32','Tanh (-1,1)',PT+30);
    plot(z=>Math.max(0,z),'#ff8c00','ReLU [0,∞)',PT+45);
    plot(z=>z>0?z:0.1*z,'#c62828','Leaky ReLU',PT+60);
    ctx.fillStyle='#666';ctx.font='12px sans-serif';
    ctx.fillText('z 축: -5에서 5, y 축은 시각화를 위해 스케일링',PL,H-10);
  })();
  </script>
