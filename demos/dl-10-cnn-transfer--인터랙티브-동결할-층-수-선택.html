  <h1 class="page-title">🎮 인터랙티브: 동결할 층 수 선택</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/10-cnn-transfer.html">Week 10. CNN 심화와 전이학습</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 동결할 층 수 선택</h4>
    <p>네트워크의 어디서부터 풀어줄지(unfreeze) 정해보세요. 너무 많이 풀면 작은 데이터로 학습이 망가지고, 너무 적게 풀면 새 도메인에 적응하지 못합니다.</p>
    <canvas id="frzCanvas" width="640" height="240"></canvas>
    <div class="controls">
      <label>마지막부터 풀 층 수 <span class="val" id="ufV">2</span><input type="range" id="uf" min="0" max="6" step="1" value="2"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('frzCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const u=+document.getElementById('uf').value;
      document.getElementById('ufV').textContent=u;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const N=6,bw=80,gap=20,total=N*(bw+gap)-gap,x0=(W-total)/2;
      for(let i=0;i<N;i++){
        const x=x0+i*(bw+gap);
        const frozen=i<N-u;
        ctx.fillStyle=frozen?'#bbb':'#0b5fff';
        ctx.fillRect(x,80,bw,80);
        ctx.fillStyle='#fff';ctx.font='13px sans-serif';
        ctx.fillText(`층 ${i+1}`,x+20,125);
        ctx.fillStyle='#333';ctx.fillText(frozen?'동결':'학습',x+22,180);
      }
      ctx.fillStyle='#333';ctx.font='13px sans-serif';
      ctx.fillText('입력 →',10,125);ctx.fillText('→ 출력',W-50,125);
    }
    document.getElementById('uf').addEventListener('input',draw);
    draw();
  })();
  </script>
