  <h1 class="page-title">🎮 데모 2: 막대 진자 vs 점 질량 진자 — 주기 비교</h1>
  <p class="demo-meta">
    동역학 · <a href="../backup-lectures/lectures-dynamics/11-rigid-kinetics.html">Week 11. 강체의 평면 운동역학</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 데모 2: 막대 진자 vs 점 질량 진자 — 주기 비교</h4>
    <p>같은 길이의 두 진자: 한 쪽은 끝이 무거운 단진자(점 질량 모델), 다른 쪽은 균일한 막대 진자. <strong>같은 길이인데 주기가 다릅니다</strong> — 막대 진자는 질량이 분산되어 있어 관성모멘트 식이 달라지고, 결과적으로 주기가 다릅니다.</p>
    <canvas id="penC" width="640" height="380"></canvas>
    <div class="controls">
      <label>진자 길이 L (m) <span class="val" id="rkLV">1.5</span><input type="range" id="rkL" min="0.5" max="2.5" step="0.05" value="1.5"></label>
      <label>초기 각 (°) <span class="val" id="rkAV">30</span><input type="range" id="rkA" min="5" max="60" step="1" value="30"></label>
      <button id="rkReset">재시작</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('penC'),x=c.getContext('2d');
    const sl=id=>document.getElementById(id);
    const ks=['rkL','rkA'];
    const upd=()=>ks.forEach(k=>sl(k+'V').textContent=sl(k).value);
    ks.forEach(k=>sl(k).oninput=upd);upd();
    let p1={th:0.5,w:0},p2={th:0.5,w:0};
    function reset(){
      const a0=+sl('rkA').value*Math.PI/180;
      p1={th:a0,w:0};p2={th:a0,w:0};
    }
    sl('rkReset').onclick=reset;
    ks.forEach(k=>sl(k).addEventListener('change',reset));
    reset();
    function loop(){
      const L=+sl('rkL').value,g=9.81,dt=0.025;
      // point pendulum: I = mL², d=L → ω_n² = g/L
      // rod pendulum: I_O = (1/3)mL², d = L/2 → ω_n² = (mg(L/2))/((1/3)mL²) = 3g/(2L)
      const w1sq=g/L,w2sq=3*g/(2*L);
      // exact equations of motion
      p1.w+=-w1sq*Math.sin(p1.th)*dt;p1.w*=0.999;p1.th+=p1.w*dt;
      p2.w+=-w2sq*Math.sin(p2.th)*dt;p2.w*=0.999;p2.th+=p2.w*dt;
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      // pivot points
      const px=160,px2=480,py=80;
      // Pendulum 1: point mass at end
      const Lpx=L*100;
      const e1x=px+Lpx*Math.sin(p1.th),e1y=py+Lpx*Math.cos(p1.th);
      x.strokeStyle='#444';x.lineWidth=1.5;x.beginPath();x.moveTo(px,py);x.lineTo(e1x,e1y);x.stroke();
      x.fillStyle='#0b5fff';x.beginPath();x.arc(e1x,e1y,16,0,Math.PI*2);x.fill();x.strokeStyle='#333';x.stroke();
      x.fillStyle='#333';x.beginPath();x.arc(px,py,4,0,Math.PI*2);x.fill();
      // Pendulum 2: rod (uniform)
      const e2x=px2+Lpx*Math.sin(p2.th),e2y=py+Lpx*Math.cos(p2.th);
      x.strokeStyle='#c62828';x.lineWidth=8;x.beginPath();x.moveTo(px2,py);x.lineTo(e2x,e2y);x.stroke();
      x.strokeStyle='#3a0c0c';x.lineWidth=1;x.stroke();
      x.fillStyle='#333';x.beginPath();x.arc(px2,py,4,0,Math.PI*2);x.fill();
      // labels
      const T1=2*Math.PI/Math.sqrt(w1sq),T2=2*Math.PI/Math.sqrt(w2sq);
      x.fillStyle='#0b5fff';x.font='bold 13px sans-serif';x.textAlign='center';
      x.fillText('점 질량 단진자',px,40);
      x.fillStyle='#0b5fff';x.font='12px Consolas,monospace';
      x.fillText('ω_n² = g/L',px,c.height-50);
      x.fillText('주기 T = 2π√(L/g) = '+T1.toFixed(2)+' s',px,c.height-30);
      x.fillStyle='#c62828';x.font='bold 13px sans-serif';
      x.fillText('균일 막대 진자',px2,40);
      x.fillStyle='#c62828';x.font='12px Consolas,monospace';
      x.fillText('ω_n² = 3g/(2L)',px2,c.height-50);
      x.fillText('주기 T = 2π√(2L/3g) = '+T2.toFixed(2)+' s',px2,c.height-30);
      x.fillStyle='#666';x.font='11px sans-serif';x.textAlign='center';
      x.fillText('막대가 더 빠르다 — 같은 길이라도 질량이 안쪽으로 분포해 효과적으로 짧음',c.width/2,c.height-10);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
