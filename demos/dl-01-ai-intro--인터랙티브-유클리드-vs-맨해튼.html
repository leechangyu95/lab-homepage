  <h1 class="page-title">🎮 인터랙티브: 유클리드 vs 맨해튼</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/01-ai-intro.html">Week 1. AI의 세계</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 유클리드 vs 맨해튼</h4>
    <p>중심점에서 같은 거리에 있는 점들의 집합(=등거리원)을 그립니다. 유클리드는 동그란 원이지만 맨해튼은 마름모(정사각형 회전)입니다.</p>
    <canvas id="dist" width="640" height="320"></canvas>
    <div class="controls">
      <label>반지름 <span class="val" id="rV">80</span><input type="range" id="rr" min="20" max="140" step="2" value="80"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('dist');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const r=+document.getElementById('rr').value;
      document.getElementById('rV').textContent=r;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const cx1=W/4,cy=H/2,cx2=3*W/4;
      // Euclidean
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(cx1,cy,r,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#0b5fff';ctx.beginPath();ctx.arc(cx1,cy,3,0,Math.PI*2);ctx.fill();
      // Manhattan: diamond
      ctx.strokeStyle='#ff8c00';
      ctx.beginPath();
      ctx.moveTo(cx2,cy-r);ctx.lineTo(cx2+r,cy);ctx.lineTo(cx2,cy+r);ctx.lineTo(cx2-r,cy);ctx.closePath();ctx.stroke();
      ctx.fillStyle='#ff8c00';ctx.beginPath();ctx.arc(cx2,cy,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#333';ctx.font='14px sans-serif';
      ctx.fillText('유클리드 (L2)',cx1-50,30);
      ctx.fillText('맨해튼 (L1)',cx2-50,30);
    }
    document.getElementById('rr').addEventListener('input',draw);
    draw();
  })();
  </script>
