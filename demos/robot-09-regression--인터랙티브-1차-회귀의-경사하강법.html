  <h1 class="page-title">🎮 인터랙티브: 1차 회귀의 경사하강법</h1>
  <p class="demo-meta">
    로봇공학특론 · <a href="../backup-lectures/lectures/09-regression.html">Lecture 9. 선형 회귀</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 1차 회귀의 경사하강법</h4>
    <p>왼쪽: 데이터와 현재 직선. 오른쪽: MSE 손실 표면($\beta_0, \beta_1$)에서 내려가는 궤적. <strong>Step</strong>을 누를 때마다 한 번 업데이트됩니다.</p>
    <canvas id="gd" width="640" height="320"></canvas>
    <div class="controls">
      <label>학습률 η <span class="val" id="etaV">0.02</span><input type="range" id="eta" min="0.001" max="0.1" step="0.001" value="0.02"></label>
      <button id="gdStep">+1 Step</button>
      <button id="gdAuto">자동</button>
      <button id="gdRst" class="alt">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('gd');
    if(!c)return;
    const ctx=c.getContext('2d');
    // Data: 20 points, true slope 1.5, intercept 0.3
    const data=[];
    for(let i=0;i<20;i++){
      const xi=i/10;   // [0, 1.9]
      data.push([xi,1.5*xi+0.3+(Math.random()*2-1)*0.25]);
    }
    // Left plot box: data space x in [0, 2], y in [-0.5, 4]
    const LX=40,LT=50,LW=260,LH=230;    // left box top-left + width/height
    const xMin=0,xMax=2,yMin=-0.5,yMax=4;
    function lx(u){return LX+(u-xMin)/(xMax-xMin)*LW;}
    function ly(v){return LT+LH-(v-yMin)/(yMax-yMin)*LH;}
    // clip line to box for visualization
    function clipLine(a,b){
      // y = a + b*x, return two endpoints within the box
      const ptsOut=[];
      // intersect with x=xMin, x=xMax
      [xMin,xMax].forEach(xv=>{const yv=a+b*xv;if(yv>=yMin&&yv<=yMax)ptsOut.push([xv,yv]);});
      // intersect with y=yMin, y=yMax
      if(Math.abs(b)>1e-9){
        [yMin,yMax].forEach(yv=>{const xv=(yv-a)/b;if(xv>=xMin&&xv<=xMax)ptsOut.push([xv,yv]);});
      }
      return ptsOut.slice(0,2);
    }
    // Right loss surface box
    const RX=360,RT=50,RW=240,RH=230;
    const bMin=-2,bMax=4;  // both beta0 and beta1 range
    function rx(a){return RX+(a-bMin)/(bMax-bMin)*RW;}
    function ry(b){return RT+RH-(b-bMin)/(bMax-bMin)*RH;}

    const B0_INIT=3.5,B1_INIT=-1.8;
    let b0=B0_INIT,b1=B1_INIT,traj=[[b0,b1]];
    let auto=false;
    function loss(a,b){let s=0;data.forEach(([u,v])=>{const e=a+b*u-v;s+=e*e;});return s/data.length;}
    function step(){
      const eta=parseFloat(document.getElementById('eta').value);
      let g0=0,g1=0;
      data.forEach(([u,v])=>{const e=b0+b1*u-v;g0+=2*e;g1+=2*e*u;});
      g0/=data.length;g1/=data.length;
      b0-=eta*g0;b1-=eta*g1;
      traj.push([b0,b1]);
    }
    function draw(){
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,c.width,c.height);
      document.getElementById('etaV').textContent=parseFloat(document.getElementById('eta').value).toFixed(3);
      // === LEFT: data + line ===
      ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.strokeRect(LX,LT,LW,LH);
      // grid
      ctx.strokeStyle='#eee';
      for(let gy=0;gy<=4;gy++){ctx.beginPath();ctx.moveTo(LX,ly(gy));ctx.lineTo(LX+LW,ly(gy));ctx.stroke();}
      for(let gx=0;gx<=2;gx+=0.5){ctx.beginPath();ctx.moveTo(lx(gx),LT);ctx.lineTo(lx(gx),LT+LH);ctx.stroke();}
      // data points
      ctx.fillStyle='#c62828';
      data.forEach(([u,v])=>{ctx.beginPath();ctx.arc(lx(u),ly(v),4,0,Math.PI*2);ctx.fill();});
      // current line (clipped)
      const seg=clipLine(b0,b1);
      if(seg.length===2){
        ctx.strokeStyle='#0b5fff';ctx.lineWidth=2.5;
        ctx.beginPath();ctx.moveTo(lx(seg[0][0]),ly(seg[0][1]));ctx.lineTo(lx(seg[1][0]),ly(seg[1][1]));ctx.stroke();
      }
      ctx.fillStyle='#444';ctx.font='12px sans-serif';
      ctx.fillText('β₀='+b0.toFixed(2)+'  β₁='+b1.toFixed(2)+'  L='+loss(b0,b1).toFixed(3),LX,LT-12);
      // === RIGHT: MSE loss surface + trajectory ===
      const cell=8;
      let lmin=Infinity,lmax=-Infinity;const vals=[];
      for(let i=0;i<RW;i+=cell){
        for(let j=0;j<RH;j+=cell){
          const a=bMin+(i/RW)*(bMax-bMin);
          const b=bMin+((RH-j)/RH)*(bMax-bMin);
          const L=loss(a,b);
          vals.push([i,j,L]);
          if(L<lmin)lmin=L;if(L>lmax)lmax=L;
        }
      }
      vals.forEach(([i,j,L])=>{
        const t=Math.min(1,(L-lmin)/(lmax-lmin+1e-9));
        ctx.fillStyle='rgba(11,95,255,'+(1-t)*0.55+')';
        ctx.fillRect(RX+i,RT+j,cell,cell);
      });
      ctx.strokeStyle='#333';ctx.strokeRect(RX,RT,RW,RH);
      // axes labels
      ctx.fillStyle='#666';ctx.font='11px sans-serif';
      ctx.fillText('β₀',RX+RW/2,RT+RH+15);
      ctx.save();ctx.translate(RX-12,RT+RH/2);ctx.rotate(-Math.PI/2);ctx.fillText('β₁',0,0);ctx.restore();
      // trajectory
      ctx.strokeStyle='#ff8c00';ctx.lineWidth=2;ctx.beginPath();
      traj.forEach((p,i)=>{
        const px=rx(p[0]),py=ry(p[1]);
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      });
      ctx.stroke();
      // current point on surface
      const cur=traj[traj.length-1];
      ctx.fillStyle='#ff8c00';
      ctx.beginPath();ctx.arc(rx(cur[0]),ry(cur[1]),5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#444';ctx.font='12px sans-serif';
      ctx.fillText('MSE(β₀,β₁) — step '+(traj.length-1),RX,RT-12);
    }
    function tick(){
      if(auto)step();
      draw();
      requestAnimationFrame(tick);
    }
    document.getElementById('gdStep').addEventListener('click',()=>{step();});
    document.getElementById('gdAuto').addEventListener('click',()=>{auto=!auto;});
    document.getElementById('gdRst').addEventListener('click',()=>{b0=B0_INIT;b1=B1_INIT;traj=[[b0,b1]];});
    document.getElementById('eta').addEventListener('input',()=>{});
    tick();
  })();
  </script>
</main>
