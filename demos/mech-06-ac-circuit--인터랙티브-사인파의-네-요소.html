  <h1 class="page-title">🎮 인터랙티브: 사인파의 네 요소</h1>
  <p class="demo-meta">
    기전공학기초 · <a href="../backup-lectures/lectures-mech/06-ac-circuit.html">Week 6. 교류회로 — 정현파와 페이저</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 사인파의 네 요소</h4>
    <p>진폭·각주파수·위상이 그래프 모양에 어떻게 영향을 주는지 직접 봅니다. 위상이 양수면 그래프가 왼쪽으로 이동(앞섬), 음수면 오른쪽 이동(뒤짐).</p>
    <canvas id="sinCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>진폭 A <span class="val" id="sinAV">1.0</span><input type="range" id="sinA" min="0.1" max="2" step="0.1" value="1"></label>
      <label>각주파수 ω <span class="val" id="sinWV">2</span> rad/s<input type="range" id="sinW" min="1" max="8" step="0.5" value="2"></label>
      <label>위상 θ <span class="val" id="sinPV">0</span>°<input type="range" id="sinP" min="-180" max="180" step="10" value="0"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('sinCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const Tspan=2*Math.PI;
    function draw(){
      const A=+document.getElementById('sinA').value;
      const w=+document.getElementById('sinW').value;
      const p=+document.getElementById('sinP').value*Math.PI/180;
      document.getElementById('sinAV').textContent=A.toFixed(1);
      document.getElementById('sinWV').textContent=w.toFixed(1);
      document.getElementById('sinPV').textContent=(p*180/Math.PI).toFixed(0);
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      function x(t){return 60+t/Tspan*(W-90);}
      function y(v){return H/2 - v*((H-60)/2/2.2);}
      ctx.strokeStyle='#ddd';
      for(let t=0;t<=Tspan;t+=Math.PI/4){ctx.beginPath();ctx.moveTo(x(t),20);ctx.lineTo(x(t),H-30);ctx.stroke();}
      ctx.strokeStyle='#666';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x(0),H/2);ctx.lineTo(x(Tspan),H/2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x(0),20);ctx.lineTo(x(0),H-30);ctx.stroke();
      // Reference (dashed)
      ctx.setLineDash([4,3]);ctx.strokeStyle='#999';ctx.lineWidth=1.5;
      ctx.beginPath();
      for(let t=0;t<=Tspan;t+=0.02){
        const v=Math.cos(w*t);
        if(t===0)ctx.moveTo(x(t),y(v));else ctx.lineTo(x(t),y(v));
      }
      ctx.stroke();
      ctx.setLineDash([]);
      // Current signal
      ctx.strokeStyle='#0b5fff';ctx.lineWidth=2.5;
      ctx.beginPath();
      for(let t=0;t<=Tspan;t+=0.01){
        const v=A*Math.cos(w*t+p);
        if(t===0)ctx.moveTo(x(t),y(v));else ctx.lineTo(x(t),y(v));
      }
      ctx.stroke();
      ctx.fillStyle='#222';ctx.font='13px sans-serif';
      ctx.fillText(`v(t) = ${A.toFixed(1)}·cos(${w.toFixed(1)}t + ${(p*180/Math.PI).toFixed(0)}°)`,30,20);
      ctx.fillStyle='#999';ctx.font='12px sans-serif';
      ctx.fillText('회색 점선: cos(ωt) 기준',30,H-10);
      const T=2*Math.PI/w;
      ctx.fillStyle='#1b5e20';
      ctx.fillText(`T = ${T.toFixed(2)}s, f = ${(1/T).toFixed(2)}Hz`,W-200,20);
    }
    ['sinA','sinW','sinP'].forEach(id=>document.getElementById(id).addEventListener('input',draw));
    draw();
  })();
  </script>
