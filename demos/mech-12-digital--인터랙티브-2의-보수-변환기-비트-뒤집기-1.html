  <h1 class="page-title">🎮 인터랙티브: 2의 보수 변환기 — 비트 뒤집기 + 1</h1>
  <p class="demo-meta">
    기전공학기초 · <a href="../backup-lectures/lectures-mech/12-digital.html">Week 12. 디지털 논리 — 0과 1로 짓는 컴퓨터</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 2의 보수 변환기 — 비트 뒤집기 + 1</h4>
    <p>10진수를 입력하면 8비트 2의 보수로 변환하는 과정을 단계별로 보여줍니다. 부호 있는 8비트로 표현 가능한 범위는 −128 ~ +127.</p>
    <canvas id="twosCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>10진수 (−128 ~ 127) <span class="val" id="twosNV">−5</span><input type="range" id="twosN" min="-128" max="127" step="1" value="-5"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('twosCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function bits(n){
      // 8-bit two's complement
      const x=(n<0)?(256+n):n;
      return x.toString(2).padStart(8,'0');
    }
    function draw(){
      const N=+document.getElementById('twosN').value;
      document.getElementById('twosNV').textContent=N<0?'−'+(-N):''+N;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#222';ctx.font='14px sans-serif';
      const absBits=bits(Math.abs(N));
      const flipped=absBits.split('').map(b=>b==='0'?'1':'0').join('');
      // +1
      let carry=1, addRes='';
      for(let i=flipped.length-1;i>=0;i--){const b=+flipped[i]+carry;addRes=(b%2)+addRes;carry=b>=2?1:0;}
      const finalBits=N>=0?absBits:(N===-128?'10000000':addRes);
      const labelY=[60,110,160,210];
      function bitRow(y,bits,label,colorFn){
        ctx.fillStyle='#222';ctx.font='13px sans-serif';
        ctx.fillText(label,30,y-15);
        const cellW=42,startX=240;
        for(let i=0;i<8;i++){
          const x=startX+i*cellW;
          ctx.fillStyle=colorFn?colorFn(bits[i],i):(bits[i]==='1'?'#0b5fff':'#eee');
          ctx.fillRect(x,y-25,cellW-3,32);
          ctx.strokeStyle='#222';ctx.strokeRect(x,y-25,cellW-3,32);
          ctx.fillStyle=bits[i]==='1'?'#fff':'#666';
          ctx.font='bold 16px monospace';
          ctx.fillText(bits[i],x+15,y);
        }
      }
      ctx.fillStyle='#222';ctx.font='13px sans-serif';
      if(N>=0){
        ctx.fillText(`양수: 그대로 2진수로 변환`,30,30);
        bitRow(80,absBits,`+${N} (8비트 2진수)`,null);
        ctx.fillStyle='#666';ctx.font='12px sans-serif';
        ctx.fillText(`MSB=0 (양수). 자리값: ${[128,64,32,16,8,4,2,1].join(' ')}`,30,160);
        let sum=0;absBits.split('').forEach((b,i)=>{if(b==='1')sum+=Math.pow(2,7-i);});
        ctx.fillText(`검산 합: ${sum} ✓`,30,180);
      } else if(N===-128){
        ctx.fillText(`경계 케이스: −128`,30,30);
        bitRow(80,'10000000','−128 (8비트 2의 보수)',null);
        ctx.fillStyle='#666';ctx.font='12px sans-serif';
        ctx.fillText('10000000 → MSB=−128, 나머지=0 → 합 = −128',30,160);
      } else {
        ctx.fillText(`Step 1: |N| = ${-N}을 2진수로`,30,30);
        bitRow(80,absBits,`|${N}| = ${-N}`,null);
        ctx.fillStyle='#222';
        ctx.fillText('Step 2: 모든 비트 뒤집기 (1의 보수)',30,120);
        bitRow(160,flipped,'~|N|',(b,i)=>b==='1'?'#f5a623':'#fff8e1');
        ctx.fillStyle='#222';
        ctx.fillText('Step 3: +1 → 2의 보수 (= N의 8비트 표현)',30,200);
        bitRow(245,finalBits,`${N}`,(b,i)=>b==='1'?'#c62828':'#ffebee');
      }
    }
    document.getElementById('twosN').addEventListener('input',draw);
    draw();
  })();
  </script>
