  <h1 class="page-title">🎮 인터랙티브: RNN 펼침 시각화</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/11-rnn-lstm.html">Week 11. RNN과 LSTM</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: RNN 펼침 시각화</h4>
    <p>같은 셀이 시간을 따라 5번 반복되는 모습을 봅니다. 슬라이더로 시점을 옮기면 그 순간의 은닉 상태가 강조됩니다.</p>
    <canvas id="rnnCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <label>현재 시점 t <span class="val" id="rtV">2</span><input type="range" id="rt" min="0" max="4" step="1" value="2"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('rnnCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    function draw(){
      const t=+document.getElementById('rt').value;
      document.getElementById('rtV').textContent=t;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const N=5,bw=80,gap=40;
      const total=N*(bw+gap)-gap,x0=(W-total)/2;
      for(let i=0;i<N;i++){
        const x=x0+i*(bw+gap),y=110;
        ctx.fillStyle=i===t?'#0b5fff':'#bbd0ff';
        ctx.strokeStyle='#000';ctx.fillRect(x,y,bw,60);ctx.strokeRect(x,y,bw,60);
        ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.fillText(`h${i}`,x+30,y+38);
        ctx.fillStyle='#333';ctx.font='12px sans-serif';
        ctx.fillText(`x${i}`,x+30,y-8);
        ctx.beginPath();ctx.moveTo(x+40,y-25);ctx.lineTo(x+40,y);ctx.strokeStyle='#666';ctx.stroke();
        ctx.fillText(`y${i}`,x+30,y+85);
        ctx.beginPath();ctx.moveTo(x+40,y+60);ctx.lineTo(x+40,y+78);ctx.stroke();
        if(i<N-1){ctx.beginPath();ctx.moveTo(x+bw,y+30);ctx.lineTo(x+bw+gap,y+30);ctx.strokeStyle='#0b5fff';ctx.lineWidth=2;ctx.stroke();ctx.lineWidth=1;}
      }
      ctx.fillStyle='#666';ctx.font='13px sans-serif';
      ctx.fillText('같은 셀이 시간을 따라 반복',W/2-100,30);
    }
    document.getElementById('rt').addEventListener('input',draw);
    draw();
  })();
  </script>
