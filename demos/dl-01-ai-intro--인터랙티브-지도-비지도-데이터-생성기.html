  <h1 class="page-title">🎮 인터랙티브: 지도/비지도 데이터 생성기</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/01-ai-intro.html">Week 1. AI의 세계</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 지도/비지도 데이터 생성기</h4>
    <p>클러스터 수와 분산을 조절해 데이터를 생성합니다. "라벨 보이기"를 끄면 비지도학습 입장에서 본 데이터입니다 — 색이 없으니 그저 점 무더기죠.</p>
    <canvas id="genCanvas" width="640" height="320"></canvas>
    <div class="controls">
      <label>클러스터 수 <span class="val" id="kgV">3</span><input type="range" id="kg" min="2" max="5" step="1" value="3"></label>
      <label>분산 <span class="val" id="sgV">25</span><input type="range" id="sg" min="5" max="60" step="1" value="25"></label>
      <label><input type="checkbox" id="lblOn" checked> 라벨 보이기</label>
      <button id="regen">새로 생성</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('genCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const COLORS=['#0b5fff','#ff8c00','#2e7d32','#c62828','#6a1b9a'];
    let pts=[];
    function gen(){
      const K=+document.getElementById('kg').value;
      const sigma=+document.getElementById('sg').value;
      pts=[];
      const centers=[];
      for(let k=0;k<K;k++){centers.push({x:80+Math.random()*(W-160),y:60+Math.random()*(H-120)});}
      for(let k=0;k<K;k++){
        for(let i=0;i<40;i++){
          const u=Math.random(),v=Math.random();
          const z0=Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
          const z1=Math.sqrt(-2*Math.log(u))*Math.sin(2*Math.PI*v);
          pts.push({x:centers[k].x+z0*sigma,y:centers[k].y+z1*sigma,c:k});
        }
      }
      draw();
    }
    function draw(){
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const lbl=document.getElementById('lblOn').checked;
      pts.forEach(p=>{
        ctx.fillStyle=lbl?COLORS[p.c]:'#888';
        ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();
      });
      ctx.fillStyle='#333';ctx.font='13px sans-serif';
      ctx.fillText(lbl?'지도학습 — 색=라벨':'비지도학습 — 라벨 없음',12,20);
    }
    ['kg','sg'].forEach(id=>{
      document.getElementById(id).addEventListener('input',()=>{
        document.getElementById(id+'V').textContent=document.getElementById(id).value;
        if(id==='sg')gen();else gen();
      });
    });
    document.getElementById('lblOn').addEventListener('change',draw);
    document.getElementById('regen').addEventListener('click',gen);
    gen();
  })();
  </script>
