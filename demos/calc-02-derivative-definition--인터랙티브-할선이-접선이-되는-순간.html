  <h1 class="page-title">🎮 인터랙티브: 할선이 접선이 되는 순간</h1>
  <p class="demo-meta">
    미분적분학 · <a href="../backup-lectures/lectures-calculus/02-derivative-definition.html">Week 2. 미분의 정의</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 할선이 접선이 되는 순간</h4>
    <p>$h$를 점점 0에 가깝게 줄이면 두 점이 한 점이 되고, 할선의 기울기 $\frac{f(a+h)-f(a)}{h}$가 접선의 기울기 $f'(a)$로 수렴합니다.
    슬라이더를 움직이며 두 숫자가 일치해 가는 순간을 만져 보세요.</p>
    <canvas id="sec" width="640" height="400"></canvas>
    <div class="controls">
      <label>접점 a <span class="val" id="secAV">1.20</span><input type="range" id="secA" min="-0.8" max="2.4" step="0.02" value="1.2"></label>
      <label>증분 h <span class="val" id="secHV">1.00</span><input type="range" id="secH" min="0.02" max="2" step="0.01" value="1"></label>
      <button id="secAuto">자동/정지</button>
      <button id="secRst" class="alt">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('sec'),x=c.getContext('2d');
    const W=c.width,H=c.height;
    const xR=[-1.2,3.2],yR=[-0.5,3.0];
    const M={l:50,r:20,t:20,b:40};
    function px(v){return M.l+(v-xR[0])/(xR[1]-xR[0])*(W-M.l-M.r);}
    function py(v){return H-M.b-(v-yR[0])/(yR[1]-yR[0])*(H-M.t-M.b);}
    function f(v){return 0.3*v*v*v - 0.6*v*v + 1;}
    function fp(v){return 0.9*v*v - 1.2*v;}
    let auto=false,t0=performance.now();
    document.getElementById('secAuto').onclick=()=>{auto=!auto;t0=performance.now();};
    document.getElementById('secRst').onclick=()=>{document.getElementById('secA').value=1.2;document.getElementById('secH').value=1;auto=false;};
    function loop(){
      if(auto){
        const dt=(performance.now()-t0)/1000;
        // h decays from 2 -> 0.02 over ~6s, then resets
        const phase=(dt%6)/6;
        const hv=2*Math.pow(0.01,phase);
        document.getElementById('secH').value=hv.toFixed(3);
      }
      const a=+document.getElementById('secA').value;
      const h=+document.getElementById('secH').value;
      document.getElementById('secAV').textContent=a.toFixed(2);
      document.getElementById('secHV').textContent=h.toFixed(2);
      x.fillStyle='#fafbfc';x.fillRect(0,0,W,H);
      // grid
      x.strokeStyle='#eee';
      for(let v=Math.ceil(xR[0]);v<=xR[1];v++){x.beginPath();x.moveTo(px(v),py(yR[0]));x.lineTo(px(v),py(yR[1]));x.stroke();}
      for(let v=Math.ceil(yR[0]);v<=yR[1];v++){x.beginPath();x.moveTo(px(xR[0]),py(v));x.lineTo(px(xR[1]),py(v));x.stroke();}
      x.strokeStyle='#888';x.lineWidth=1.2;
      x.beginPath();x.moveTo(px(xR[0]),py(0));x.lineTo(px(xR[1]),py(0));x.stroke();
      x.beginPath();x.moveTo(px(0),py(yR[0]));x.lineTo(px(0),py(yR[1]));x.stroke();
      // function curve
      x.strokeStyle='#222';x.lineWidth=2;x.beginPath();
      let first=true;
      for(let v=xR[0];v<=xR[1];v+=0.01){
        const yv=f(v);
        if(yv<yR[0]||yv>yR[1]){first=true;continue;}
        if(first){x.moveTo(px(v),py(yv));first=false;}else x.lineTo(px(v),py(yv));
      }
      x.stroke();
      // tangent line at a (true derivative — green dashed)
      const m_tan=fp(a),y_a=f(a);
      x.strokeStyle='#1b5e20';x.lineWidth=2;x.setLineDash([6,4]);
      x.beginPath();
      const tx0=xR[0],ty0=y_a+m_tan*(tx0-a);
      const tx1=xR[1],ty1=y_a+m_tan*(tx1-a);
      x.moveTo(px(tx0),py(ty0));x.lineTo(px(tx1),py(ty1));x.stroke();x.setLineDash([]);
      // secant line through (a, f(a)) and (a+h, f(a+h)) — orange solid
      const y_h=f(a+h);
      const m_sec=(y_h - y_a)/h;
      x.strokeStyle='#f57c00';x.lineWidth=2.5;
      x.beginPath();
      const sx0=xR[0],sy0=y_a+m_sec*(sx0-a);
      const sx1=xR[1],sy1=y_a+m_sec*(sx1-a);
      x.moveTo(px(sx0),py(sy0));x.lineTo(px(sx1),py(sy1));x.stroke();
      // two points
      x.fillStyle='#c62828';x.beginPath();x.arc(px(a),py(y_a),5,0,Math.PI*2);x.fill();
      x.fillStyle='#0b5fff';x.beginPath();x.arc(px(a+h),py(y_h),5,0,Math.PI*2);x.fill();
      // labels
      x.fillStyle='#222';x.font='13px sans-serif';
      x.fillText('y = 0.3x³ − 0.6x² + 1',px(-0.9),py(2.6));
      x.fillStyle='#1b5e20';
      x.fillText("진짜 접선  f′(a) = "+m_tan.toFixed(3),px(-0.9),py(2.3));
      x.fillStyle='#b35c00';
      x.fillText("할선  (f(a+h)−f(a))/h = "+m_sec.toFixed(3),px(-0.9),py(2.05));
      x.fillStyle='#666';x.font='12px sans-serif';
      x.fillText("|차이| = "+Math.abs(m_sec-m_tan).toFixed(4),px(-0.9),py(1.78));
      requestAnimationFrame(()=>setTimeout(loop,30));
    }
    loop();
  })();
  </script>
</main>
</body>
</html>
