  <h1 class="page-title">🎮 인터랙티브: 공분산 타원 만들어보기</h1>
  <p class="demo-meta">
    로봇공학특론 · <a href="../backup-lectures/lectures/05-kalman-2d.html">Lecture 5. 칼만 필터 (2D)</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 공분산 타원 만들어보기</h4>
    <p>공분산 행렬의 세 원소를 슬라이더로 바꾸면 그에 대응하는 가우시안 타원이 즉시 그려집니다. 비대각 항(공분산)을 키우면 타원이 기울어지는 것을 보세요.</p>
    <canvas id="cov" width="640" height="380"></canvas>
    <div class="controls">
      <label>σ²ₓ <span class="val" id="sxV">2</span><input type="range" id="sx" min="0.5" max="6" step="0.1" value="2"></label>
      <label>σ²ᵧ <span class="val" id="syV">1</span><input type="range" id="sy" min="0.5" max="6" step="0.1" value="1"></label>
      <label>σₓᵧ <span class="val" id="sxyV">0.5</span><input type="range" id="sxy" min="-3" max="3" step="0.1" value="0.5"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('cov'),x=c.getContext('2d');
    function loop(){
      const sx_=+document.getElementById('sx').value;
      const sy_=+document.getElementById('sy').value;
      const sxy_=+document.getElementById('sxy').value;
      ['sx','sy','sxy'].forEach(k=>document.getElementById(k+'V').textContent=document.getElementById(k).value);
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      const cx=320,cy=190,SC=40;
      // 격자
      x.strokeStyle='#eee';for(let i=0;i<c.width;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,c.height);x.stroke();}
      for(let j=0;j<c.height;j+=40){x.beginPath();x.moveTo(0,j);x.lineTo(c.width,j);x.stroke();}
      x.strokeStyle='#999';x.beginPath();x.moveTo(20,cy);x.lineTo(620,cy);x.moveTo(cx,30);x.lineTo(cx,350);x.stroke();
      // 검사: 양의 정부호인지
      const det=sx_*sy_-sxy_*sxy_;
      if(det<=0){x.fillStyle='#c62828';x.font='14px sans-serif';x.fillText('⚠ 비양정부호 (det = '+det.toFixed(2)+'). σₓᵧ를 줄여주세요.',20,30);requestAnimationFrame(loop);return;}
      // 고유값/고유벡터 (2x2)
      const tr=sx_+sy_,disc=Math.sqrt((sx_-sy_)**2+4*sxy_*sxy_);
      const l1=(tr+disc)/2,l2=(tr-disc)/2;
      const ang=0.5*Math.atan2(2*sxy_,sx_-sy_);
      // 1σ, 2σ, 3σ 타원
      [[3,'rgba(11,95,255,0.05)'],[2,'rgba(11,95,255,0.10)'],[1,'rgba(11,95,255,0.20)']].forEach(([k,col])=>{
        x.fillStyle=col;x.strokeStyle='#0b5fff';
        x.beginPath();x.ellipse(cx,cy,Math.sqrt(l1)*k*SC,Math.sqrt(l2)*k*SC,ang,0,Math.PI*2);x.fill();x.stroke();
      });
      // 주축 (고유벡터)
      x.strokeStyle='#c62828';x.lineWidth=2;
      x.beginPath();x.moveTo(cx-Math.cos(ang)*Math.sqrt(l1)*SC*1.2,cy-Math.sin(ang)*Math.sqrt(l1)*SC*1.2);
      x.lineTo(cx+Math.cos(ang)*Math.sqrt(l1)*SC*1.2,cy+Math.sin(ang)*Math.sqrt(l1)*SC*1.2);x.stroke();
      x.strokeStyle='#ff8c00';
      x.beginPath();x.moveTo(cx-Math.sin(ang)*Math.sqrt(l2)*SC*1.2,cy+Math.cos(ang)*Math.sqrt(l2)*SC*1.2);
      x.lineTo(cx+Math.sin(ang)*Math.sqrt(l2)*SC*1.2,cy-Math.cos(ang)*Math.sqrt(l2)*SC*1.2);x.stroke();
      // 정보
      x.fillStyle='#222';x.font='12px sans-serif';
      x.fillText('λ₁ = '+l1.toFixed(2)+',  λ₂ = '+l2.toFixed(2),20,30);
      x.fillText('회전 각도 = '+(ang*180/Math.PI).toFixed(1)+'°',20,50);
      x.fillStyle='#c62828';x.fillText('— 첫 번째 주축 (가장 불확실한 방향)',20,70);
      x.fillStyle='#ff8c00';x.fillText('— 두 번째 주축',20,90);
      requestAnimationFrame(loop);
    }
    loop();
  })();
  </script>
