  <h1 class="page-title">🎮 인터랙티브: 위 예제 시스템에 K를 가변</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/08-routh-hurwitz.html">Week 8. 안정성 — Routh-Hurwitz</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 위 예제 시스템에 K를 가변</h4>
    <p>플랜트 $G(s) = 1/[s(s+1)(s+5)]$, P 제어기 K, 단위 피드백.
    K를 움직이면서 폐루프 극점이 s-평면에서 어디로 가는지, 시간응답이 어떻게 변하는지 관찰하세요.
    Routh가 예측한 임계값 K = 30에서 정확히 진동 시작.</p>
    <canvas id="rh" width="640" height="320"></canvas>
    <div class="controls">
      <label>게인 K <span class="val" id="rhKV">5</span><input type="range" id="rhK" min="0.1" max="60" step="0.1" value="5"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('rh'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('rhKV').textContent=(+$('rhK').value).toFixed(1);};
    $('rhK').oninput=upd;
    // crude cubic root finder via Durand-Kerner
    function roots3(a,b,c,d){
      // s^3 + (b/a)s^2 + (c/a)s + d/a
      const p2=b/a,p1=c/a,p0=d/a;
      let r=[{re:1,im:1},{re:1,im:-1},{re:-1,im:0}];
      for(let it=0;it<60;it++){
        const nr=r.map((zi,i)=>{
          // f(zi)
          const z2={re:zi.re*zi.re-zi.im*zi.im, im:2*zi.re*zi.im};
          const z3={re:z2.re*zi.re-z2.im*zi.im, im:z2.re*zi.im+z2.im*zi.re};
          const f={re:z3.re + p2*z2.re + p1*zi.re + p0, im:z3.im + p2*z2.im + p1*zi.im};
          // denom = prod (zi - zj)
          let dn={re:1,im:0};
          r.forEach((zj,j)=>{if(i===j)return;
            const dr=zi.re-zj.re, di=zi.im-zj.im;
            const nrt={re:dn.re*dr-dn.im*di, im:dn.re*di+dn.im*dr};
            dn=nrt;});
          // dz = f/dn
          const denom=dn.re*dn.re+dn.im*dn.im;
          const dz={re:(f.re*dn.re+f.im*dn.im)/denom, im:(f.im*dn.re-f.re*dn.im)/denom};
          return {re:zi.re-dz.re, im:zi.im-dz.im};
        });
        r=nr;
      }
      return r;
    }
    function loop(){
      const K=+$('rhK').value;
      // characteristic: s^3 + 6 s^2 + 5 s + K = 0
      const r=roots3(1,6,5,K);
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      // s-plane
      const cx=160, cy=160, sc=30;
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(20,cy);x.lineTo(300,cy);x.moveTo(cx,20);x.lineTo(cx,300);x.stroke();
      x.fillStyle='rgba(198,40,40,0.07)';x.fillRect(cx,20,140,280);
      x.fillStyle='#666';x.font='10px sans-serif';x.fillText('Re',290,cy-4);x.fillText('Im',cx+5,28);
      r.forEach(p=>{const px=cx+p.re*sc, py=cy-p.im*sc;
        x.strokeStyle='#c62828';x.lineWidth=2;x.beginPath();
        x.moveTo(px-6,py-6);x.lineTo(px+6,py+6);x.moveTo(px-6,py+6);x.lineTo(px+6,py-6);x.stroke();});
      // verdict
      const unstable=r.some(p=>p.re>0.001);
      const marginal=r.some(p=>Math.abs(p.re)<0.05);
      x.fillStyle=unstable?'#c62828':marginal?'#f57c00':'#2e7d32';x.font='13px sans-serif';
      x.fillText(unstable?'불안정 (우반평면 극점)':marginal?'경계 (허수축 근접)':'안정', 20, 290);
      // step response of closed loop
      const ox=340, oy=270, w=280, h=200, dt=0.04, N=400;
      let y=0,yd=0,ydd=0;
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,oy);x.lineTo(ox+w,oy);x.moveTo(ox,oy-h);x.lineTo(ox,oy);x.stroke();
      x.strokeStyle='#c62828';x.setLineDash([4,4]);x.beginPath();x.moveTo(ox,oy-h*0.5);x.lineTo(ox+w,oy-h*0.5);x.stroke();x.setLineDash([]);
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      for(let k=0;k<N;k++){
        const ddd = K*(1-y) - 6*ydd - 5*yd;     // y''' + 6y'' + 5y' + K y = K r
        ydd += dt*ddd; yd += dt*ydd; y += dt*yd;
        const xx=ox+k*w/N, yy=oy-Math.max(-1,Math.min(2,y))*h*0.5;
        if(k==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);
      }
      x.stroke();
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('폐루프 계단응답',ox,oy+18);
      x.fillStyle='#666';x.font='11px sans-serif';
      x.fillText('Routh 예측 안정 영역: 0 < K < 30',ox-10,30);
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
