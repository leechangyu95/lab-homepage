  <h1 class="page-title">🎮 인터랙티브: PI 제어기 + 1차 플랜트의 폐루프</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/04-block-diagram.html">Week 4. 블록선도</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: PI 제어기 + 1차 플랜트의 폐루프</h4>
    <p>제어기 $C(s) = K_p + K_i/s$, 플랜트 $G(s) = 1/(\tau s + 1)$, 단위 피드백.
    폐루프 전달함수와 그 단위 스텝 응답을 동시에 봅니다.</p>
    <canvas id="bd" width="640" height="320"></canvas>
    <div class="controls">
      <label>τ (플랜트) <span class="val" id="bdtV">1.0</span><input type="range" id="bdt" min="0.2" max="4" step="0.1" value="1.0"></label>
      <label>Kp <span class="val" id="kpV2">1.0</span><input type="range" id="kp2" min="0" max="6" step="0.1" value="1.0"></label>
      <label>Ki <span class="val" id="kiV2">0.5</span><input type="range" id="ki2" min="0" max="5" step="0.1" value="0.5"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('bd'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('bdtV').textContent=(+$('bdt').value).toFixed(1);$('kpV2').textContent=(+$('kp2').value).toFixed(1);$('kiV2').textContent=(+$('ki2').value).toFixed(1);};
    ['bdt','kp2','ki2'].forEach(id=>$(id).oninput=upd);
    function loop(){
      const tau=+$('bdt').value, Kp=+$('kp2').value, Ki=+$('ki2').value;
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      // sym closed-loop:  T = (Kp s + Ki) / [tau s^2 + (1 + Kp) s + Ki]
      x.fillStyle='#444';x.font='13px sans-serif';
      x.fillText('폐루프 전달함수  T(s) = (Kp·s + Ki) / (τ·s² + (1+Kp)·s + Ki)', 20, 30);
      x.fillText('현재 분모: '+tau.toFixed(2)+'s² + '+(1+Kp).toFixed(2)+'s + '+Ki.toFixed(2),20,52);
      // simulate step response by Euler on  τ y'' + (1+Kp) y' + Ki y = Kp r' + Ki r
      // for unit step r=1 (r'=0 for t>0+), ODE becomes:  τ y'' + (1+Kp) y' + Ki y = Ki
      let y=0,yd=0; const dt=0.02, N=600, hist=[];
      for(let i=0;i<N;i++){
        const ydd=(Ki - (1+Kp)*yd - Ki*y)/Math.max(tau,0.01);
        yd+=ydd*dt; y+=yd*dt; hist.push(y);
      }
      // plot
      const ox=40, oy=270, w=560, h=180;
      x.strokeStyle='#bbb';x.beginPath();x.moveTo(ox,oy);x.lineTo(ox+w,oy);x.moveTo(ox,oy-h);x.lineTo(ox,oy);x.stroke();
      x.strokeStyle='#c62828';x.setLineDash([4,4]);x.beginPath();
      x.moveTo(ox,oy-150);x.lineTo(ox+w,oy-150);x.stroke();x.setLineDash([]);
      x.fillStyle='#666';x.font='11px sans-serif';
      x.fillText('1.0',ox-22,oy-148);x.fillText('0',ox-12,oy+4);x.fillText('t',ox+w+5,oy+4);
      x.strokeStyle='#0b5fff';x.lineWidth=2;x.beginPath();
      hist.forEach((v,i)=>{const xx=ox+i*w/N, yy=oy-Math.max(-0.3,Math.min(2,v))*150;
        if(i==0)x.moveTo(xx,yy);else x.lineTo(xx,yy);}); x.stroke();
      // verdict
      const finalv=hist[hist.length-1];
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('최종값: '+finalv.toFixed(3)+(Math.abs(finalv-1)<0.05?' ✓ 1.0에 수렴':' (정상상태 오차 있음)'),ox,oy+22);
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
