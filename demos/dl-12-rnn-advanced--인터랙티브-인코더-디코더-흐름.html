  <h1 class="page-title">🎮 인터랙티브: 인코더-디코더 흐름</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/12-rnn-advanced.html">Week 12. Seq2Seq와 Attention</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 인코더-디코더 흐름</h4>
    <p>한국어 4단어가 인코더로 들어가 컨텍스트가 되고, 디코더가 영어 4단어를 만들어내는 과정을 시각화합니다. 슬라이더로 시점을 옮겨보세요.</p>
    <canvas id="seqCanvas" width="640" height="320"></canvas>
    <div class="controls">
      <label>시점 <span class="val" id="stV">3</span><input type="range" id="st" min="0" max="7" step="1" value="3"></label>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('seqCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const ko=['나는','학교에','갔','다'],en=['I','went','to','school'];
    function draw(){
      const t=+document.getElementById('st').value;
      document.getElementById('stV').textContent=t;
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const bw=60,gap=10;
      // Encoder
      for(let i=0;i<4;i++){
        const x=20+i*(bw+gap),y=80;
        ctx.fillStyle=t>=i?'#0b5fff':'#bbd0ff';
        ctx.fillRect(x,y,bw,40);ctx.strokeStyle='#000';ctx.strokeRect(x,y,bw,40);
        ctx.fillStyle='#fff';ctx.font='13px sans-serif';ctx.fillText(`E${i}`,x+22,y+25);
        ctx.fillStyle='#333';ctx.fillText(ko[i],x+15,y-8);
      }
      // Context
      ctx.fillStyle='#2e7d32';ctx.fillRect(310,80,40,40);ctx.fillStyle='#fff';ctx.fillText('C',322,105);
      // Decoder
      for(let i=0;i<4;i++){
        const x=370+i*(bw+gap),y=80;
        const active=t>=4+i;
        ctx.fillStyle=active?'#ff8c00':'#ffd9a8';
        ctx.fillRect(x,y,bw,40);ctx.strokeRect(x,y,bw,40);
        ctx.fillStyle='#fff';ctx.font='13px sans-serif';ctx.fillText(`D${i}`,x+22,y+25);
        if(active){ctx.fillStyle='#333';ctx.fillText(en[i],x+15,y+60);}
      }
      ctx.fillStyle='#666';ctx.font='12px sans-serif';
      ctx.fillText('인코더',60,160);ctx.fillText('컨텍스트',300,160);ctx.fillText('디코더',430,160);
    }
    document.getElementById('st').addEventListener('input',draw);
    draw();
  })();
  </script>
