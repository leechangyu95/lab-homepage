  <h1 class="page-title">🎮 인터랙티브: 2×2 풀링</h1>
  <p class="demo-meta">
    딥러닝 &amp; 머신러닝 · <a href="../backup-lectures/lectures-dl/09-cnn-basics.html">Week 9. CNN 기초 — 합성곱 신경망</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 2×2 풀링</h4>
    <p>같은 입력에 맥스풀링과 평균풀링을 적용해 결과를 비교합니다.</p>
    <canvas id="poolCanvas" width="640" height="280"></canvas>
    <div class="controls">
      <button id="poolNew">새 입력</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('poolCanvas');
    if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    let arr=[];
    function gen(){arr=[];for(let j=0;j<8;j++){const r=[];for(let i=0;i<8;i++)r.push(Math.floor(Math.random()*10));arr.push(r);}draw();}
    function draw(){
      ctx.fillStyle='#fafbfc';ctx.fillRect(0,0,W,H);
      const cell=28;
      function paint(a,x0,y0,label){
        for(let j=0;j<a.length;j++)for(let i=0;i<a[0].length;i++){
          const v=a[j][i];const t=Math.floor(255-v*20);
          ctx.fillStyle=`rgb(${t},${t},255)`;ctx.fillRect(x0+i*cell,y0+j*cell,cell,cell);
          ctx.strokeStyle='#888';ctx.strokeRect(x0+i*cell,y0+j*cell,cell,cell);
          ctx.fillStyle='#000';ctx.font='12px sans-serif';ctx.fillText(v,x0+i*cell+8,y0+j*cell+18);
        }
        ctx.fillStyle='#333';ctx.font='13px sans-serif';ctx.fillText(label,x0,y0-5);
      }
      paint(arr,20,30,'입력 8×8');
      const mx=[],av=[];
      for(let j=0;j<4;j++){const r1=[],r2=[];for(let i=0;i<4;i++){
        const a=arr[j*2][i*2],b=arr[j*2][i*2+1],c2=arr[j*2+1][i*2],d=arr[j*2+1][i*2+1];
        r1.push(Math.max(a,b,c2,d));r2.push(Math.round((a+b+c2+d)/4));
      }mx.push(r1);av.push(r2);}
      paint(mx,290,30,'맥스풀 4×4');
      paint(av,460,30,'평균풀 4×4');
    }
    document.getElementById('poolNew').onclick=gen;
    gen();
  })();
  </script>
