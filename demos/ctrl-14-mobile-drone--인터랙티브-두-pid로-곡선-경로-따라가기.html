  <h1 class="page-title">🎮 인터랙티브: 두 PID로 곡선 경로 따라가기</h1>
  <p class="demo-meta">
    자동제어 · <a href="../backup-lectures/lectures-control/14-mobile-drone.html">Week 14. PID 응용 ② — 모바일 로봇·드론</a>에서 추출된 인터랙티브 데모.
  </p>
  <div class="demo">
    <h4>🎮 인터랙티브: 두 PID로 곡선 경로 따라가기</h4>
    <p>로봇이 초록 곡선을 따라가도록 거리 PID + 헤딩 PID를 적용. 게인을 만져 진동·코너 컷팅 양상을 확인하세요.</p>
    <canvas id="mob" width="640" height="380"></canvas>
    <div class="controls">
      <label>거리 Kp <span class="val" id="mKdV">0.8</span><input type="range" id="mKd" min="0.1" max="3" step="0.05" value="0.8"></label>
      <label>헤딩 Kp <span class="val" id="mKpV">2.5</span><input type="range" id="mKp" min="0.5" max="8" step="0.1" value="2.5"></label>
      <label>전방 주시 거리 <span class="val" id="mLdV">35</span><input type="range" id="mLd" min="10" max="120" value="35"></label>
      <button id="mRst">리셋</button>
    </div>
  </div>
  <script>
  (function(){
    const c=document.getElementById('mob'),x=c.getContext('2d');
    const $=id=>document.getElementById(id);
    const upd=()=>{$('mKdV').textContent=(+$('mKd').value).toFixed(2);$('mKpV').textContent=(+$('mKp').value).toFixed(2);$('mLdV').textContent=$('mLd').value;};
    ['mKd','mKp','mLd'].forEach(id=>$(id).oninput=upd);
    const path=[];for(let t=0;t<=Math.PI*2;t+=0.04){path.push([320+200*Math.cos(t),190+90*Math.sin(t*2)]);}
    let r;
    function init(){r={x:path[0][0],y:path[0][1]+25,th:0,trace:[]};}
    init();$('mRst').onclick=init;
    function loop(){
      const Kpd=+$('mKd').value, Kph=+$('mKp').value, Ld=+$('mLd').value;
      // find lookahead point
      let bi=0,bd=Infinity;
      path.forEach((p,i)=>{const d2=(p[0]-r.x)**2+(p[1]-r.y)**2;if(d2<bd){bd=d2;bi=i;}});
      let acc=0,li=bi;
      while(acc<Ld){const ni=(li+1)%path.length;acc+=Math.hypot(path[ni][0]-path[li][0],path[ni][1]-path[li][1]);li=ni;}
      const tgt=path[li];
      const dist=Math.hypot(tgt[0]-r.x,tgt[1]-r.y);
      const targetTh=Math.atan2(tgt[1]-r.y,tgt[0]-r.x);
      let dTh=targetTh-r.th;
      while(dTh>Math.PI)dTh-=2*Math.PI; while(dTh<-Math.PI)dTh+=2*Math.PI;
      const v = Math.min(2.5, Kpd*dist*0.05);
      const om = Kph*dTh*0.1;
      r.th += om; r.x += v*Math.cos(r.th); r.y += v*Math.sin(r.th);
      r.trace.push([r.x,r.y]); if(r.trace.length>500)r.trace.shift();
      x.fillStyle='#fafbfc';x.fillRect(0,0,c.width,c.height);
      // path
      x.strokeStyle='#a5d6a7';x.lineWidth=3;x.beginPath();
      path.forEach((p,i)=>{if(i==0)x.moveTo(p[0],p[1]);else x.lineTo(p[0],p[1]);});x.closePath();x.stroke();
      // trace
      x.strokeStyle='rgba(11,95,255,0.4)';x.lineWidth=1.5;x.beginPath();
      r.trace.forEach((p,i)=>{if(i==0)x.moveTo(p[0],p[1]);else x.lineTo(p[0],p[1]);});x.stroke();
      // lookahead
      x.fillStyle='#ff8c00';x.beginPath();x.arc(tgt[0],tgt[1],6,0,Math.PI*2);x.fill();
      x.strokeStyle='#ff8c00';x.setLineDash([3,3]);x.beginPath();x.moveTo(r.x,r.y);x.lineTo(tgt[0],tgt[1]);x.stroke();x.setLineDash([]);
      // robot
      x.save();x.translate(r.x,r.y);x.rotate(r.th);
      x.fillStyle='#0b5fff';x.fillRect(-12,-7,24,14);
      x.fillStyle='#fff';x.fillRect(8,-4,3,8);
      x.restore();
      x.fillStyle='#444';x.font='12px sans-serif';
      x.fillText('거리 = '+dist.toFixed(0)+'   헤딩 오차 = '+(dTh*180/Math.PI).toFixed(1)+'°',20,370);
      requestAnimationFrame(loop);
    }
    upd();loop();
  })();
  </script>
